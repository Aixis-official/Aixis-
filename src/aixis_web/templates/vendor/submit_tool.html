{% extends "admin_base.html" %}

{% block header_title %}ツール申請{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-jp">ツール監査申請</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 font-jp">ツールの情報を入力して監査を申請してください</p>
    </div>

    <!-- Form -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm border border-gray-100 dark:border-gray-700/50 p-6">
        <div class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">ツール名 (英語) <span class="text-red-500">*</span></label>
                    <input type="text" id="tool-name" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100" placeholder="例: ChatGPT">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">ツール名 (日本語)</label>
                    <input type="text" id="tool-name-jp" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100" placeholder="例: チャットGPT">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">ツールURL <span class="text-red-500">*</span></label>
                <input type="url" id="tool-url" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100" placeholder="https://example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">カテゴリ</label>
                <select id="tool-category" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100">
                    <option value="">カテゴリを選択</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">説明 (英語)</label>
                <textarea id="tool-desc" rows="3" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100" placeholder="Tool description"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">説明 (日本語)</label>
                <textarea id="tool-desc-jp" rows="3" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100" placeholder="ツールの説明"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">ターゲット設定 YAML (任意)</label>
                <textarea id="tool-config" rows="6" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100 font-mono" placeholder="name: my-tool&#10;base_url: https://example.com&#10;executor_type: playwright"></textarea>
                <p class="text-xs text-gray-400 mt-1 font-jp">監査実行に使用するターゲット設定YAMLを提供できます</p>
            </div>
        </div>

        <div class="mt-6 flex gap-3">
            <button onclick="submitTool()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors font-jp">申請する</button>
            <a href="/platform/vendor" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg transition-colors font-jp">戻る</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/v1';
const headers = () => {
    const h = {'Content-Type': 'application/json'};
    const token = localStorage.getItem('aixis_token');
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
};

async function loadCategories() {
    try {
        const res = await fetch(API + '/tools/categories', {headers: headers()});
        const data = await res.json();
        const sel = document.getElementById('tool-category');
        data.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.name_jp}</option>`; });
    } catch(e) { console.error(e); }
}

async function submitTool() {
    const name = document.getElementById('tool-name').value.trim();
    const url = document.getElementById('tool-url').value.trim();
    if (!name || !url) { alert('ツール名とURLは必須です'); return; }

    const body = {
        tool_name: name,
        tool_name_jp: document.getElementById('tool-name-jp').value.trim(),
        tool_url: url,
        category_id: document.getElementById('tool-category').value || null,
        description: document.getElementById('tool-desc').value.trim(),
        description_jp: document.getElementById('tool-desc-jp').value.trim(),
        target_config_yaml: document.getElementById('tool-config').value.trim(),
    };

    try {
        const res = await fetch(API + '/vendor/submissions', {method:'POST', headers:headers(), body:JSON.stringify(body)});
        if (res.ok) {
            alert('ツール申請が完了しました。審査をお待ちください。');
            window.location.href = '/platform/vendor';
        } else {
            const e = await res.json();
            alert(e.detail || 'エラーが発生しました');
        }
    } catch(e) { alert('通信エラー'); }
}

loadCategories();
</script>
{% endblock %}
