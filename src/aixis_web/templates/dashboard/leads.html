{% extends "admin_base.html" %}

{% block header_title %}リード管理{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">

    <!-- Breadcrumb -->
    <nav class="mb-6 text-sm text-gray-500 font-jp">
        <a href="/dashboard" class="hover:text-gray-700 transition-colors">ダッシュボード</a>
        <span class="mx-2">/</span>
        <span class="text-gray-900">リード管理</span>
    </nav>

    <!-- Heading + stats row -->
    <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 font-jp">リード管理</h1>
            <p class="mt-1 text-sm text-gray-500">無料登録ユーザーをスコアリングし、Advisory Audit への営業リードとして管理します。</p>
        </div>
        <div class="grid grid-cols-2 gap-3 text-center">
            <div class="px-4 py-3 bg-white rounded-lg border border-gray-100 shadow-sm min-w-[120px]">
                <div class="text-xs text-gray-500 font-jp uppercase tracking-wide">総リード数</div>
                <div id="stat-total" class="mt-1 text-2xl font-bold text-gray-900">—</div>
            </div>
            <div class="px-4 py-3 bg-gradient-to-br from-orange-50 to-red-50 rounded-lg border border-orange-200 shadow-sm min-w-[120px]">
                <div class="text-xs text-orange-700 font-jp uppercase tracking-wide">ホットリード</div>
                <div id="stat-hot" class="mt-1 text-2xl font-bold text-orange-600">—</div>
            </div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm mb-4 p-4">
        <div class="flex flex-wrap items-center gap-3">
            <div class="flex-1 min-w-[220px] relative">
                <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
                <input type="text" id="filter-search" placeholder="メール・氏名・会社名で検索..." class="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
            </div>
            <label class="inline-flex items-center gap-2 px-3 py-2 bg-orange-50 border border-orange-200 rounded-lg cursor-pointer hover:bg-orange-100 transition-colors">
                <input type="checkbox" id="filter-hot" class="accent-orange-500">
                <span class="text-xs font-medium text-orange-700 font-jp">ホットのみ</span>
            </label>
            <select id="filter-status" class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 font-jp">
                <option value="">営業ステータス: すべて</option>
                <option value="uncontacted">未接触</option>
                <option value="contacted">連絡済み</option>
                <option value="in_discussion">商談中</option>
                <option value="won">成約</option>
                <option value="lost">失注</option>
            </select>
            <select id="filter-sort" class="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 font-jp">
                <option value="score">スコア順</option>
                <option value="recent">最新アクティブ順</option>
                <option value="created">登録日順</option>
            </select>
            <button type="button" id="btn-export" class="inline-flex items-center gap-1.5 px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                CSV 出力
            </button>
        </div>
    </div>

    <!-- Lead list -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div id="alert-bar" class="hidden px-6 py-3 text-sm border-b border-gray-100"></div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm min-w-[900px]">
                <thead>
                    <tr class="border-b border-gray-100 bg-gray-50">
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider font-jp whitespace-nowrap">リード</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider font-jp whitespace-nowrap">会社 / 業種</th>
                        <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider font-jp whitespace-nowrap">スコア</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider font-jp whitespace-nowrap">ステータス</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider font-jp whitespace-nowrap">登録 / 最終活動</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider font-jp whitespace-nowrap">操作</th>
                    </tr>
                </thead>
                <tbody id="lead-list">
                    <tr><td colspan="6" class="px-4 py-10 text-center text-gray-400 font-jp">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="pagination" class="hidden px-6 py-3 border-t border-gray-100 flex items-center justify-between text-sm text-gray-500 font-jp"></div>
    </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50" onclick="closeDetailModal()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl max-h-[90vh] flex flex-col border border-gray-200 relative">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h3 class="text-base font-semibold text-gray-900 font-jp">リード詳細</h3>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <div id="detail-body" class="flex-1 overflow-y-auto px-6 py-4 space-y-5">
                <div class="text-center text-gray-400 py-10 font-jp">読み込み中...</div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
(function() {
    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    var token = localStorage.getItem('aixis_token') || '';
    var headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    if (typeof getCSRFToken === 'function') headers['X-CSRF-Token'] = getCSRFToken();

    var state = {
        page: 1,
        per_page: 50,
        hot_only: false,
        status: '',
        search: '',
        sort: 'score',
    };
    var searchTimer = null;

    var statusLabels = {
        uncontacted: ['未接触', 'bg-gray-100 text-gray-600'],
        contacted: ['連絡済み', 'bg-blue-100 text-blue-700'],
        in_discussion: ['商談中', 'bg-indigo-100 text-indigo-700'],
        won: ['成約', 'bg-green-100 text-green-700'],
        lost: ['失注', 'bg-red-100 text-red-600']
    };

    var eventLabels = {
        tool_view: 'ツール詳細閲覧',
        tool_compare: 'ツール比較',
        safety_axis_view: '安全性軸の閲覧',
        governance_view: 'ガバナンス情報の閲覧',
        pricing_view: '料金ページ閲覧',
        advisory_cta_click: 'アドバイザリー監査への関心',
        pdf_download: 'PDF ダウンロード',
        onboarding_done: 'オンボーディング完了'
    };

    var industryLabels = {
        it_software: 'IT・ソフトウェア',
        manufacturing: '製造業',
        finance_insurance: '金融・保険',
        retail_ecommerce: '小売・EC',
        healthcare_pharma: '医療・製薬',
        legal_professional: '法務・士業',
        consulting: 'コンサルティング',
        education: '教育',
        media_entertainment: 'メディア・エンタメ',
        real_estate_construction: '不動産・建設',
        logistics_transport: '物流・運輸',
        energy_utility: 'エネルギー・公共インフラ',
        government_public: '官公庁・公共',
        nonprofit: 'NPO・非営利',
        other: 'その他'
    };

    function showAlert(msg, type) {
        var bar = document.getElementById('alert-bar');
        bar.textContent = msg;
        bar.className = 'px-6 py-3 text-sm border-b border-gray-100 ' +
            (type === 'ok' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600');
        setTimeout(function() { bar.className = 'hidden px-6 py-3 text-sm border-b'; }, 5000);
    }

    function formatDateTime(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        var y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
        var hh = String(d.getHours()).padStart(2,'0'), mi = String(d.getMinutes()).padStart(2,'0');
        return y + '/' + m + '/' + dd + ' ' + hh + ':' + mi;
    }

    function formatDate(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
    }

    function relativeTime(iso) {
        if (!iso) return '—';
        var d = new Date(iso), now = new Date();
        var sec = Math.floor((now - d) / 1000);
        if (sec < 60) return 'たった今';
        if (sec < 3600) return Math.floor(sec/60) + '分前';
        if (sec < 86400) return Math.floor(sec/3600) + '時間前';
        if (sec < 604800) return Math.floor(sec/86400) + '日前';
        return formatDate(iso);
    }

    function scoreBadge(score, isHot) {
        var cls, label;
        if (isHot) { cls = 'bg-gradient-to-r from-orange-500 to-red-500 text-white'; label = '🔥 ' + score; }
        else if (score >= 30) { cls = 'bg-amber-100 text-amber-800'; label = String(score); }
        else if (score >= 10) { cls = 'bg-blue-50 text-blue-700'; label = String(score); }
        else { cls = 'bg-gray-100 text-gray-500'; label = String(score); }
        return '<span class="inline-flex items-center justify-center px-2.5 py-1 rounded-full text-xs font-bold ' + cls + '">' + label + '</span>';
    }

    function buildQuery() {
        var qs = [];
        qs.push('page=' + state.page);
        qs.push('per_page=' + state.per_page);
        if (state.hot_only) qs.push('hot_only=true');
        if (state.status) qs.push('status=' + encodeURIComponent(state.status));
        if (state.search) qs.push('search=' + encodeURIComponent(state.search));
        qs.push('sort=' + state.sort);
        return qs.join('&');
    }

    function renderLeads(data) {
        var tbody = document.getElementById('lead-list');
        document.getElementById('stat-total').textContent = String(data.total);
        document.getElementById('stat-hot').textContent = String(data.hot_total);

        if (!data.items || data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400 font-jp">該当するリードがありません</td></tr>';
            document.getElementById('pagination').classList.add('hidden');
            return;
        }
        var html = '';
        data.items.forEach(function(l) {
            var st = statusLabels[l.sales_status] || ['未接触', 'bg-gray-100 text-gray-600'];
            html += '<tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onclick="openDetailModal(\'' + l.id + '\')">';
            html += '<td class="px-4 py-3">';
            html += '<div class="font-medium text-gray-900">' + esc(l.name || '(未入力)') + '</div>';
            html += '<div class="text-xs text-gray-500 mt-0.5">' + esc(l.email);
            if (!l.email_verified) html += ' <span class="ml-1 text-[10px] px-1 py-0.5 bg-yellow-50 text-yellow-700 rounded">未確認</span>';
            html += '</div>';
            html += '</td>';
            html += '<td class="px-4 py-3">';
            html += '<div class="text-gray-700">' + esc(l.company_name || '—') + '</div>';
            html += '<div class="text-xs text-gray-400 mt-0.5">' + esc(industryLabels[l.industry] || l.industry || '') + (l.employee_count ? ' · ' + esc(l.employee_count) : '') + '</div>';
            html += '</td>';
            html += '<td class="px-4 py-3 text-center whitespace-nowrap">' + scoreBadge(l.lead_score, l.is_hot) + '</td>';
            html += '<td class="px-4 py-3 whitespace-nowrap"><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium font-jp ' + st[1] + '">' + st[0] + '</span></td>';
            html += '<td class="px-4 py-3 text-xs text-gray-500 whitespace-nowrap">';
            html += '<div>登録: ' + formatDate(l.created_at) + '</div>';
            html += '<div class="mt-0.5">最終: ' + relativeTime(l.last_active_at) + '</div>';
            html += '</td>';
            html += '<td class="px-4 py-3 text-right" onclick="event.stopPropagation()">';
            html += '<button onclick="openDetailModal(\'' + l.id + '\')" class="text-indigo-600 hover:text-indigo-800 text-xs font-medium font-jp">詳細</button>';
            html += '</td>';
            html += '</tr>';
        });
        tbody.innerHTML = html;

        // Pagination
        var pgDiv = document.getElementById('pagination');
        if (data.total > data.per_page) {
            pgDiv.classList.remove('hidden');
            pgDiv.classList.add('flex');
            var from = (data.page - 1) * data.per_page + 1;
            var to = Math.min(data.page * data.per_page, data.total);
            var maxPage = Math.ceil(data.total / data.per_page);
            pgDiv.innerHTML =
                '<span>' + data.total + '件中 ' + from + '〜' + to + '件</span>' +
                '<div class="flex items-center gap-2">' +
                '<button ' + (data.page <= 1 ? 'disabled' : '') + ' onclick="goToPage(' + (data.page - 1) + ')" class="px-3 py-1 border border-gray-200 rounded-md text-xs hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed font-jp">前へ</button>' +
                '<span class="text-xs">' + data.page + ' / ' + maxPage + '</span>' +
                '<button ' + (data.page >= maxPage ? 'disabled' : '') + ' onclick="goToPage(' + (data.page + 1) + ')" class="px-3 py-1 border border-gray-200 rounded-md text-xs hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed font-jp">次へ</button>' +
                '</div>';
        } else {
            pgDiv.classList.add('hidden');
        }
    }

    function loadLeads() {
        fetch('/api/v1/leads?' + buildQuery(), { headers: headers })
            .then(function(r) {
                if (r.status === 401) { window.location.href = '/login?next=/dashboard/leads'; return null; }
                if (!r.ok) throw new Error('読み込みに失敗しました');
                return r.json();
            })
            .then(function(data) { if (data) renderLeads(data); })
            .catch(function(e) { showAlert(e.message, 'error'); });
    }

    window.goToPage = function(p) { state.page = p; loadLeads(); };

    // Filter listeners
    document.getElementById('filter-search').addEventListener('input', function(e) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            state.search = e.target.value.trim();
            state.page = 1;
            loadLeads();
        }, 300);
    });
    document.getElementById('filter-hot').addEventListener('change', function(e) {
        state.hot_only = e.target.checked;
        state.page = 1;
        loadLeads();
    });
    document.getElementById('filter-status').addEventListener('change', function(e) {
        state.status = e.target.value;
        state.page = 1;
        loadLeads();
    });
    document.getElementById('filter-sort').addEventListener('change', function(e) {
        state.sort = e.target.value;
        state.page = 1;
        loadLeads();
    });

    // CSV export
    document.getElementById('btn-export').addEventListener('click', function() {
        var qs = [];
        if (state.hot_only) qs.push('hot_only=true');
        if (state.status) qs.push('status=' + encodeURIComponent(state.status));
        if (state.search) qs.push('search=' + encodeURIComponent(state.search));
        // Cookie auth is used by StreamingResponse download — just navigate
        var url = '/api/v1/leads/export.csv' + (qs.length ? '?' + qs.join('&') : '');
        window.location.href = url;
    });

    // Detail modal
    window.openDetailModal = function(leadId) {
        var modal = document.getElementById('detail-modal');
        var body = document.getElementById('detail-body');
        modal.classList.remove('hidden');
        body.innerHTML = '<div class="text-center text-gray-400 py-10 font-jp">読み込み中...</div>';

        fetch('/api/v1/leads/' + encodeURIComponent(leadId), { headers: headers })
            .then(function(r) {
                if (!r.ok) throw new Error('詳細の読み込みに失敗しました');
                return r.json();
            })
            .then(function(d) { renderDetail(d); })
            .catch(function(e) { body.innerHTML = '<div class="text-center text-red-500 py-10 font-jp">' + esc(e.message) + '</div>'; });
    };

    window.closeDetailModal = function() {
        document.getElementById('detail-modal').classList.add('hidden');
    };

    function renderDetail(d) {
        var l = d.lead;
        var body = document.getElementById('detail-body');
        var h = '';

        // Header card
        h += '<div class="flex items-start gap-4 pb-4 border-b border-gray-100">';
        h += '<div class="flex-1">';
        h += '<div class="flex items-center gap-3"><h4 class="text-lg font-bold text-gray-900">' + esc(l.name || '(未入力)') + '</h4>' + scoreBadge(l.lead_score, l.is_hot) + '</div>';
        h += '<div class="mt-1 text-sm text-gray-500">' + esc(l.email);
        if (!l.email_verified) h += ' <span class="ml-1 text-[10px] px-1.5 py-0.5 bg-yellow-50 text-yellow-700 rounded">メール未確認</span>';
        h += '</div>';
        if (l.company_name) h += '<div class="mt-1 text-sm text-gray-700">' + esc(l.company_name) + (l.job_title ? ' · ' + esc(l.job_title) : '') + '</div>';
        h += '</div></div>';

        // Profile grid
        h += '<div class="grid grid-cols-2 gap-3 text-sm">';
        h += profileCell('業種', industryLabels[l.industry] || l.industry);
        h += profileCell('従業員規模', l.employee_count);
        h += profileCell('電話', l.phone);
        h += profileCell('登録経路', l.registration_source);
        h += profileCell('登録日時', formatDateTime(l.created_at));
        h += profileCell('最終アクティブ', formatDateTime(l.last_active_at));
        h += '</div>';

        // Sales status + notes
        h += '<div class="bg-gray-50 rounded-lg p-4 border border-gray-100">';
        h += '<label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 font-jp">営業ステータス</label>';
        h += '<select id="edit-status" class="w-full px-3 py-2 text-sm border border-gray-200 bg-white rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 font-jp">';
        ['uncontacted','contacted','in_discussion','won','lost'].forEach(function(s) {
            h += '<option value="' + s + '"' + (l.sales_status === s ? ' selected' : '') + '>' + statusLabels[s][0] + '</option>';
        });
        h += '</select>';
        h += '<label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mt-4 mb-2 font-jp">営業メモ</label>';
        h += '<textarea id="edit-notes" rows="4" placeholder="このリードに関する営業メモを記録..." class="w-full px-3 py-2 text-sm border border-gray-200 bg-white rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 font-jp">' + esc(d.sales_notes || '') + '</textarea>';
        h += '<div class="mt-3 flex justify-end">';
        h += '<button onclick="saveLead(\'' + l.id + '\')" id="save-btn" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors disabled:opacity-60 font-jp">変更を保存</button>';
        h += '</div>';
        h += '</div>';

        // Activity history
        h += '<div>';
        h += '<h5 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 font-jp">活動履歴（直近50件）</h5>';
        if (!d.recent_activities || d.recent_activities.length === 0) {
            h += '<div class="text-sm text-gray-400 font-jp">まだ活動履歴がありません</div>';
        } else {
            h += '<ul class="space-y-2">';
            d.recent_activities.forEach(function(a) {
                var label = eventLabels[a.event_type] || a.event_type;
                var deltaCls = a.score_delta > 0 ? 'text-green-600' : 'text-gray-400';
                var deltaStr = a.score_delta > 0 ? '+' + a.score_delta : String(a.score_delta);
                h += '<li class="flex items-center gap-3 py-2 px-3 bg-white border border-gray-100 rounded-lg text-sm">';
                h += '<span class="inline-flex items-center justify-center w-10 h-6 text-xs font-bold rounded ' + deltaCls + ' bg-gray-50">' + deltaStr + '</span>';
                h += '<div class="flex-1 min-w-0">';
                h += '<div class="text-gray-800 font-jp">' + esc(label);
                if (a.tool_slug) h += ' <span class="text-xs text-gray-400">· ' + esc(a.tool_slug) + '</span>';
                h += '</div>';
                if (a.page_path) h += '<div class="text-xs text-gray-400 truncate">' + esc(a.page_path) + '</div>';
                h += '</div>';
                h += '<span class="text-xs text-gray-400 whitespace-nowrap">' + relativeTime(a.created_at) + '</span>';
                h += '</li>';
            });
            h += '</ul>';
        }
        h += '</div>';

        body.innerHTML = h;
    }

    function profileCell(label, value) {
        return '<div>' +
            '<div class="text-xs text-gray-400 font-jp uppercase tracking-wider">' + esc(label) + '</div>' +
            '<div class="mt-1 text-gray-800 font-jp">' + esc(value || '—') + '</div>' +
            '</div>';
    }

    window.saveLead = function(leadId) {
        var btn = document.getElementById('save-btn');
        var status = document.getElementById('edit-status').value;
        var notes = document.getElementById('edit-notes').value;
        btn.disabled = true;
        btn.textContent = '保存中...';

        fetch('/api/v1/leads/' + encodeURIComponent(leadId), {
            method: 'PATCH',
            headers: headers,
            body: JSON.stringify({ sales_status: status, sales_notes: notes })
        })
            .then(function(r) {
                if (!r.ok) throw new Error('保存に失敗しました');
                return r.json();
            })
            .then(function(d) {
                renderDetail(d);
                showAlert('リード情報を更新しました', 'ok');
                loadLeads();
            })
            .catch(function(e) {
                showAlert(e.message, 'error');
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = '変更を保存';
            });
    };

    // Close modal on Esc
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDetailModal();
    });

    // Initial load
    loadLeads();
})();
</script>
{% endblock %}
