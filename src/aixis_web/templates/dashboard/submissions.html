{% extends "admin_base.html" %}

{% block header_title %}申請審査{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-jp">ツール申請審査</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 font-jp">ベンダーから提出されたツール申請を審査します</p>
    </div>

    <!-- Filter -->
    <div class="mb-6 flex gap-2">
        <button onclick="loadSubmissions()" class="px-3 py-1.5 text-xs font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 font-jp">すべて</button>
        <button onclick="loadSubmissions('pending')" class="px-3 py-1.5 text-xs font-medium bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 rounded-lg hover:bg-amber-200 font-jp">審査待ち</button>
        <button onclick="loadSubmissions('approved')" class="px-3 py-1.5 text-xs font-medium bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-lg hover:bg-emerald-200 font-jp">承認済み</button>
        <button onclick="loadSubmissions('rejected')" class="px-3 py-1.5 text-xs font-medium bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 rounded-lg hover:bg-red-200 font-jp">却下</button>
    </div>

    <!-- Submissions List -->
    <div class="space-y-4" id="submissions-list">
        <div class="text-center text-gray-400 py-8 font-jp">読み込み中...</div>
    </div>
</div>

<!-- Review Modal -->
<div id="review-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 w-full max-w-md mx-4 p-6">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 font-jp" id="modal-title">審査</h3>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">審査コメント</label>
            <textarea id="review-notes" rows="3" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm"></textarea>
        </div>
        <div class="mt-4 flex gap-3 justify-end">
            <button onclick="closeModal()" class="px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 font-jp">キャンセル</button>
            <button id="modal-reject-btn" onclick="doReview('reject')" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg font-jp">却下</button>
            <button id="modal-approve-btn" onclick="doReview('approve')" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-lg font-jp">承認</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/v1';
const headers = () => {
    const h = {'Content-Type': 'application/json'};
    const token = localStorage.getItem('aixis_token');
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
};

let currentSubmissionId = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

const statusBadge = (s) => {
    const colors = {pending:'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400', approved:'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400', rejected:'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400'};
    const labels = {pending:'審査待ち', approved:'承認済み', rejected:'却下'};
    return `<span class="px-2 py-0.5 text-xs rounded ${colors[s]||''}">${labels[s]||s}</span>`;
};

async function loadSubmissions(statusFilter) {
    const url = statusFilter ? `${API}/vendor/admin/submissions?status_filter=${statusFilter}` : `${API}/vendor/admin/submissions`;
    try {
        const res = await fetch(url, {headers: headers()});
        const data = await res.json();
        const el = document.getElementById('submissions-list');

        if (!data.length) {
            el.innerHTML = '<div class="text-center text-gray-400 py-8 font-jp">該当する申請はありません</div>';
            return;
        }

        el.innerHTML = data.map(s => `
            <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm border border-gray-100 dark:border-gray-700/50 p-6">
                <div class="flex items-start justify-between">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-2">
                            <h3 class="text-base font-semibold text-gray-900 dark:text-white font-jp">${esc(s.tool_name_jp || s.tool_name)}</h3>
                            ${statusBadge(s.status)}
                        </div>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">
                            <a href="${esc(s.tool_url)}" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(s.tool_url)}</a>
                        </p>
                        <p class="text-sm text-gray-600 dark:text-gray-300 font-jp">${esc(s.description_jp || s.description || '')}</p>
                        <p class="text-xs text-gray-400 mt-2">${new Date(s.created_at).toLocaleDateString('ja-JP')}</p>
                        ${s.reviewer_notes ? `<p class="text-xs text-gray-500 mt-1 font-jp">審査コメント: ${esc(s.reviewer_notes)}</p>` : ''}
                    </div>
                    ${s.status === 'pending' ? `
                    <div class="flex gap-2 ml-4">
                        <button onclick="openReview('${s.id}')" class="px-3 py-1.5 text-xs font-medium bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded-lg hover:bg-blue-200 font-jp">審査</button>
                    </div>
                    ` : ''}
                </div>
            </div>
        `).join('');
    } catch(e) { console.error(e); }
}

function openReview(id) {
    currentSubmissionId = id;
    document.getElementById('review-notes').value = '';
    document.getElementById('review-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('review-modal').classList.add('hidden');
    currentSubmissionId = null;
}

async function doReview(action) {
    if (!currentSubmissionId) return;
    const notes = document.getElementById('review-notes').value.trim();
    try {
        const res = await fetch(`${API}/vendor/admin/submissions/${currentSubmissionId}/review`, {
            method:'PUT', headers:headers(),
            body: JSON.stringify({action, notes})
        });
        if (res.ok) { closeModal(); loadSubmissions(); }
        else { const e = await res.json(); alert(e.detail || 'エラー'); }
    } catch(e) { alert('通信エラー'); }
}

loadSubmissions();
</script>
{% endblock %}
