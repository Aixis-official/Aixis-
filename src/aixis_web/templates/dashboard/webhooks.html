{% extends "admin_base.html" %}

{% block header_title %}Webhook管理{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">

    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-jp">Webhook管理</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 font-jp">監査イベントを外部サービスに通知します</p>
    </div>

    <!-- Alert Area -->
    <div id="alert-area" class="hidden mb-4 p-3 rounded-lg text-sm font-jp"></div>

    <!-- Create Webhook Form -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700/50 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white font-jp mb-4">新規Webhook登録</h2>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 font-jp mb-1">
                    エンドポイントURL
                </label>
                <input id="webhook-url"
                       type="url"
                       placeholder="https://example.com/webhook"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 font-jp mb-2">
                    購読するイベント
                </label>
                <div class="flex flex-wrap gap-3">
                    <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-jp">
                        <input type="checkbox" value="audit.completed" class="webhook-event rounded" checked>
                        監査完了
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-jp">
                        <input type="checkbox" value="audit.failed" class="webhook-event rounded">
                        監査失敗
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-jp">
                        <input type="checkbox" value="score.published" class="webhook-event rounded">
                        スコア公開
                    </label>
                    <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300 font-jp">
                        <input type="checkbox" value="tool.created" class="webhook-event rounded">
                        ツール登録
                    </label>
                </div>
            </div>

            <div>
                <button onclick="createWebhook()"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors font-jp">
                    登録する
                </button>
            </div>
        </div>
    </div>

    <!-- Webhook List -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700/50 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white font-jp mb-4">登録済みWebhook</h2>

        <div id="webhook-list" class="space-y-3">
            <p class="text-sm text-gray-500 dark:text-gray-400 font-jp">読み込み中...</p>
        </div>
    </div>

    <!-- Delivery Log Modal -->
    <div id="delivery-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
        <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-xl w-full max-w-2xl max-h-[80vh] overflow-hidden mx-4">
            <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white font-jp">配信ログ</h3>
                <button onclick="closeDeliveryModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="delivery-log" class="p-4 overflow-y-auto max-h-[60vh] space-y-2">
                <p class="text-sm text-gray-500 dark:text-gray-400 font-jp">読み込み中...</p>
            </div>
        </div>
    </div>

    <!-- Back link -->
    <div class="mt-6">
        <a href="/dashboard" class="text-sm text-blue-600 dark:text-blue-400 hover:underline font-jp">
            &larr; ダッシュボードに戻る
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadWebhooks() {
        try {
            const data = await aixisAPI('/webhooks');
            const container = document.getElementById('webhook-list');

            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400 font-jp">登録されたWebhookはありません。</p>';
                return;
            }

            container.innerHTML = data.map(wh => `
                <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 rounded-lg">
                    <div class="min-w-0 flex-1">
                        <div class="text-sm font-medium text-gray-900 dark:text-white truncate">${escapeHtml(wh.url)}</div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            イベント: ${(wh.events || []).map(e => escapeHtml(e)).join(', ')}
                            <span class="mx-1">|</span>
                            作成: ${new Date(wh.created_at).toLocaleDateString('ja-JP')}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 ml-4 shrink-0">
                        <button onclick="testWebhook('${wh.id}')"
                                class="px-2 py-1 text-xs bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300 rounded hover:bg-emerald-200 dark:hover:bg-emerald-900/50 transition-colors font-jp">
                            テスト
                        </button>
                        <button onclick="showDeliveries('${wh.id}')"
                                class="px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded hover:bg-blue-200 dark:hover:bg-blue-900/50 transition-colors font-jp">
                            ログ
                        </button>
                        <button onclick="deleteWebhook('${wh.id}')"
                                class="px-2 py-1 text-xs bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 rounded hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors font-jp">
                            削除
                        </button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error('Failed to load webhooks:', e);
        }
    }

    async function createWebhook() {
        const url = document.getElementById('webhook-url').value.trim();
        if (!url) {
            showAlert('URLを入力してください', 'warn');
            return;
        }

        const events = Array.from(document.querySelectorAll('.webhook-event:checked')).map(cb => cb.value);
        if (events.length === 0) {
            showAlert('少なくとも1つのイベントを選択してください', 'warn');
            return;
        }

        const btn = document.querySelector('button[onclick*="createWebhook"]');
        if (btn) { btn.disabled = true; btn.textContent = '登録中...'; }

        try {
            await aixisAPI('/webhooks', {
                method: 'POST',
                body: JSON.stringify({ url, events }),
            });
            showAlert('Webhookを登録しました', 'ok');
            document.getElementById('webhook-url').value = '';
            document.querySelectorAll('.webhook-event:checked').forEach(cb => cb.checked = false);
            loadWebhooks();
        } catch (e) {
            showAlert(e.message || 'Webhookの登録に失敗しました', 'err');
        } finally {
            if (btn) { btn.disabled = false; btn.textContent = '登録する'; }
        }
    }

    async function deleteWebhook(id) {
        if (!confirm('このWebhookを削除しますか？')) return;
        try {
            await aixisAPI('/webhooks/' + id, { method: 'DELETE' });
            showAlert('Webhookを削除しました', 'ok');
            loadWebhooks();
        } catch (e) {
            showAlert('削除に失敗しました', 'err');
        }
    }

    async function testWebhook(id) {
        try {
            await aixisAPI('/webhooks/' + id + '/test', { method: 'POST' });
            showAlert('テストイベントを送信しました', 'ok');
        } catch (e) {
            showAlert('テスト送信に失敗しました', 'err');
        }
    }

    async function showDeliveries(id) {
        document.getElementById('delivery-modal').classList.remove('hidden');
        const container = document.getElementById('delivery-log');
        container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400 font-jp">読み込み中...</p>';

        try {
            const data = await aixisAPI('/webhooks/' + id + '/deliveries');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400 font-jp">配信ログはありません。</p>';
                return;
            }

            container.innerHTML = data.map(d => {
                const statusColor = d.response_status && d.response_status >= 200 && d.response_status < 300
                    ? 'text-emerald-600 dark:text-emerald-400'
                    : 'text-red-600 dark:text-red-400';
                return `
                    <div class="p-3 bg-gray-50 dark:bg-gray-800/50 rounded-lg text-sm">
                        <div class="flex items-center justify-between">
                            <span class="font-medium text-gray-900 dark:text-white">${escapeHtml(d.event_type)}</span>
                            <span class="${statusColor} font-mono">${d.response_status || 'N/A'}</span>
                        </div>
                        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                            試行: ${d.attempt_count}回
                            <span class="mx-1">|</span>
                            ${d.delivered_at ? '配信済: ' + new Date(d.delivered_at).toLocaleString('ja-JP') : '未配信'}
                            <span class="mx-1">|</span>
                            作成: ${new Date(d.created_at).toLocaleString('ja-JP')}
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            container.innerHTML = '<p class="text-sm text-red-500 font-jp">ログの読み込みに失敗しました。</p>';
        }
    }

    function closeDeliveryModal() {
        document.getElementById('delivery-modal').classList.add('hidden');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function showAlert(msg, type) {
        const el = document.getElementById('alert-area');
        el.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-800', 'dark:bg-emerald-900/30', 'dark:text-emerald-300',
                           'bg-red-50', 'text-red-800', 'dark:bg-red-900/30', 'dark:text-red-300',
                           'bg-amber-50', 'text-amber-800', 'dark:bg-amber-900/30', 'dark:text-amber-300');
        if (type === 'ok') {
            el.classList.add('bg-emerald-50', 'text-emerald-800', 'dark:bg-emerald-900/30', 'dark:text-emerald-300');
        } else if (type === 'err') {
            el.classList.add('bg-red-50', 'text-red-800', 'dark:bg-red-900/30', 'dark:text-red-300');
        } else {
            el.classList.add('bg-amber-50', 'text-amber-800', 'dark:bg-amber-900/30', 'dark:text-amber-300');
        }
        el.textContent = msg;
        setTimeout(() => el.classList.add('hidden'), 5000);
    }

    loadWebhooks();
</script>
{% endblock %}
