{% extends "admin_base.html" %}

{% block header_title %}手動チェックリスト評価{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">

    <!-- Header with back button -->
    <div class="flex items-center gap-4 mb-6">
        <a href="/dashboard"
           class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-gray-600 dark:text-gray-400 bg-white dark:bg-[#1e2235] border border-gray-200 dark:border-gray-700/50 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors duration-150">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
            ダッシュボード
        </a>
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-jp">手動チェックリスト評価</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 font-mono">セッション: {{ session_id }}</p>
        </div>
    </div>

    <!-- Layout: Main + Sidebar -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

        <!-- Main Column (3/4) -->
        <div class="lg:col-span-3 space-y-6">

            <!-- Progress Bar -->
            <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700/50 p-5">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 font-jp">評価進捗</h2>
                    <span class="text-sm font-medium tabular-nums" id="progress-text">0 / 0 項目入力済み (0%)</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
                    <div class="h-3 rounded-full transition-all duration-500 ease-out" id="progress-bar" style="width:0%;background-color:#8A5A5A"></div>
                </div>
            </div>

            <!-- Axis Accordion Sections -->
            <div id="checklist-container" class="space-y-4">
                <div class="flex flex-col items-center py-12 text-gray-400 dark:text-gray-500">
                    <svg class="animate-spin h-6 w-6 mb-3 text-gray-300 dark:text-gray-600" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span class="text-sm font-jp">チェックリスト読み込み中...</span>
                </div>
            </div>
        </div>

        <!-- Sidebar (1/4) - Radar Chart -->
        <div class="lg:col-span-1">
            <div class="lg:sticky lg:top-24">
                <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700/50 p-4">
                    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3 font-jp text-center">スコアプレビュー</h3>
                    <div id="radar-chart" style="width:100%;height:260px;"></div>
                    <div class="mt-2 space-y-1" id="axis-score-summary"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Submit Button (sticky on mobile) -->
    <div class="fixed bottom-0 left-0 right-0 lg:static lg:mt-8 bg-white/90 dark:bg-[#1e2235]/90 backdrop-blur-sm lg:backdrop-blur-none border-t border-gray-200 dark:border-gray-700/50 lg:border-0 p-4 lg:p-0 z-40">
        <div class="max-w-7xl mx-auto lg:px-0">
            <div class="bg-white dark:bg-[#1e2235] lg:rounded-xl lg:shadow-sm lg:dark:shadow-none lg:border lg:border-gray-100 lg:dark:border-gray-700/50 lg:p-6 text-center">
                <button class="w-full lg:w-auto px-8 py-3 text-sm font-semibold text-white bg-aixis-500 dark:bg-indigo-600 rounded-lg hover:bg-aixis-600 dark:hover:bg-indigo-500 disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200 shadow-sm font-jp"
                        id="submit-scores" disabled>
                    手動スコアを送信して確定
                </button>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-2 font-jp">送信後、自動スコアと統合されて最終スコアが算出されます。</p>
            </div>
        </div>
    </div>
    <!-- Spacer for fixed bottom bar on mobile -->
    <div class="h-24 lg:hidden"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const sessionId = '{{ session_id }}';

const AXIS_CONFIG = [
    { key: 'practicality',     name: '実務適性',       color: '#8BA8C4', autoRatio: 40, manualRatio: 60 },
    { key: 'cost_performance', name: '費用対効果',     color: '#6B8A7A', autoRatio: 30, manualRatio: 70 },
    { key: 'localization',     name: '日本語能力',     color: '#8A7A6B', autoRatio: 70, manualRatio: 30 },
    { key: 'safety',           name: '信頼性・安全性', color: '#8A5A5A', autoRatio: 35, manualRatio: 65 },
    { key: 'uniqueness',       name: '革新性',         color: '#805ad5', autoRatio: 40, manualRatio: 60 },
];

const profileId = '{{ profile_id | default("slide_creation", true) }}';

const CHECKLISTS_SLIDE = {
    practicality: [
        { id: 'PR-001', name_jp: 'UI操作性', weight: 1.0, scoring_guide: '0=操作不能, 2=基本操作に迷う, 3=標準的な操作性, 5=直感的で初見でも即利用可能' },
        { id: 'PR-002', name_jp: 'テンプレート品質', weight: 1.0, scoring_guide: '0=テンプレートなし, 2=基本的なテンプレート, 3=ビジネス利用可能, 5=プロ品質+日本向けデザイン' },
        { id: 'PR-003', name_jp: '出力形式対応', weight: 1.0, scoring_guide: '0=エクスポート不可, 2=PDF/PNGのみ, 3=PPTX対応, 5=PPTX+PDF+PNG+テーマ保持' },
    ],
    cost_performance: [
        { id: 'CP-001', name_jp: '無料プラン充実度', weight: 1.0, scoring_guide: '0=無料プランなし, 2=機能大幅制限, 3=基本機能利用可, 5=十分な機能が無料で利用可能' },
        { id: 'CP-002', name_jp: '有料プラン適正', weight: 1.0, scoring_guide: '0=非常に高額, 2=割高感あり, 3=市場相場並, 5=コスパ優秀+明確な料金体系' },
        { id: 'CP-003', name_jp: '機能制限の妥当性', weight: 1.0, scoring_guide: '0=無料では実用不可, 2=厳しい制限, 3=妥当な制限, 5=段階的で納得感のある制限設計' },
    ],
    localization: [
        { id: 'LC-001', name_jp: '日本語UI完成度', weight: 1.0, scoring_guide: '0=英語のみ, 2=部分的に日本語, 3=ほぼ日本語対応, 5=完全日本語ネイティブ対応' },
        { id: 'LC-002', name_jp: '日本語フォント対応', weight: 1.0, scoring_guide: '0=日本語フォントなし, 2=基本ゴシック体のみ, 3=複数日本語フォント, 5=豊富な日本語フォント+ウェイト' },
        { id: 'LC-003', name_jp: 'ヘルプ・ドキュメント日本語化', weight: 1.0, scoring_guide: '0=英語のみ, 2=一部日本語, 3=主要ドキュメント日本語化, 5=全ドキュメント+サポート日本語対応' },
    ],
    safety: [
        { id: 'SF-001', name_jp: 'データ保護', weight: 1.0, scoring_guide: '0=保護なし, 2=基本的な暗号化, 3=業界標準の保護, 5=高度なセキュリティ+プライバシーポリシー明示' },
        { id: 'SF-002', name_jp: '稼働安定性', weight: 1.0, scoring_guide: '0=頻繁にダウン, 2=時々不安定, 3=概ね安定, 5=高可用性+SLA明示' },
        { id: 'SF-003', name_jp: 'エラーハンドリング', weight: 1.0, scoring_guide: '0=クラッシュ, 2=エラー表示のみ, 3=リトライ可能, 5=自動リカバリ+代替提案' },
    ],
    uniqueness: [
        { id: 'UQ-001', name_jp: 'AI活用度', weight: 1.0, scoring_guide: '0=AI機能なし, 2=基本的なAI補助, 3=AI生成が中心, 5=高度なAI活用+カスタマイズ可能' },
        { id: 'UQ-002', name_jp: '独自機能', weight: 1.0, scoring_guide: '0=独自性なし, 2=若干の差別化, 3=明確な独自機能あり, 5=他にない革新的機能' },
        { id: 'UQ-003', name_jp: '他ツール連携', weight: 1.0, scoring_guide: '0=連携不可, 2=基本的なインポート/エクスポート, 3=主要ツール連携, 5=豊富なAPI+プラグイン対応' },
    ],
};

const CHECKLISTS_MINUTES = {
    practicality: [
        { id: 'PR-001', name_jp: '文字起こし精度', weight: 1.5, scoring_guide: '0=文字起こし不可, 2=大量の誤字脱字, 3=概ね正確だが固有名詞に弱い, 5=高精度+専門用語も正確' },
        { id: 'PR-002', name_jp: '要約・議事録品質', weight: 1.5, scoring_guide: '0=要約機能なし, 2=内容の欠落が多い, 3=主要な論点をカバー, 5=決定事項・AI・リスクを自動抽出' },
        { id: 'PR-003', name_jp: '話者識別', weight: 1.0, scoring_guide: '0=話者識別なし, 2=2名程度まで, 3=3-5名を概ね識別, 5=多人数でも高精度に識別' },
    ],
    cost_performance: [
        { id: 'CP-001', name_jp: '無料プラン充実度', weight: 1.0, scoring_guide: '0=無料プランなし, 2=月数回の制限, 3=月10時間程度利用可, 5=十分な録音時間が無料' },
        { id: 'CP-002', name_jp: '有料プラン適正', weight: 1.0, scoring_guide: '0=非常に高額, 2=割高感あり, 3=市場相場並, 5=コスパ優秀+明確な料金体系' },
        { id: 'CP-003', name_jp: '処理速度', weight: 1.0, scoring_guide: '0=数時間以上, 2=30分以上, 3=10分程度, 5=リアルタイム or 数分以内' },
    ],
    localization: [
        { id: 'LC-001', name_jp: '日本語UI完成度', weight: 1.0, scoring_guide: '0=英語のみ, 2=部分的に日本語, 3=ほぼ日本語対応, 5=完全日本語ネイティブ対応' },
        { id: 'LC-002', name_jp: '日本語音声認識精度', weight: 1.5, scoring_guide: '0=日本語非対応, 2=簡単な日本語のみ, 3=標準的な会話を認識, 5=敬語・専門用語・方言も高精度' },
        { id: 'LC-003', name_jp: '話し言葉→書き言葉変換', weight: 1.0, scoring_guide: '0=変換なし, 2=フィラー残存, 3=基本的な変換, 5=ビジネス文書レベルに自然変換' },
    ],
    safety: [
        { id: 'SF-001', name_jp: '音声データの保護', weight: 1.5, scoring_guide: '0=保護なし, 2=基本的な暗号化, 3=業界標準+データ保持期間明示, 5=E2E暗号化+データ削除機能+コンプライアンス対応' },
        { id: 'SF-002', name_jp: '録音内容の正確性', weight: 1.0, scoring_guide: '0=ハルシネーション多発, 2=時々事実と異なる内容, 3=概ね正確, 5=録音内容に忠実+捏造なし' },
        { id: 'SF-003', name_jp: 'エラーハンドリング', weight: 1.0, scoring_guide: '0=音声途切れで全損, 2=エラー後の復旧困難, 3=部分的な復旧可能, 5=途切れ補完+自動リトライ' },
    ],
    uniqueness: [
        { id: 'UQ-001', name_jp: 'AI要約・分析機能', weight: 1.5, scoring_guide: '0=文字起こしのみ, 2=基本的な要約, 3=議題分割+AI抽出, 5=感情分析・発言量分析・自動タスク生成等' },
        { id: 'UQ-002', name_jp: '出力形式・連携', weight: 1.0, scoring_guide: '0=テキストのみ, 2=PDF出力, 3=Slack/Teams連携, 5=CRM/PJ管理ツール連携+API提供' },
        { id: 'UQ-003', name_jp: 'リアルタイム機能', weight: 1.0, scoring_guide: '0=録音後処理のみ, 2=簡易リアルタイム表示, 3=リアルタイム文字起こし, 5=リアルタイム翻訳+要約+共有' },
    ],
};

const CHECKLISTS = (profileId === 'meeting_minutes') ? CHECKLISTS_MINUTES : CHECKLISTS_SLIDE;

document.addEventListener('DOMContentLoaded', async () => {
    renderChecklists();
    await loadSavedEntries();
    renderRadarChart();
});

/* ===== Load Saved Entries ===== */
async function loadSavedEntries() {
    try {
        const data = await aixisAPI('/audits/' + sessionId + '/manual-scores');
        if (!data || !data.items || data.items.length === 0) return;

        data.items.forEach(item => {
            // Find the number input for this checklist item
            const numInput = document.querySelector(
                'input[type="number"][data-item="' + item.checklist_item_id + '"]'
            );
            if (!numInput) return;

            // Set score value
            const val = item.score || 0;
            numInput.value = val.toFixed(1);
            applyScoreStyle(numInput, val);

            // Sync the range slider
            const container = numInput.closest('.flex');
            const rangeInput = container ? container.querySelector('input[type="range"]') : null;
            if (rangeInput) rangeInput.value = val;

            // Set evidence
            const textarea = document.querySelector(
                'textarea[data-item="' + item.checklist_item_id + '"]'
            );
            if (textarea && item.evidence) {
                textarea.value = item.evidence;
            }

            // Update dot color
            updateItemDot(item.checklist_item_id, val);
        });

        updateProgress();
    } catch (e) {
        console.warn('Failed to load saved entries:', e);
    }
}

/* ===== Render Accordion ===== */
function renderChecklists() {
    const container = document.getElementById('checklist-container');
    container.innerHTML = AXIS_CONFIG.map((axis, idx) => {
        const items = CHECKLISTS[axis.key] || [];
        const isOpen = idx === 0;
        return `
        <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700/50 overflow-hidden transition-colors duration-200" data-axis-section="${axis.key}">
            <!-- Accordion Header -->
            <button type="button"
                    class="w-full flex items-center justify-between px-5 py-4 hover:bg-gray-50/50 dark:hover:bg-white/[0.02] transition-colors duration-150 group"
                    onclick="toggleAccordion('${axis.key}')">
                <div class="flex items-center gap-3">
                    <span class="w-3 h-3 rounded-full shrink-0" style="background-color:${axis.color}"></span>
                    <span class="text-base font-semibold text-gray-900 dark:text-white font-jp">${axis.name}</span>
                    <span class="px-2 py-0.5 text-[10px] font-medium rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">
                        自動${axis.autoRatio}% / 手動${axis.manualRatio}%
                    </span>
                    <span class="text-xs text-gray-400 dark:text-gray-500 tabular-nums" id="axis-count-${axis.key}">0 / ${items.length}</span>
                </div>
                <svg class="w-5 h-5 text-gray-400 dark:text-gray-500 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}" id="chevron-${axis.key}" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                </svg>
            </button>
            <!-- Accordion Body -->
            <div class="border-t border-gray-100 dark:border-gray-700/50 ${isOpen ? '' : 'hidden'}" id="body-${axis.key}">
                <div class="p-4 space-y-3">
                    ${items.map(item => renderChecklistItem(axis, item)).join('')}
                </div>
            </div>
        </div>`;
    }).join('');

    updateProgress();
}

function renderChecklistItem(axis, item) {
    return `
    <div class="rounded-lg border border-gray-100 dark:border-gray-700/40 p-4 hover:border-gray-200 dark:hover:border-gray-600/50 transition-colors duration-150" id="item-${item.id}">
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
            <!-- Left: Item info -->
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600 shrink-0" id="dot-${item.id}"></span>
                    <span class="text-xs font-mono text-gray-400 dark:text-gray-500">${item.id}</span>
                    <span class="text-sm font-semibold text-gray-900 dark:text-white font-jp">${item.name_jp}</span>
                </div>
                <p class="text-xs text-gray-400 dark:text-gray-500 ml-4 leading-relaxed font-jp">${item.scoring_guide || ''}</p>
            </div>
            <!-- Right: Score input -->
            <div class="flex items-center gap-2 shrink-0 mt-2 sm:mt-0 sm:ml-4">
                <input type="range" min="0" max="5" step="0.5" value="0"
                       class="w-20 sm:w-28 h-2 rounded-full appearance-none cursor-pointer accent-indigo-500
                              [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-indigo-500 [&::-webkit-slider-thumb]:shadow-sm
                              bg-gray-200 dark:bg-gray-700"
                       data-axis="${axis.key}" data-item="${item.id}"
                       oninput="onRangeInput(this)">
                <input type="number" min="0" max="5" step="0.1" value="0.0"
                       class="w-14 sm:w-16 text-center text-sm font-bold tabular-nums rounded-md border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-400 dark:text-gray-500 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 transition-colors duration-150"
                       data-axis="${axis.key}" data-item="${item.id}" data-name="${item.name_jp}" data-weight="${item.weight}"
                       onchange="onNumberChange(this)">
                <span class="text-xs text-gray-400 dark:text-gray-500">/ 5</span>
            </div>
        </div>
        <!-- Evidence textarea -->
        <div class="mt-3 ml-4">
            <textarea rows="2"
                      class="w-full text-sm rounded-md border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 placeholder-gray-400 dark:placeholder-gray-500 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500 resize-y transition-colors duration-150 font-jp"
                      data-axis="${axis.key}" data-item="${item.id}"
                      placeholder="エビデンス・根拠を入力..."></textarea>
        </div>
    </div>`;
}

/* ===== Accordion Toggle ===== */
function toggleAccordion(key) {
    const body = document.getElementById('body-' + key);
    const chevron = document.getElementById('chevron-' + key);
    body.classList.toggle('hidden');
    chevron.classList.toggle('rotate-180');
}

/* ===== Score Syncing ===== */
function onRangeInput(rangeEl) {
    const val = parseFloat(rangeEl.value);
    const container = rangeEl.closest('.flex');
    const numInput = container.querySelector('input[type="number"]');
    numInput.value = val.toFixed(1);
    applyScoreStyle(numInput, val);
    updateItemDot(rangeEl.dataset.item, val);
    updateProgress();
    renderRadarChart();
}

function onNumberChange(numEl) {
    let val = parseFloat(numEl.value) || 0;
    val = Math.round(Math.min(5, Math.max(0, val)) * 10) / 10;
    numEl.value = val.toFixed(1);
    const container = numEl.closest('.flex');
    const rangeInput = container.querySelector('input[type="range"]');
    rangeInput.value = val;
    applyScoreStyle(numEl, val);
    updateItemDot(numEl.dataset.item, val);
    updateProgress();
    renderRadarChart();
}

function applyScoreStyle(numEl, val) {
    numEl.classList.remove('text-gray-400', 'dark:text-gray-500', 'text-red-500', 'dark:text-red-400', 'text-amber-500', 'dark:text-amber-400', 'text-emerald-600', 'dark:text-emerald-400', 'text-blue-600', 'dark:text-blue-400');
    if (val === 0) {
        numEl.classList.add('text-gray-400', 'dark:text-gray-500');
    } else if (val < 2) {
        numEl.classList.add('text-red-500', 'dark:text-red-400');
    } else if (val < 3.5) {
        numEl.classList.add('text-amber-500', 'dark:text-amber-400');
    } else if (val < 4.5) {
        numEl.classList.add('text-blue-600', 'dark:text-blue-400');
    } else {
        numEl.classList.add('text-emerald-600', 'dark:text-emerald-400');
    }
}

function updateItemDot(itemId, val) {
    const dot = document.getElementById('dot-' + itemId);
    if (!dot) return;
    dot.classList.remove('bg-gray-300', 'dark:bg-gray-600', 'bg-amber-400', 'dark:bg-amber-500', 'bg-emerald-500', 'dark:bg-emerald-400');
    if (val === 0) {
        dot.classList.add('bg-gray-300', 'dark:bg-gray-600');
    } else {
        // Check if evidence is provided
        const textarea = document.querySelector(`textarea[data-item="${itemId}"]`);
        const hasEvidence = textarea && textarea.value.trim().length > 0;
        if (hasEvidence) {
            dot.classList.add('bg-emerald-500', 'dark:bg-emerald-400');
        } else {
            dot.classList.add('bg-amber-400', 'dark:bg-amber-500');
        }
    }
}

/* ===== Progress ===== */
function updateProgress() {
    const allInputs = document.querySelectorAll('input[type="number"][data-axis]');
    const total = allInputs.length;
    let filled = 0;

    allInputs.forEach(el => {
        if (parseFloat(el.value) > 0) filled++;
    });

    const pct = total > 0 ? Math.round(filled / total * 100) : 0;

    // Update text
    const textEl = document.getElementById('progress-text');
    textEl.textContent = `${filled} / ${total} 項目入力済み (${pct}%)`;
    textEl.classList.remove('text-red-500', 'text-amber-500', 'text-emerald-600', 'dark:text-red-400', 'dark:text-amber-400', 'dark:text-emerald-400');
    if (pct < 30) {
        textEl.classList.add('text-red-500', 'dark:text-red-400');
    } else if (pct < 70) {
        textEl.classList.add('text-amber-500', 'dark:text-amber-400');
    } else {
        textEl.classList.add('text-emerald-600', 'dark:text-emerald-400');
    }

    // Update bar
    const bar = document.getElementById('progress-bar');
    bar.style.width = pct + '%';
    if (pct < 30) {
        bar.style.backgroundColor = '#8A5A5A';
    } else if (pct < 70) {
        bar.style.backgroundColor = '#C9A84C';
    } else {
        bar.style.backgroundColor = '#8BA8C4';
    }

    // Update per-axis counts
    AXIS_CONFIG.forEach(axis => {
        const axisInputs = document.querySelectorAll(`input[type="number"][data-axis="${axis.key}"]`);
        const axisTotal = axisInputs.length;
        let axisFilled = 0;
        axisInputs.forEach(el => { if (parseFloat(el.value) > 0) axisFilled++; });
        const countEl = document.getElementById('axis-count-' + axis.key);
        if (countEl) countEl.textContent = `${axisFilled} / ${axisTotal}`;
    });

    // Enable/disable submit
    document.getElementById('submit-scores').disabled = filled === 0;
}

/* ===== Radar Chart ===== */
function getAxisAverages() {
    const avgs = {};
    AXIS_CONFIG.forEach(axis => {
        const inputs = document.querySelectorAll(`input[type="number"][data-axis="${axis.key}"]`);
        let sum = 0, count = 0;
        inputs.forEach(el => {
            const v = parseFloat(el.value);
            if (v > 0) { sum += v; count++; }
        });
        avgs[axis.key] = count > 0 ? sum / count : 0;
    });
    return avgs;
}

function renderRadarChart() {
    const avgs = getAxisAverages();
    const labels = AXIS_CONFIG.map(a => a.name);
    const values = AXIS_CONFIG.map(a => avgs[a.key]);
    // Close the polygon
    const r = [...values, values[0]];
    const theta = [...labels, labels[0]];

    const trace = {
        type: 'scatterpolar',
        r: r,
        theta: theta,
        fill: 'toself',
        fillcolor: 'rgba(99, 102, 241, 0.15)',
        line: { color: '#6366f1', width: 2 },
        marker: { size: 5, color: '#6366f1' },
        name: '手動スコア'
    };

    const layout = getRadarLayout({
        margin: { t: 20, r: 40, b: 20, l: 40 },
        showlegend: false,
        width: undefined,
        height: 260,
    });

    const config = { displayModeBar: false, responsive: true };
    const el = document.getElementById('radar-chart');
    Plotly.react(el, [trace], layout, config);

    // Register for theme changes
    el._renderChart = renderRadarChart;

    // Update axis score summary
    const summary = document.getElementById('axis-score-summary');
    summary.innerHTML = AXIS_CONFIG.map(a => {
        const v = avgs[a.key];
        const colorClass = v === 0 ? 'text-gray-400 dark:text-gray-500' : v >= 3.5 ? 'text-emerald-600 dark:text-emerald-400' : v >= 2 ? 'text-amber-500 dark:text-amber-400' : 'text-red-500 dark:text-red-400';
        return `<div class="flex items-center justify-between text-xs px-1">
            <span class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full" style="background:${a.color}"></span>
                <span class="text-gray-600 dark:text-gray-400 font-jp">${a.name}</span>
            </span>
            <span class="font-bold tabular-nums ${colorClass}">${v > 0 ? v.toFixed(1) : '--'}</span>
        </div>`;
    }).join('');
}

/* ===== Submit ===== */
document.getElementById('submit-scores').addEventListener('click', async () => {
    const btn = document.getElementById('submit-scores');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const items = [];
    document.querySelectorAll('input[type="number"][data-axis]').forEach(el => {
        const score = parseFloat(el.value);
        if (score > 0) {
            const axis = el.dataset.axis;
            const itemId = el.dataset.item;
            const itemName = el.dataset.name || itemId;
            const weight = parseFloat(el.dataset.weight) || 1.0;
            const textarea = document.querySelector(`textarea[data-axis="${axis}"][data-item="${itemId}"]`);
            items.push({
                axis: axis,
                checklist_item_id: itemId,
                item_name_jp: itemName,
                passed: score >= 3,
                score: score,
                weight: weight,
                evidence: textarea ? textarea.value : '',
                evidence_url: '',
            });
        }
    });

    try {
        const result = await aixisAPI(`/audits/${sessionId}/manual-scores`, {
            method: 'POST',
            body: JSON.stringify({ items }),
        });
        const msg = document.createElement('div');
        msg.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg text-sm font-medium font-jp';
        if (result.merged) {
            msg.innerHTML = '手動スコアを送信し、自動評価と統合しました（総合グレード: ' +
                (result.overall_grade || '--') + ' / ' + (result.overall_score || 0).toFixed(1) + '）。' +
                '<a href="/dashboard/audits/' + sessionId + '" class="underline font-bold ml-2">監査詳細に戻る</a>';
        } else {
            msg.innerHTML = '手動スコアが送信されました。 <a href="/dashboard/audits/' + sessionId + '" class="underline font-bold ml-2">監査詳細に戻る</a>';
        }
        document.body.appendChild(msg);
        btn.textContent = '送信完了';
        // Auto-redirect after 3 seconds
        setTimeout(() => { window.location.href = '/dashboard/audits/' + sessionId; }, 3000);
    } catch (e) {
        alert('エラー: ' + e.message);
        btn.disabled = false;
        btn.textContent = '手動スコアを送信して確定';
    }
});

// Also update dots when evidence is typed
document.addEventListener('input', (e) => {
    if (e.target.tagName === 'TEXTAREA' && e.target.dataset.item) {
        const itemId = e.target.dataset.item;
        const numInput = document.querySelector(`input[type="number"][data-item="${itemId}"]`);
        if (numInput) {
            updateItemDot(itemId, parseFloat(numInput.value) || 0);
        }
    }
});
</script>
