{% extends "admin_base.html" %}

{% block header_title %}カスタムテストケース{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-jp">カスタムテストケース管理</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 font-jp">独自のテストプロンプトを追加・管理</p>
    </div>

    <!-- Add new test case form -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm border border-gray-100 dark:border-gray-700/50 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 font-jp">新規テストケース追加</h2>
        <form id="add-test-form" onsubmit="addTestCase(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">カテゴリ</label>
                    <select name="category" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white" required>
                        <option value="ambiguous">曖昧指示テスト</option>
                        <option value="contradictory">矛盾指示テスト</option>
                        <option value="multi_step">複合指示テスト</option>
                        <option value="business_jp">商習慣テスト</option>
                        <option value="keigo_mixing">敬語混合テスト</option>
                        <option value="dialect">方言対応テスト</option>
                        <option value="long_input">長文入力テスト</option>
                        <option value="unicode_edge">Unicode特殊文字テスト</option>
                        <option value="broken_grammar">文法破壊テスト</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">プロンプト</label>
                    <textarea name="prompt" rows="4" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white" placeholder="テストプロンプトを入力..." required></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">期待される動作（任意、カンマ区切り）</label>
                    <input type="text" name="expected" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white" placeholder="正しい敬語を使用, 矛盾を指摘">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">失敗インジケータ（任意、カンマ区切り）</label>
                    <input type="text" name="failures" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white" placeholder="エラー発生, タイムアウト">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">タグ（任意、カンマ区切り）</label>
                    <input type="text" name="tags" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white" placeholder="カスタム, 重要">
                </div>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors font-jp">追加</button>
            </div>
        </form>
    </div>

    <!-- Custom test cases list -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm border border-gray-100 dark:border-gray-700/50">
        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700/50">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white font-jp">登録済みカスタムテスト</h2>
        </div>
        <div id="custom-tests-list" class="p-4">
            <p class="text-sm text-gray-500 dark:text-gray-400 text-center py-8 font-jp">読み込み中...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let customTests = JSON.parse(localStorage.getItem('aixis_custom_tests') || '[]');

document.addEventListener('DOMContentLoaded', () => { renderTests(); });

function addTestCase(e) {
    e.preventDefault();
    const form = e.target;
    const test = {
        id: 'custom-' + Date.now(),
        category: form.category.value,
        prompt: form.prompt.value,
        expected_behaviors: form.expected.value ? form.expected.value.split(',').map(s => s.trim()) : [],
        failure_indicators: form.failures.value ? form.failures.value.split(',').map(s => s.trim()) : [],
        tags: form.tags.value ? form.tags.value.split(',').map(s => s.trim()).concat(['custom']) : ['custom'],
        created_at: new Date().toISOString(),
    };
    customTests.push(test);
    localStorage.setItem('aixis_custom_tests', JSON.stringify(customTests));
    form.reset();
    renderTests();
}

function deleteTest(id) {
    if (!confirm('このテストケースを削除しますか？')) return;
    customTests = customTests.filter(t => t.id !== id);
    localStorage.setItem('aixis_custom_tests', JSON.stringify(customTests));
    renderTests();
}

function renderTests() {
    const list = document.getElementById('custom-tests-list');
    if (customTests.length === 0) {
        list.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400 text-center py-8 font-jp">カスタムテストケースはまだ登録されていません。</p>';
        return;
    }
    list.innerHTML = customTests.map(t => `
        <div class="flex items-start gap-3 p-3 rounded-lg border border-gray-100 dark:border-gray-700/50 mb-2 hover:bg-gray-50/50 dark:hover:bg-white/[0.02]">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-[10px] font-medium px-1.5 py-0.5 rounded bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300">${t.category}</span>
                    ${t.tags.map(tag => '<span class="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">' + tag + '</span>').join(' ')}
                </div>
                <p class="text-sm text-gray-900 dark:text-white font-jp line-clamp-2">${t.prompt}</p>
                <p class="text-[10px] text-gray-400 dark:text-gray-500 mt-1">${formatDateTime(t.created_at)}</p>
            </div>
            <button onclick="deleteTest('${t.id}')" class="shrink-0 p-1 text-gray-400 hover:text-red-500 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
            </button>
        </div>
    `).join('');
}
</script>
{% endblock %}
