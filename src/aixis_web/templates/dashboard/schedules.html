{% extends "admin_base.html" %}

{% block header_title %}スケジュール管理{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white font-jp">定期監査スケジュール</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 font-jp">自動的に監査を再実行するスケジュールを管理します</p>
        </div>
        <button onclick="showCreateForm()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors duration-150 font-jp">
            新規スケジュール
        </button>
    </div>

    <!-- Create Form (hidden by default) -->
    <div id="create-form" class="hidden mb-8 bg-white dark:bg-[#1e2235] rounded-xl shadow-sm border border-gray-100 dark:border-gray-700/50 p-6">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4 font-jp">新規スケジュール作成</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">ツール</label>
                <select id="form-tool-id" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100">
                    <option value="">読み込み中...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">プロファイル ID</label>
                <input type="text" id="form-profile-id" placeholder="例: enterprise_jp" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">Cron 式</label>
                <input type="text" id="form-cron" placeholder="0 3 * * 0" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100">
                <div class="mt-2 flex flex-wrap gap-2">
                    <button onclick="setCron('0 3 * * *')" class="px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600">毎日 3:00</button>
                    <button onclick="setCron('0 3 * * 0')" class="px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600">毎週日曜 3:00</button>
                    <button onclick="setCron('0 3 1 * *')" class="px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600">毎月1日 3:00</button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 font-jp">カテゴリ (カンマ区切り)</label>
                <input type="text" id="form-categories" placeholder="safety,reliability" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-gray-100">
            </div>
        </div>
        <div class="mt-4 flex gap-3">
            <button onclick="createSchedule()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors font-jp">作成</button>
            <button onclick="hideCreateForm()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg transition-colors font-jp">キャンセル</button>
        </div>
    </div>

    <!-- Schedules Table -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm border border-gray-100 dark:border-gray-700/50">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-gray-100 dark:border-gray-700/50">
                        <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider font-jp">ツール</th>
                        <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Cron</th>
                        <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider font-jp">前回実行</th>
                        <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider font-jp">次回実行</th>
                        <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider font-jp">実行回数</th>
                        <th class="text-center px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider font-jp">有効</th>
                        <th class="text-right px-6 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider font-jp">操作</th>
                    </tr>
                </thead>
                <tbody id="schedules-body">
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-400 dark:text-gray-500 font-jp">読み込み中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/v1';
const headers = () => {
    const h = {'Content-Type': 'application/json'};
    const token = localStorage.getItem('aixis_token');
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
};

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showCreateForm() { document.getElementById('create-form').classList.remove('hidden'); }
function hideCreateForm() { document.getElementById('create-form').classList.add('hidden'); }
function setCron(expr) { document.getElementById('form-cron').value = expr; }

async function loadTools() {
    try {
        const res = await fetch(API + '/tools/?all=true&page_size=100', {headers: headers()});
        const data = await res.json();
        const sel = document.getElementById('form-tool-id');
        sel.innerHTML = '<option value="">ツールを選択</option>';
        (data.items || []).forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = t.name_jp || t.name;
            sel.appendChild(opt);
        });
    } catch(e) { console.error('Failed to load tools', e); }
}

async function loadSchedules() {
    try {
        const res = await fetch(API + '/schedules/', {headers: headers()});
        const data = await res.json();
        const tbody = document.getElementById('schedules-body');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-400 dark:text-gray-500 font-jp">スケジュールはまだありません</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(s => `
            <tr class="border-b border-gray-50 dark:border-gray-700/30 hover:bg-gray-50 dark:hover:bg-gray-800/30">
                <td class="px-6 py-3 text-gray-900 dark:text-gray-100 font-jp">${esc(s.tool_name || s.tool_id)}</td>
                <td class="px-6 py-3 text-gray-600 dark:text-gray-400 font-mono text-xs">${esc(s.cron_expression)}</td>
                <td class="px-6 py-3 text-gray-500 dark:text-gray-400">${s.last_run_at ? new Date(s.last_run_at).toLocaleString('ja-JP') : '-'}</td>
                <td class="px-6 py-3 text-gray-500 dark:text-gray-400">${s.next_run_at ? new Date(s.next_run_at).toLocaleString('ja-JP') : '-'}</td>
                <td class="px-6 py-3 text-gray-500 dark:text-gray-400">${s.run_count}</td>
                <td class="px-6 py-3 text-center">
                    <button onclick="toggleActive('${s.id}', ${!s.is_active})" class="px-2 py-1 text-xs rounded ${s.is_active ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400'}">
                        ${s.is_active ? 'ON' : 'OFF'}
                    </button>
                </td>
                <td class="px-6 py-3 text-right">
                    <button onclick="triggerNow('${s.id}')" class="px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded hover:bg-blue-200 dark:hover:bg-blue-900/50 mr-1 font-jp">実行</button>
                    <button onclick="deleteSchedule('${s.id}')" class="px-2 py-1 text-xs bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 rounded hover:bg-red-200 dark:hover:bg-red-900/50 font-jp">削除</button>
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error('Failed to load schedules', e); }
}

async function createSchedule() {
    const toolId = document.getElementById('form-tool-id').value;
    const cron = document.getElementById('form-cron').value.trim();
    if (!toolId || !cron) { alert('ツールとCron式を入力してください'); return; }
    const cats = document.getElementById('form-categories').value.split(',').map(s => s.trim()).filter(Boolean);
    try {
        const res = await fetch(API + '/schedules/', {
            method: 'POST', headers: headers(),
            body: JSON.stringify({
                tool_id: toolId,
                profile_id: document.getElementById('form-profile-id').value.trim(),
                categories: cats,
                cron_expression: cron,
            })
        });
        if (res.ok) { hideCreateForm(); loadSchedules(); }
        else { const e = await res.json(); alert(e.detail || 'エラーが発生しました'); }
    } catch(e) { alert('通信エラー'); }
}

async function toggleActive(id, active) {
    await fetch(API + '/schedules/' + id, {
        method: 'PUT', headers: headers(),
        body: JSON.stringify({is_active: active})
    });
    loadSchedules();
}

async function triggerNow(id) {
    if (!confirm('このスケジュールを今すぐ実行しますか？')) return;
    const res = await fetch(API + '/schedules/' + id + '/trigger', {method: 'POST', headers: headers()});
    const data = await res.json();
    alert(data.message || '実行開始');
    loadSchedules();
}

async function deleteSchedule(id) {
    if (!confirm('このスケジュールを削除しますか？')) return;
    await fetch(API + '/schedules/' + id, {method: 'DELETE', headers: headers()});
    loadSchedules();
}

loadTools();
loadSchedules();
</script>
{% endblock %}
