{% extends "admin_base.html" %}

{% block header_title %}クライアント管理{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">

    <!-- Breadcrumb -->
    <nav class="mb-6 text-sm text-gray-500 dark:text-gray-400 font-jp">
        <a href="/dashboard" class="hover:text-gray-700 dark:hover:text-gray-200 transition-colors">ダッシュボード</a>
        <span class="mx-2">/</span>
        <span class="text-gray-900 dark:text-white">クライアント管理</span>
    </nav>

    <!-- Client List -->
    <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-sm dark:shadow-none border border-gray-100 dark:border-gray-700/50">
        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700/50 flex items-center justify-between">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white font-jp">クライアント一覧</h2>
            <button type="button" onclick="openCreateModal()"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-400 rounded-lg transition-colors duration-200 shadow-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                新規クライアント
            </button>
        </div>

        <!-- Status alerts -->
        <div id="alert-bar" class="hidden px-6 py-3 text-sm border-b border-gray-100 dark:border-gray-700/50"></div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-gray-100 dark:border-gray-700/50">
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">名前</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">メール</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">組織</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">ステータス</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">トライアル期間</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody id="client-list">
                    <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="hidden px-6 py-3 border-t border-gray-100 dark:border-gray-700/50 flex items-center justify-between text-sm text-gray-500"></div>
    </div>
</div>

<!-- Create Client Modal -->
<div id="create-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50" onclick="closeCreateModal()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#1e2235] rounded-xl shadow-xl w-full max-w-md border border-gray-200 dark:border-gray-700 relative">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700/50 flex items-center justify-between">
                <h3 class="text-base font-semibold text-gray-900 dark:text-white">新規クライアント作成</h3>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <form id="create-form" class="px-6 py-4 space-y-4">
                <div id="create-error" class="hidden text-sm text-red-500 bg-red-50 dark:bg-red-900/20 px-3 py-2 rounded-lg"></div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">名前 *</label>
                    <input type="text" name="name" required class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#161929] text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">名前（日本語）</label>
                    <input type="text" name="name_jp" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#161929] text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">メールアドレス *</label>
                    <input type="email" name="email" required class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#161929] text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">組織名</label>
                    <input type="text" name="organization_name" class="w-full px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 bg-white dark:bg-[#161929] text-gray-900 dark:text-gray-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeCreateModal()" class="px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200">キャンセル</button>
                    <button type="submit" id="create-btn" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors disabled:opacity-60">
                        作成して招待メール送信
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
(function() {
    var token = localStorage.getItem('aixis_token') || '';
    var headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    if (typeof getCSRFToken === 'function') headers['X-CSRF-Token'] = getCSRFToken();

    function showAlert(msg, type) {
        var bar = document.getElementById('alert-bar');
        bar.textContent = msg;
        bar.className = 'px-6 py-3 text-sm border-b border-gray-100 dark:border-gray-700/50 ' +
            (type === 'ok' ? 'bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300' :
             'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-300');
        setTimeout(function() { bar.className = 'hidden px-6 py-3 text-sm border-b'; }, 5000);
    }

    var statusLabels = {
        pending: ['招待中', 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300'],
        active: ['有効', 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300'],
        suspended: ['停止中', 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300'],
        expired: ['期限切れ', 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-400']
    };

    function formatDate(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
    }

    function trialInfo(c) {
        if (!c.trial_start || !c.trial_end) return '—';
        var now = new Date();
        var end = new Date(c.trial_end);
        var days = Math.ceil((end - now) / 86400000);
        if (c.account_status === 'expired') return formatDate(c.trial_start) + ' — ' + formatDate(c.trial_end);
        if (days <= 0) return '期限切れ';
        return '残り ' + days + '日（〜' + formatDate(c.trial_end) + '）';
    }

    function renderClients(data) {
        var tbody = document.getElementById('client-list');
        if (!data.items || data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">クライアントがまだ登録されていません</td></tr>';
            return;
        }
        var html = '';
        data.items.forEach(function(c) {
            var st = statusLabels[c.account_status] || ['不明', 'bg-gray-100 text-gray-500'];
            var actions = '';
            if (c.account_status === 'pending') {
                actions = '<button onclick="resendInvite(\'' + c.id + '\')" class="text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 text-xs font-medium">再送信</button>';
            } else if (c.account_status === 'active') {
                actions = '<button onclick="suspendClient(\'' + c.id + '\')" class="text-red-600 hover:text-red-800 dark:text-red-400 text-xs font-medium">停止</button>';
            } else if (c.account_status === 'suspended' || c.account_status === 'expired') {
                actions = '<button onclick="reactivateClient(\'' + c.id + '\')" class="text-green-600 hover:text-green-800 dark:text-green-400 text-xs font-medium">再有効化</button>';
            }

            html += '<tr class="border-b border-gray-50 dark:border-gray-700/30 hover:bg-gray-50 dark:hover:bg-gray-800/30">';
            html += '<td class="px-4 py-3 text-gray-900 dark:text-white font-medium">' + (c.name_jp || c.name) + '</td>';
            html += '<td class="px-4 py-3 text-gray-500 dark:text-gray-400">' + c.email + '</td>';
            html += '<td class="px-4 py-3 text-gray-500 dark:text-gray-400">' + (c.organization_name || '—') + '</td>';
            html += '<td class="px-4 py-3"><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium ' + st[1] + '">' + st[0] + '</span></td>';
            html += '<td class="px-4 py-3 text-xs text-gray-500 dark:text-gray-400">' + trialInfo(c) + '</td>';
            html += '<td class="px-4 py-3 text-right">' + actions + '</td>';
            html += '</tr>';
        });
        tbody.innerHTML = html;

        // Pagination
        var pgDiv = document.getElementById('pagination');
        if (data.total > data.per_page) {
            pgDiv.classList.remove('hidden');
            pgDiv.innerHTML = '<span>' + data.total + '件中 ' + ((data.page-1)*data.per_page+1) + '〜' + Math.min(data.page*data.per_page, data.total) + '件</span>';
        }
    }

    function loadClients(page) {
        fetch('/api/v1/clients?page=' + (page || 1), { headers: headers })
            .then(function(r) { return r.json(); })
            .then(renderClients)
            .catch(function(e) { showAlert('読み込みに失敗しました: ' + e.message, 'error'); });
    }

    // Actions
    window.suspendClient = function(id) {
        if (!confirm('このクライアントのアカウントを停止しますか？')) return;
        fetch('/api/v1/clients/' + id + '/suspend', { method: 'POST', headers: headers })
            .then(function(r) { if (!r.ok) throw new Error('失敗'); return r.json(); })
            .then(function() { showAlert('アカウントを停止しました', 'ok'); loadClients(); })
            .catch(function(e) { showAlert(e.message, 'error'); });
    };

    window.reactivateClient = function(id) {
        fetch('/api/v1/clients/' + id + '/reactivate', { method: 'POST', headers: headers })
            .then(function(r) { if (!r.ok) throw new Error('失敗'); return r.json(); })
            .then(function() { showAlert('アカウントを再有効化しました', 'ok'); loadClients(); })
            .catch(function(e) { showAlert(e.message, 'error'); });
    };

    window.resendInvite = function(id) {
        fetch('/api/v1/clients/' + id + '/resend-invite', { method: 'POST', headers: headers })
            .then(function(r) { if (!r.ok) throw new Error('失敗'); return r.json(); })
            .then(function() { showAlert('招待メールを再送信しました', 'ok'); loadClients(); })
            .catch(function(e) { showAlert(e.message, 'error'); });
    };

    // Create modal
    window.openCreateModal = function() { document.getElementById('create-modal').classList.remove('hidden'); };
    window.closeCreateModal = function() {
        document.getElementById('create-modal').classList.add('hidden');
        document.getElementById('create-form').reset();
        document.getElementById('create-error').classList.add('hidden');
    };

    document.getElementById('create-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var form = e.target;
        var btn = document.getElementById('create-btn');
        var errDiv = document.getElementById('create-error');
        errDiv.classList.add('hidden');
        btn.disabled = true;
        btn.textContent = '作成中...';

        var fd = new FormData(form);
        var payload = {
            email: fd.get('email'),
            name: fd.get('name'),
            name_jp: fd.get('name_jp') || null,
            organization_name: fd.get('organization_name') || null
        };

        fetch('/api/v1/clients', { method: 'POST', headers: headers, body: JSON.stringify(payload) })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                if (!res.ok) throw new Error(res.data.detail || '作成に失敗しました');
                closeCreateModal();
                showAlert('クライアントを作成し、招待メールを送信しました', 'ok');
                loadClients();
            })
            .catch(function(e) {
                errDiv.textContent = e.message;
                errDiv.classList.remove('hidden');
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = '作成して招待メール送信';
            });
    });

    // Initial load
    loadClients();
})();
</script>
{% endblock %}
