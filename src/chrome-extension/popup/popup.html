<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Aixis</h1>
    <span class="badge badge-idle" id="statusBadge">待機中</span>
  </div>

  <!-- Error display -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Section 1: Settings -->
  <div class="section active" id="settingsSection">
    <label>APIキー</label>
    <input type="password" id="apiKeyInput" placeholder="axk_...">

    <label>プラットフォームURL</label>
    <input type="text" id="platformUrlInput" placeholder="https://platform.aixis.jp">

    <button class="btn btn-primary" id="saveSettingsBtn">接続</button>
  </div>

  <!-- Section 2: Session setup -->
  <div class="section" id="setupSection">
    <label>対象ツール</label>
    <div class="tool-picker" id="toolPicker">
      <input type="text" id="toolSearch" class="tool-search" placeholder="ツール名で検索...">
      <div class="tool-list" id="toolList">
        <div class="tool-list-empty">読み込み中...</div>
      </div>
      <input type="hidden" id="toolSelectValue" value="">
    </div>

    <label>記録モード</label>
    <div class="radio-group">
      <label><input type="radio" name="mode" value="protocol" checked> プロトコル</label>
      <label><input type="radio" name="mode" value="freeform"> フリーフォーム</label>
    </div>

    <button class="btn btn-primary" id="startSessionBtn">セッション開始</button>
    <button class="btn btn-text" id="changeSettingsBtn">設定変更</button>
  </div>

  <!-- Section 3: Protocol recording -->
  <div class="section" id="protocolSection">
    <div class="progress-bar">
      <div class="fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0</div>

    <div class="test-card" id="testCard">
      <div class="category" id="testCategory"></div>
      <div class="prompt" id="testPrompt"></div>
      <button class="copy-btn" id="copyPromptBtn">コピー</button>
      <div class="expected" id="testExpected"></div>
    </div>

    <div class="response-input-area" style="margin: 8px 0;">
      <textarea id="responseTextInput" placeholder="AIの応答をここに貼り付け（任意）" rows="3"
        style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;resize:vertical;font-family:inherit;"></textarea>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="nextTestBtn">次へ</button>
      <button class="btn btn-ghost" id="skipTestBtn">スキップ</button>
      <button class="btn btn-capture" id="manualCaptureBtn1" title="現在の画面を追加記録">📷</button>
    </div>

    <div class="session-end-area">
      <button class="btn btn-text btn-danger-text" id="endProtocolBtn">セッションを終了する</button>
    </div>
  </div>

  <!-- Section 4: Freeform recording -->
  <div class="section" id="freeformSection">
    <div class="recording-status">
      <div class="count" id="freeformCount">0</div>
      <div class="label">記録された操作</div>
    </div>

    <div class="action-bar" style="justify-content: center;">
      <button class="btn btn-capture" id="manualCaptureBtn2" title="現在の画面を追加記録">📷 画面を記録</button>
    </div>

    <button class="btn btn-primary" id="stopFreeformBtn">記録を完了する</button>
  </div>

  <!-- Section 5: Complete -->
  <div class="section" id="completeSection">
    <div class="summary-stats">
      <div class="stat-card">
        <div class="value" id="summaryTotal">0</div>
        <div class="label">記録数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="summaryStatus">-</div>
        <div class="label">ステータス</div>
      </div>
    </div>

    <a class="dashboard-link" id="dashboardLink" href="#" target="_blank">
      ダッシュボードで確認 →
    </a>

    <button class="btn btn-secondary" id="newSessionBtn" style="margin-top: 12px;">新しいセッション</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
