# 検証対象ツールの設定例
# 実際の検証対象に合わせてセレクタ等を変更してください

name: "example-ai-chat"
url: "https://example.com/chat"
executor_type: "playwright"

# CSS selectors for the chat interface
input_selector: "textarea[placeholder*='メッセージ'], textarea.chat-input, #prompt-textarea"
submit_selector: "button[type='submit'], button.send-button, button[aria-label='送信']"
response_selector: ".response-text, .message-content, .assistant-message:last-child"

# Timing
wait_for_response_timeout_ms: 60000
inter_prompt_delay_ms: 2000

# Browser settings
headless: true
locale: "ja-JP"

