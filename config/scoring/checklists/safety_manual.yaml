axis: safety
axis_name_jp: 信頼性・安全性
axis_name_en: Safety
description: >
  AIツールのセキュリティポリシー、コンプライアンス対応、データ保護体制を
  手動で評価するチェックリスト。自動テストでは検証できないポリシー面・
  認証取得・法的対応・インシデント体制などを対象とする。

items:
  - id: "SF-001"
    name_jp: "学習データオプトアウト設定"
    name_en: "Training data opt-out"
    weight: 3.0
    scoring_guide: |
      0: ユーザーデータがモデル学習に使用され、オプトアウト手段が一切ない
      1: オプトアウト申請は可能だが、手続きが煩雑で反映に時間がかかる
      2: 設定画面からオプトアウト可能だが、一部データ(メタデータ等)は除外されない
      3: 明確なオプトアウト設定があり、ユーザーデータの学習利用を停止可能
      4: デフォルトでオプトアウト、または組織管理者が一括でオプトアウト設定可能
      5: デフォルトで学習に一切使用しないことを契約・ポリシーで保証、第三者監査済み
    category: "データプライバシー"

  - id: "SF-002"
    name_jp: "SSO/SAML対応"
    name_en: "SSO / SAML support"
    weight: 2.0
    scoring_guide: |
      0: SSO/SAML非対応、独自認証のみ
      1: SSO対応を予定しているがまだ未実装
      2: Google/Microsoft等の主要IdPとのSSO連携のみ対応(SAML非対応)
      3: SAML 2.0対応、主要IdP(Okta, Azure AD等)との連携実績あり
      4: SAML/OIDC両対応、SCIM自動プロビジョニング対応
      5: 全主要プロトコル対応、SCIM/JIT、カスタムIdP対応、SSO強制設定可能
    category: "認証・アクセス制御"

  - id: "SF-003"
    name_jp: "データレジデンシー（日本リージョン）"
    name_en: "Data residency - Japan region"
    weight: 2.5
    scoring_guide: |
      0: データ保存先の地域が不明、または日本国外のみ
      1: データは日本国外(米国等)に保存、日本リージョンの提供予定なし
      2: 日本リージョンを検討中だが未提供、データ保存先は限定的に選択可能
      3: 日本リージョン(東京/大阪)でのデータ保存が可能(オプション)
      4: 日本リージョンがデフォルト選択可能、データの越境移転を管理者が制御可能
      5: 日本国内完結のデータ処理を保証、ISMAP対応、政府ガイドライン準拠
    category: "データプライバシー"

  - id: "SF-004"
    name_jp: "著作権侵害時の補償規定"
    name_en: "IP indemnification clause"
    weight: 2.0
    scoring_guide: |
      0: AI生成物の著作権侵害に関する規定が一切ない
      1: 利用規約に著作権免責条項があり、全リスクがユーザー負担
      2: 著作権に関する言及はあるが、具体的な補償規定はない
      3: AI出力物による著作権侵害時の基本的な補償規定が存在する
      4: 明確なIP補償条項あり、訴訟費用のカバーと上限額が明記されている
      5: 包括的なIP補償、無制限の補償上限、著作権フィルター機能搭載
    category: "法的保護"

  - id: "SF-005"
    name_jp: "SOC2/ISMS認証"
    name_en: "SOC2 / ISMS certification"
    weight: 2.0
    scoring_guide: |
      0: セキュリティ認証を一切取得しておらず、取得予定もない
      1: セキュリティ認証の取得を計画中だが、未取得
      2: SOC2 Type I またはISO 27001のいずれかを取得済み
      3: SOC2 Type II またはISMS(ISO 27001)を取得済み、レポート閲覧可能
      4: SOC2 Type II + ISO 27001 の両方を取得済み
      5: SOC2 Type II + ISO 27001 + ISO 27017/27018 + 追加認証、年次更新済み
    category: "コンプライアンス"

  - id: "SF-006"
    name_jp: "データ暗号化（転送中/保存時）"
    name_en: "Data encryption (in-transit / at-rest)"
    weight: 2.0
    scoring_guide: |
      0: 暗号化の実装状況が不明、または暗号化なし
      1: TLS 1.2での転送中暗号化のみ、保存時暗号化なし
      2: 転送中(TLS 1.2+)と保存時の暗号化あり(プロバイダー管理鍵)
      3: TLS 1.3対応、AES-256保存時暗号化、暗号化ポリシーが文書化されている
      4: 上記に加え、顧客管理鍵(BYOK/CMK)オプションが利用可能
      5: エンドツーエンド暗号化、BYOK、HSM対応、ゼロナレッジアーキテクチャ
    category: "データ保護"

  - id: "SF-007"
    name_jp: "アクセスログ/監査ログ"
    name_en: "Access logs / audit logs"
    weight: 1.5
    scoring_guide: |
      0: ログ機能が存在しない
      1: 基本的なログイン履歴のみ閲覧可能
      2: ユーザーのログイン/ログアウト履歴と基本操作ログが閲覧可能
      3: 詳細な操作ログ(API呼出、データアクセス等)が閲覧・検索可能
      4: 包括的な監査ログ、SIEM連携対応、カスタムアラート設定可能
      5: 改ざん防止ログ、リアルタイムSIEM連携、コンプライアンスレポート自動生成
    category: "データ保護"

  - id: "SF-008"
    name_jp: "二要素認証対応"
    name_en: "Two-factor authentication support"
    weight: 1.5
    scoring_guide: |
      0: 二要素認証(2FA)非対応
      1: SMS認証のみ対応(SIMスワップ攻撃リスクあり)
      2: TOTP(Google Authenticator等)対応
      3: TOTP + SMS対応、管理者による2FA強制設定が可能
      4: TOTP + WebAuthn/FIDO2対応、組織全体への2FA強制ポリシー設定可能
      5: 多要素認証(MFA)完全対応、ハードウェアキー対応、リスクベース認証搭載
    category: "認証・アクセス制御"

  - id: "SF-009"
    name_jp: "GDPR/個人情報保護法対応"
    name_en: "GDPR / Japan APPI compliance"
    weight: 1.5
    scoring_guide: |
      0: プライバシーポリシーが存在しない、またはGDPR/APPI対応が一切不明
      1: 基本的なプライバシーポリシーはあるが、GDPR/APPI固有の要件に未対応
      2: GDPR対応を謳っているが、データ主体の権利行使手段が限定的
      3: GDPR/APPI対応、データ削除要求・アクセス要求への対応プロセスが明確
      4: DPA(データ処理契約)提供、DPO設置、定期的なプライバシー影響評価実施
      5: GDPR/APPI完全準拠、越境移転のSCC対応、プライバシーバイデザイン実装
    category: "コンプライアンス"

  - id: "SF-010"
    name_jp: "インシデント対応体制"
    name_en: "Incident response capability"
    weight: 1.0
    scoring_guide: |
      0: インシデント対応ポリシーが存在しない、またはステータスページがない
      1: ステータスページはあるが、インシデント対応ポリシーが非公開
      2: インシデント対応ポリシーが公開されているが、通知体制が不十分
      3: 明確なインシデント対応ポリシー、72時間以内の通知義務を明記
      4: 24時間以内の通知、リアルタイムステータスページ、事後分析レポート公開
      5: 1時間以内の初期通知、専任CSIRT、定期的な訓練実施、透明な事後報告
    category: "法的保護"
