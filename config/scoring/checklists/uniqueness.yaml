axis: uniqueness
axis_name_jp: 革新性
axis_name_en: Uniqueness
description: >
  AIツールが独自の技術的優位性を持っているかを評価するチェックリスト。
  単なるAPIラッパーではなく、独自モデル・独自データ・特許技術などの
  差別化要素があるか、長期的な技術的競争力を維持できるかを分析する。

items:
  - id: "UQ-001"
    name_jp: "独自モデル/技術の有無"
    name_en: "Proprietary model / technology"
    weight: 3.0
    scoring_guide: |
      0: 既存LLM APIを呼び出すだけの完全なラッパー製品
      1: 既存モデルにプロンプトエンジニアリングやRAGを追加した程度
      2: 既存モデルの上にファインチューニングや独自後処理を実装
      3: 独自のモデルまたは技術コンポーネントを一部保有(特定タスク向け等)
      4: 主要機能に独自モデルを使用、論文発表や技術ブログで技術力を公開
      5: 完全独自のFoundationモデルを開発・運用、業界トップクラスの研究チーム
    category: "技術的独自性"

  - id: "UQ-002"
    name_jp: "ラッパー製品リスク"
    name_en: "Wrapper product risk"
    weight: 2.5
    scoring_guide: |
      0: 単一LLMプロバイダーに完全依存、APIキー設定を変えただけの製品
      1: 単一プロバイダー依存だが、独自のUI/UXを提供
      2: 複数LLMプロバイダーを利用可能だが、コア機能は外部API依存
      3: 外部APIを利用するが、独自の前処理/後処理パイプラインで付加価値あり
      4: 外部APIはオプションとして利用、コア機能は独自技術で実現
      5: 外部API非依存、独自技術スタック、サプライチェーンリスクが極めて低い
    category: "技術的独自性"

  - id: "UQ-003"
    name_jp: "開発ロードマップの明確性"
    name_en: "Development roadmap clarity"
    weight: 2.0
    scoring_guide: |
      0: ロードマップが一切公開されておらず、今後の方向性が不明
      1: 「近日公開」等の曖昧な予告のみ、具体的な計画なし
      2: 大まかな機能追加予定がブログ等で言及されている程度
      3: 四半期単位のロードマップが公開、主要機能の開発計画が明確
      4: 詳細なロードマップ公開、ユーザーからのフィードバック反映プロセスあり
      5: 透明なロードマップ、ユーザー投票機能、定期的な進捗報告、ベータプログラム
    category: "持続性"

  - id: "UQ-004"
    name_jp: "アップデート頻度"
    name_en: "Update frequency"
    weight: 1.5
    scoring_guide: |
      0: 過去6ヶ月以上アップデートなし、開発が停滞している兆候
      1: 半年に1回程度のアップデート、バグ修正が中心
      2: 四半期に1回程度のアップデート、小規模な機能追加あり
      3: 月1回程度のアップデート、機能改善とバグ修正が継続的
      4: 隔週〜月2回のアップデート、ユーザー要望の反映が早い
      5: 週次以上のアップデート、変更ログが詳細、迅速なバグ修正とイテレーション
    category: "持続性"

  - id: "UQ-005"
    name_jp: "独自データベース/学習データ"
    name_en: "Proprietary database / training data"
    weight: 2.0
    scoring_guide: |
      0: 公開データセットのみ使用、独自データ資産なし
      1: 公開データ中心だが、一部キュレーションされたデータセットあり
      2: 特定ドメインの独自データセットを一部保有
      3: 独自に収集・構築した大規模データセットを保有し、継続的に拡充
      4: 業界固有の高品質データセットを保有、データパイプラインが確立
      5: 競合が容易に複製できない大規模独自データ資産、データのネットワーク効果あり
    category: "技術的独自性"

  - id: "UQ-006"
    name_jp: "特許/知的財産"
    name_en: "Patents / intellectual property"
    weight: 1.5
    scoring_guide: |
      0: 特許・知的財産の保有が確認できない
      1: 特許出願中だが、まだ取得に至っていない
      2: 基本的な特許を1-2件保有
      3: コア技術に関する複数の特許を保有、特許ポートフォリオを構築中
      4: 広範な特許ポートフォリオを保有、主要技術領域をカバー
      5: 業界をリードする特許群を保有、特許が明確な参入障壁として機能
    category: "競争障壁"

  - id: "UQ-007"
    name_jp: "競合との機能差別化"
    name_en: "Feature differentiation vs. competitors"
    weight: 2.0
    scoring_guide: |
      0: 競合製品と機能的にほぼ同一、差別化ポイントが見当たらない
      1: UIの違い程度の差別化で、コア機能は競合と同等
      2: 1-2個の差別化機能があるが、競合が容易に模倣可能
      3: 明確な差別化機能があり、特定ユースケースで競合より優れている
      4: 複数の強力な差別化機能、競合が短期間では模倣困難な優位性
      5: 業界を定義するような革新的機能、新カテゴリーを創出するレベルの差別化
    category: "競争障壁"

  - id: "UQ-008"
    name_jp: "エコシステム/API提供"
    name_en: "Ecosystem / API availability"
    weight: 1.5
    scoring_guide: |
      0: APIやプラグイン機構が一切なく、拡張性がない
      1: 限定的なAPIが存在するが、ドキュメントが不十分
      2: 基本的なREST APIが提供され、ドキュメントあり
      3: 充実したAPIとSDK提供、サードパーティ連携が可能
      4: 豊富なAPI/SDK、プラグインマーケットプレイス、開発者向けサンドボックス
      5: オープンなエコシステム、活発なマーケットプレイス、パートナープログラム
    category: "エコシステム"

  - id: "UQ-009"
    name_jp: "コミュニティ/開発者サポート"
    name_en: "Community / developer support"
    weight: 1.0
    scoring_guide: |
      0: コミュニティが存在しない、開発者向けリソースなし
      1: 基本的なドキュメントのみ、コミュニティフォーラムなし
      2: ドキュメントとFAQあり、非公式コミュニティが小規模に存在
      3: 公式コミュニティフォーラム、開発者ドキュメント、サンプルコード提供
      4: 活発なコミュニティ、定期的なウェビナー/ミートアップ、技術ブログ
      5: 大規模な開発者コミュニティ、年次カンファレンス、認定プログラム、OSSへの貢献
    category: "エコシステム"

  - id: "UQ-010"
    name_jp: "長期パートナーシップ可能性"
    name_en: "Long-term partnership potential"
    weight: 1.5
    scoring_guide: |
      0: スタートアップ初期段階で事業継続性に重大なリスク
      1: 資金調達はあるが、収益モデルが不明確で持続性に懸念
      2: 事業は安定しているが、市場シェアが小さく将来が不透明
      3: 安定した収益基盤と成長トレンド、主要投資家からの支援あり
      4: 確立された市場ポジション、大企業との戦略的パートナーシップ実績
      5: 業界リーダーとしての地位確立、IPO済みまたは大手企業傘下、高い事業安定性
    category: "エコシステム"
