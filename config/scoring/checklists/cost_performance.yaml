axis: cost_performance
axis_name_jp: 費用対効果
axis_name_en: Cost Performance
description: >
  AIツールの総保有コスト(TCO)を多角的に評価するチェックリスト。
  単月の料金だけでなく、3年間の運用コスト、隠れコスト、解約時の移行コスト、
  値上げリスクなどを含めた包括的な費用対効果分析を行う。

items:
  - id: "CP-001"
    name_jp: "料金体系の透明性"
    name_en: "Pricing transparency"
    weight: 2.0
    scoring_guide: |
      0: 料金ページが存在しない、または見積もり依頼が必須で価格が一切非公開
      1: 基本料金のみ公開で、追加料金や条件が不明瞭
      2: 主要プランの価格は公開だが、従量課金部分や上位プランが不透明
      3: 全プランの価格と主要な従量課金の単価が公開されている
      4: 全プランの価格・従量課金・追加オプションが明確に公開されている
      5: 料金シミュレーター提供、全コスト要素が完全に透明で、請求書サンプルも公開
    category: "料金透明性"

  - id: "CP-002"
    name_jp: "無料プラン/トライアルの充実度"
    name_en: "Free plan / trial availability"
    weight: 1.5
    scoring_guide: |
      0: 無料プラン・トライアルが一切なく、事前検証不可
      1: デモ動画のみ提供、実際の操作は不可
      2: 7日以内の短期トライアルのみ、機能制限あり
      3: 14日以上のトライアルまたは機能制限付き無料プランあり
      4: 30日トライアルまたは実用的な無料プランあり、主要機能を検証可能
      5: 恒久的な無料プランで主要機能が利用可能、またはPoCサポート体制あり
    category: "料金透明性"

  - id: "CP-003"
    name_jp: "従量課金の上限設定機能"
    name_en: "Usage cap / spending limit controls"
    weight: 2.0
    scoring_guide: |
      0: 従量課金に上限設定機能がなく、請求額の予測・制御が不可能
      1: 利用量の確認のみ可能だが、上限設定や通知機能なし
      2: 月次の利用量通知はあるが、自動停止や上限設定は不可
      3: 利用量のアラート通知と手動での上限設定が可能
      4: 組織・チーム・ユーザー単位での上限設定と自動停止機能あり
      5: きめ細かい予算管理ダッシュボード、リアルタイム監視、自動スケーリング制御あり
    category: "コスト管理"

  - id: "CP-004"
    name_jp: "3年TCO見積もり"
    name_en: "3-year total cost of ownership estimate"
    weight: 2.5
    scoring_guide: |
      0: TCO算出に必要な情報が入手不可能
      1: 月額料金のみ判明し、利用量増加時のコスト推計が困難
      2: 基本的なコスト構造は把握可能だが、スケーリングコストが不明確
      3: 利用規模別の料金表があり、概算のTCO計算が可能
      4: ボリュームディスカウントや年間契約割引を含むTCO計算が可能
      5: 公式TCO計算ツール提供、利用量成長シナリオ別の正確な3年コスト試算が可能
    category: "コスト管理"

  - id: "CP-005"
    name_jp: "隠れコストの有無"
    name_en: "Hidden costs"
    weight: 2.0
    scoring_guide: |
      0: 契約後に多額の追加コスト(導入費、研修費、必須アドオン等)が判明
      1: 必須の有料アドオンや初期導入費用が事前に明示されていない
      2: 一部のアドオン料金が不明確、またはAPI利用料が別途必要
      3: 主要なコスト要素は明示されているが、一部オプション費用の記載が不十分
      4: ほぼ全てのコスト要素が事前に確認可能で、追加費用のサプライズなし
      5: 全コストが完全に明示、導入費・研修費・サポート費すべて込み、隠れコストゼロ
    category: "コスト管理"

  - id: "CP-006"
    name_jp: "値上げリスク評価"
    name_en: "Price increase risk assessment"
    weight: 1.5
    scoring_guide: |
      0: 過去に大幅な値上げ実績があり、価格変更の事前通知なし
      1: 値上げポリシーが不明で、過去の価格変更履歴も非公開
      2: 値上げ実績はあるが、ある程度の事前通知がされている
      3: 価格変更ポリシーが明示されており、年1回程度の見直し
      4: 契約期間中の価格固定が保証、値上げ時は90日以上の事前通知
      5: 長期価格固定保証(2年以上)、または値上げ上限条項が契約に明記
    category: "リスク管理"

  - id: "CP-007"
    name_jp: "解約時のデータ移行コスト"
    name_en: "Switching costs at cancellation"
    weight: 2.0
    scoring_guide: |
      0: データエクスポート機能なし、解約時にデータが完全に失われる
      1: データエクスポートが限定的(一部データのみ、独自形式のみ)
      2: 主要データのエクスポートは可能だが、手動作業が多く移行コストが高い
      3: 標準形式(CSV/JSON等)でのエクスポートが可能、APIによる一括取得も対応
      4: 包括的なデータエクスポート機能、移行ガイド提供、解約後もデータ保持期間あり
      5: 完全なデータポータビリティ、移行支援サービス提供、ベンダーロックインなし
    category: "リスク管理"

  - id: "CP-008"
    name_jp: "競合比較での価格競争力"
    name_en: "Price competitiveness vs. competitors"
    weight: 1.5
    scoring_guide: |
      0: 同等機能の競合製品と比較して2倍以上の価格差
      1: 競合より50%以上高い価格設定
      2: 競合より20-50%高いが、一部機能で差別化あり
      3: 競合と同等の価格帯、機能対価格比が業界標準レベル
      4: 競合より10-20%安い、またはコストパフォーマンスで明確な優位性
      5: 業界最安水準かつ機能充実、または価格あたりの提供価値が圧倒的に高い
    category: "競合比較"

  - id: "CP-009"
    name_jp: "ROI試算の容易さ"
    name_en: "Ease of ROI calculation"
    weight: 1.0
    scoring_guide: |
      0: ROI試算に必要な情報(生産性向上の指標等)が一切提供されていない
      1: 一般的な導入事例のみで、自社環境でのROI試算が困難
      2: 基本的なベネフィット情報はあるが、定量的なROI計算材料が不足
      3: ROIの計算に使える定量的な指標やベンチマークデータが提供されている
      4: ROI計算テンプレートや導入効果の具体的な数値実績が公開されている
      5: カスタムROI計算ツール提供、業種別の導入効果データベースあり
    category: "競合比較"

  - id: "CP-010"
    name_jp: "契約の柔軟性（月額/年額/カスタム）"
    name_en: "Contract flexibility (monthly / annual / custom)"
    weight: 1.0
    scoring_guide: |
      0: 年間契約のみで途中解約不可、契約オプションが一切ない
      1: 年間契約が必須で、月額プランは提供なし
      2: 月額・年額の選択は可能だが、プラン変更に制約あり
      3: 月額・年額の選択可能、プランのアップグレード/ダウングレードが比較的容易
      4: 月額/年額/カスタム契約対応、プラン変更が即座に反映、日割り計算対応
      5: 完全にフレキシブルな契約(従量課金含む)、即時プラン変更、日割り返金対応
    category: "契約条件"
