axis: practicality
axis_name_jp: 実務適性
axis_name_en: Practicality
description: >
  AIツールの実際の業務運用における適性を手動で評価するチェックリスト。
  チーム利用時の権限管理、オンボーディング、外部ツール連携、サポート品質など
  自動テストでは検証できない実務面の機能・体制を対象とする。

items:
  - id: "PR-001"
    name_jp: "チーム共有・権限管理機能"
    name_en: "Team sharing and access control"
    weight: 2.5
    scoring_guide: |
      0: シングルユーザー専用で、チーム利用機能が一切ない
      1: 複数ユーザーアカウントは作成可能だが、権限管理機能なし
      2: 基本的なロール(管理者/一般)の区分のみ
      3: 複数ロール設定、プロジェクト単位の共有、基本的なアクセス制御が可能
      4: きめ細かいロールベースアクセス制御(RBAC)、チーム/部門単位の管理が可能
      5: カスタムロール作成、属性ベースアクセス制御(ABAC)、監査機能付き権限管理
    category: "チーム管理"

  - id: "PR-002"
    name_jp: "オンボーディングの容易さ"
    name_en: "Ease of onboarding"
    weight: 2.0
    scoring_guide: |
      0: ドキュメントもチュートリアルもなく、独力での導入が極めて困難
      1: 基本的なドキュメントはあるが、初期設定が複雑でIT部門の支援が必須
      2: セットアップガイドがあり、技術者なら1日以内に基本設定が可能
      3: ステップバイステップのオンボーディングウィザード、非技術者でも設定可能
      4: インタラクティブチュートリアル、テンプレート、30分以内に基本利用開始可能
      5: ワンクリックセットアップ、AI支援オンボーディング、5分以内に即座に利用開始
    category: "導入・定着"

  - id: "PR-003"
    name_jp: "ヘルプドキュメントの充実度"
    name_en: "Help documentation quality"
    weight: 1.5
    scoring_guide: |
      0: ヘルプドキュメントが存在しない
      1: 最低限のFAQのみ、機能の網羅性が著しく低い
      2: 基本機能のドキュメントはあるが、情報が古い、または不完全
      3: 全機能をカバーするドキュメント、検索機能付き、定期的に更新
      4: 充実したドキュメント、動画チュートリアル、ユースケース別ガイドあり
      5: 多言語対応の包括的ドキュメント、インタラクティブサンプル、ナレッジベース、日本語完全対応
    category: "導入・定着"

  - id: "PR-004"
    name_jp: "Slack/Teams連携"
    name_en: "Slack / Microsoft Teams integration"
    weight: 2.0
    scoring_guide: |
      0: Slack/Teamsとの連携機能が一切ない
      1: Webhook経由の通知送信のみ可能
      2: Slack連携のみ対応、基本的な通知とコマンド実行が可能
      3: Slack・Teams両方に対応、通知・コマンド実行・結果共有が可能
      4: ネイティブアプリとしてSlack/Teamsに統合、スレッド内で操作可能
      5: 高度なSlack/Teams統合、ワークフロー自動化、チャンネル別設定、Bot対話型操作
    category: "外部連携"

  - id: "PR-005"
    name_jp: "ファイル形式の互換性"
    name_en: "File format compatibility"
    weight: 1.5
    scoring_guide: |
      0: 対応ファイル形式が極端に少ない(1-2形式のみ)
      1: テキストベースの基本形式のみ対応(TXT, CSV程度)
      2: 主要なオフィス形式(DOCX, XLSX, PDF)に対応
      3: オフィス形式に加え、画像・マークダウン等の幅広い形式に対応
      4: 上記に加え、専門形式(CAD, コードファイル等)にも対応、バッチ処理可能
      5: ほぼ全てのファイル形式に対応、自動形式変換、大容量ファイル処理も高速
    category: "外部連携"

  - id: "PR-006"
    name_jp: "API/Zapier連携"
    name_en: "API / Zapier integration"
    weight: 1.5
    scoring_guide: |
      0: APIもiPaaS連携も提供されていない
      1: 非公式または限定的なAPIのみ(レート制限が厳しい、機能が少ない)
      2: 基本的なREST APIが提供されているが、Zapier等のiPaaS連携はなし
      3: 充実したAPIとZapier連携が利用可能、主要な操作をカバー
      4: API + Zapier/Make/Power Automate対応、Webhook、イベント駆動連携可能
      5: GraphQL/REST API完備、全主要iPaaS対応、カスタムコネクタ作成機能あり
    category: "外部連携"

  - id: "PR-007"
    name_jp: "カスタマーサポート品質"
    name_en: "Customer support quality"
    weight: 2.0
    scoring_guide: |
      0: サポート窓口が存在しない、問い合わせ手段が不明
      1: メールサポートのみ、応答に数日〜1週間かかる
      2: メール + チャットサポートあり、24時間以内の応答
      3: 日本語サポート対応、チャット/メール/電話、営業時間内の即時対応
      4: 24/7サポート、日本語専任チーム、SLA付き(応答時間保証)
      5: 専任カスタマーサクセスマネージャー、日本語24/7対応、テクニカルアドバイザリー
    category: "サポート体制"

  - id: "PR-008"
    name_jp: "モバイル対応"
    name_en: "Mobile support"
    weight: 1.0
    scoring_guide: |
      0: モバイル対応なし、スマートフォンでは利用不可
      1: レスポンシブWebだが、モバイルでの操作性が著しく低い
      2: レスポンシブWebで基本操作は可能、一部機能は制限あり
      3: モバイルアプリ(iOS/Android)を提供、主要機能が利用可能
      4: 高品質なモバイルアプリ、オフライン対応、プッシュ通知あり
      5: デスクトップと同等のフル機能モバイルアプリ、タブレット最適化、ウィジェット対応
    category: "アクセシビリティ"

  - id: "PR-009"
    name_jp: "管理者向けダッシュボード"
    name_en: "Admin dashboard"
    weight: 1.5
    scoring_guide: |
      0: 管理者向けの管理画面・ダッシュボードが存在しない
      1: 基本的なユーザー一覧と利用状況の概要のみ
      2: ユーザー管理、基本的な利用統計の確認が可能
      3: ユーザー管理、利用量分析、コスト管理、基本的なレポート機能
      4: 詳細な分析ダッシュボード、カスタムレポート、利用ポリシー設定、アラート機能
      5: 高度な分析、AI利用ガバナンス機能、コンプライアンスダッシュボード、API経由でのデータ取得
    category: "チーム管理"

  - id: "PR-010"
    name_jp: "テンプレート/ワークフロー機能"
    name_en: "Templates / workflow features"
    weight: 1.5
    scoring_guide: |
      0: テンプレートやワークフロー機能が一切ない
      1: 数個の固定テンプレートのみ、カスタマイズ不可
      2: 基本的なテンプレートライブラリあり、簡易なカスタマイズが可能
      3: 豊富なテンプレート、カスタムテンプレート作成・共有機能あり
      4: テンプレート + マルチステップワークフロー構築、条件分岐対応
      5: 高度なワークフローエンジン、チーム間テンプレート共有、バージョン管理、自動実行
    category: "業務効率化"
