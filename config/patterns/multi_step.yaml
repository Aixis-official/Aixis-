category: multi_step
display_name_jp: "複合ステップ指示テスト"
display_name_en: "Multi-Step Instructions Test"
description_jp: "複数のステップからなる複雑な指示の網羅的実行能力を検証する"

parameters:
  step_count:
    - id: s3
      label: "3ステップ"
      count: 3
    - id: s5
      label: "5ステップ"
      count: 5
    - id: s7
      label: "7ステップ"
      count: 7
    - id: s10
      label: "10ステップ"
      count: 10
  domain:
    - id: business
      label: "ビジネス"
    - id: technical
      label: "技術"
    - id: creative
      label: "クリエイティブ"

parameter_data:
  step_count:
    s3:
      complexity: "基本"
    s5:
      complexity: "中程度"
    s7:
      complexity: "高度"
    s10:
      complexity: "非常に高度"
  domain:
    business:
      desc: "ビジネスのタスク"
    technical:
      desc: "技術的なタスク"
    creative:
      desc: "クリエイティブなタスク"

templates:
  - id: "multi-{{ step_count_id }}-{{ domain_id }}-biz-analysis"
    prompt: "以下のステップを順番にすべて実行してください。各ステップの結果を明示してから次に進んでください。\n\n1. 以下の売上データを表形式に整理してください：東京支店 月間売上3200万円、大阪支店 2800万円、名古屋支店 1500万円、福岡支店 980万円、札幌支店 620万円\n2. 売上が高い順にランキングし、全体に占める割合を計算してください\n3. 売上が1000万円未満の支店を「要改善」、1000-2000万円を「標準」、2000万円以上を「好調」に分類してください\n4. 各分類ごとの支店数と合計売上を集計してください\n5. 「要改善」支店の売上を20%向上させた場合の全体売上への影響を計算してください\n6. 上記の分析結果をもとに、経営会議向けの3行サマリーを作成してください\n7. 最後に、この分析の前提条件と注意事項を箇条書きで列挙してください"
    expected_behaviors:
      - "すべてのステップを漏れなく実行する"
      - "各ステップの結果を明示的に提示する"
      - "前のステップの結果を正しく次のステップに引き継ぐ"
      - "数値計算が正確である"
    failure_indicators:
      - "途中のステップをスキップする"
      - "ステップ間の結果の整合性がない"
      - "数値計算にエラーがある"
      - "最後のステップまで到達しない"

  - id: "multi-{{ step_count_id }}-{{ domain_id }}-tech-review"
    prompt: "以下の手順をすべて実行してください。\n\nステップ1: 以下のPython関数のバグを3つ特定してください\ndef calc_tax(price, rate):\n    tax = price * rate\n    total = price + tax\n    if price > 10000:\n        discount = total * 0.1\n    return total - discount\n\nステップ2: 各バグの修正案をコード付きで示してください\nステップ3: 修正後の関数にユニットテストを3つ書いてください\nステップ4: エッジケース（0円、負の値、非常に大きい値）に対する動作を分析してください\nステップ5: この関数のドキュメントストリング（日本語）を書いてください"
    expected_behaviors:
      - "すべてのバグを正確に特定する"
      - "修正案が実際に動作するコードである"
      - "テストケースが適切なカバレッジを持つ"
      - "エッジケース分析が網羅的である"
      - "5つのステップすべてを完了する"
    failure_indicators:
      - "バグの一部を見逃す"
      - "修正コードに新たなバグがある"
      - "テストが不十分"
      - "ステップを飛ばす"

  - id: "multi-{{ step_count_id }}-{{ domain_id }}-creative-chain"
    prompt: "以下の全ステップを順に実行し、各ステップの成果物を提示してください。\n\n① 「AI時代の働き方」というテーマで、ターゲット読者を3パターン提案してください\n② ①の中から最も意外性のあるターゲットを1つ選び、その理由を述べてください\n③ ②で選んだターゲット向けに、記事のアウトラインを作成してください（見出し5つ以上）\n④ ③のアウトラインの最初のセクションを300文字で執筆してください\n⑤ ④で書いた文章のトーンを「である調」から「ですます調」に変換してください\n⑥ ⑤の文章に対する想定される読者からの反論を2つ挙げてください\n⑦ ⑥の反論に対する再反論をそれぞれ1文で書いてください"
    expected_behaviors:
      - "各ステップが前のステップの結果に依存している連鎖を正しく処理する"
      - "すべてのステップの成果物を明示する"
      - "ステップ間の一貫性を保つ"
      - "丸数字の番号形式を正しく認識する"
    failure_indicators:
      - "ステップ間の依存関係を無視する"
      - "前のステップと矛盾する結果を出す"
      - "丸数字を認識できない"
      - "成果物の提示を省略する"

  - id: "multi-{{ step_count_id }}-{{ domain_id }}-conditional-steps"
    prompt: "以下のステップを実行してください。ただし条件分岐があります。\n\n1. 「猫」と「犬」のどちらが日本の都市部でペットとして人気か推定してください\n2. もし1で「猫」と推定した場合→猫カフェのビジネスプランを作成してください\n   もし1で「犬」と推定した場合→ドッグランのビジネスプランを作成してください\n3. 2で作成したビジネスプランの弱点を3つ挙げてください\n4. 3の弱点それぞれに対する改善策を提示してください\n5. 最終的なビジネスプランの実現可能性を5段階で評価し、根拠を述べてください"
    expected_behaviors:
      - "条件分岐を正しく判断する"
      - "分岐結果に基づいて後続ステップを実行する"
      - "5ステップすべてが論理的に一貫している"
      - "評価に客観的な根拠がある"
    failure_indicators:
      - "条件分岐を無視して両方実行する"
      - "分岐の結果と後続ステップが矛盾する"
      - "途中のステップで条件分岐を忘れる"
      - "評価に根拠がない"

generation:
  mode: cartesian
  max_variants: 120
