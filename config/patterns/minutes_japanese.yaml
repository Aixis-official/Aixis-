category: minutes_japanese
display_name_jp: "議事録 日本語品質テスト"
display_name_en: "Meeting Minutes Japanese Quality Test"
description_jp: "話し言葉→書き言葉変換、フィラー除去、口語的表現の正規化を検証する"

templates:
  - id: "minutes-japanese-spoken-to-written"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。話し言葉を適切な書き言葉に変換し、ビジネス文書として適切な体裁に整えてください。

      【会議情報】
      会議名: カスタマーサポート改善ミーティング
      日時: 2025年11月18日(火) 11:00〜11:10
      参加者: 古川マネージャー、河野

      【録音内容の書き起こし】
      古川「えーと、今日はサポートの改善について話したいんですけど。ぶっちゃけ最近クレーム増えてるんですよね。河野さん、データ見せてもらっていいですか。」
      河野「はい、えっと、10月のクレーム件数なんですけど47件で、9月の32件からかなり増えてます。で、内訳なんですけど、一番多いのが『対応が遅い』で18件、次が『説明がわかりにくい』13件、あと『たらい回しにされた』が9件、残り7件がその他ですね。」
      古川「うーん、結構やばいね。対応が遅いってのは、どんくらい待たせてるの？」
      河野「まあ、平均の初回応答が9月は4.2時間だったんですけど、10月は6.8時間まで悪化してて。原因はですね、10月に2名辞めちゃって、補充が間に合ってないんですよ。正直、今のメンバーかなりキャパオーバーで、一人当たり月120件ぐらい捌いてて、適正は80件ぐらいなんですよね。」
      古川「なるほどなるほど。で、なんか対策考えてる？」
      河野「はい、3つ提案があって。まず1つ目がFAQチャットボットの導入です。ぶっちゃけ簡単な問い合わせの4割ぐらいはボットで自動対応できると思うんですよね。」
      古川「コスト感はどんなもん？」
      河野「えっとですね、ざっくり初期費用が200万から350万、月額が15万から30万ぐらいです。で、月間問い合わせの4割、だいたい500件ぐらいを自動処理できるようになるんで、人件費換算だと月80万ぐらいの削減効果があるかなと。半年でペイする計算です。」
      古川「へー、意外とすぐ回収できるんだ。」
      河野「2つ目がナレッジベースの整備です。今マニュアルがバラバラに散らばってて、新人が入ってもどこ見ていいかわかんない状態なんですよ。これをNotionに統合して、検索できるようにしたいんです。」
      古川「あー、確かにそれは前から課題だったね。」
      河野「3つ目が一番大事なんですけど、やっぱ人員補充で、最低2名、できれば3名の中途採用をお願いしたいです。」
      古川「人員の件はわかった、私から上に掛け合ってみるわ。あと、たらい回しの9件がちょっと気になるんだけど、これってどういう状況なの。」
      河野「あー、これはお客さんが問い合わせた時に担当が不在で、別の人に回されて、そっちでも解決できなくてまた別の人にっていうパターンです。ひどいと3回も4回もたらい回しにされてて。根本原因はスキルマトリクスが整備されてなくて、誰がどの製品に詳しいか見える化されてないんですよ。」
      古川「そりゃまずいね。じゃあスキルマトリクスの整備もやってもらえる？」
      河野「はい、12月15日までにドラフト版出しますんで、年内に確定版にしたいと思います。」
      古川「OK。じゃあまとめると、チャットボットのベンダー3社から見積もり取って12月15日までに比較表出してちょうだい。ナレッジベースのNotion移行も年内目標で。スキルマトリクスは12月15日にドラフト、年内確定で。あと週次のクレームレポートも来週月曜から始めてもらえる？」
      河野「了解です、全部やっときます。」
      古川「ありがとう。じゃあ次回は12月2日で。お疲れさまでした。」
    expected_behaviors:
      - "口語表現(ぶっちゃけ、どんくらい、どんなもん、やばい、そりゃまずい、やっときます等)を書き言葉に変換する"
      - "フィラー(えーと、えっと、まあ、うーん、あー、で、ですね等)を除去する"
      - "くだけた語尾(〜んですよね、〜てて、〜なの、〜だけど、〜ちょうだい、〜わ等)をビジネス文体に統一する"
      - "口語的数量表現(ざっくり、ぐらい、だいたい等)を適切な表現に変換する"
      - "数値(47件、32件、4.2→6.8時間、月120件/適正80件、200〜350万、月500件、月80万削減等)を正確に反映する"
      - "クレーム内訳(対応遅延18件、説明不明瞭13件、たらい回し9件、その他7件)を正確に記録する"
      - "提案3件(チャットボット、ナレッジベース、人員補充)を整理して記録する"
      - "アクションアイテム(ベンダー見積もり12/15、Notion移行年内、スキルマトリクス12/15ドラフト年内確定、週次レポート来週月曜から)を記録する"
      - "次回会議(12/2)を記載する"
    failure_indicators:
      - "口語表現(ぶっちゃけ、どんくらい、やっぱ等)がそのまま残っている"
      - "フィラーが除去されていない"
      - "書き言葉への変換が不自然"
      - "数値に誤りがある"
      - "アクションアイテムが欠落している"

generation:
  mode: cartesian
  max_variants: 1
