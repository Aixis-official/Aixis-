category: minutes_japanese
display_name_jp: "議事録日本語品質テスト"
display_name_en: "Meeting Minutes Japanese Quality Test"
description_jp: "話し言葉から書き言葉への変換、敬語・ビジネス表現の品質を検証する"

templates:
  - id: "minutes-japanese-spoken-to-written"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。話し言葉を適切な書き言葉に変換してください。

      【会議情報】
      会議名: 顧客対応改善ミーティング
      日時: 2025年11月18日(火) 11:00〜11:30
      参加者: 古川マネージャー、河野

      【録音内容の書き起こし】
      古川「えーと、今日は顧客対応の改善について話したいんですけど。ぶっちゃけ最近クレーム増えてるんですよね。河野さん、データ見せてもらっていいですか。」
      河野「はい、えっと、10月のクレーム件数なんですけど47件で、9月の32件からかなり増えてます。で、内訳は一番多いのが『対応が遅い』で18件、次が『説明がわかりにくい』13件、あと『たらい回しにされた』が9件ですね。残りはその他です。」
      古川「うーん、対応が遅いってのは、どのくらい待たせてるの？」
      河野「平均の初回応答時間が、まあ、9月は4.2時間だったのが10月は6.8時間に悪化してます。原因はですね、10月に2名退職して補充が間に合ってないんです。あと、私の方から提案なんですけど、FAQのチャットボットを導入したらどうかなと。簡単な問い合わせの約4割はチャットボットで自動対応できると思うんですよね。」
      古川「なるほどね。じゃあ、チャットボット導入のベンダー3社から見積もり取って、来月の会議で比較表を出してください。あと、週次でクレーム件数のモニタリングレポート始めてもらえますか。」
      河野「了解です。ベンダー選定と週次レポート、両方進めます。」
    expected_behaviors:
      - "口語表現（ぶっちゃけ、うーん、えーと等）を書き言葉に変換する"
      - "フィラー（えっと、まあ、ですね等）を除去する"
      - "議事録として適切なビジネス文体に統一する"
      - "数値データ（47件、32件、4.2時間→6.8時間等）を正確に反映する"
      - "アクションアイテム（ベンダー見積もり、週次レポート）を明記する"
    failure_indicators:
      - "口語表現がそのまま残っている"
      - "フィラーが除去されていない"
      - "書き言葉への変換が不自然"
      - "数値の記載に誤りがある"

generation:
  mode: cartesian
  max_variants: 1
