category: minutes_japanese
display_name_jp: "議事録日本語品質テスト"
display_name_en: "Meeting Minutes Japanese Quality Test"
description_jp: "敬語・ビジネス表現・専門用語・話し言葉から書き言葉への変換など、日本語の品質を検証する"

templates:
  - id: "minutes-japanese-keigo-mixed"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。話し言葉を適切な書き言葉に変換してください。

      【会議情報】
      会議名: 顧客対応改善ミーティング
      日時: 2025年11月18日(火) 11:00〜12:00
      参加者: 古川マネージャー、河野、石井、福島

      【録音内容の書き起こし】
      古川「えーと、今日は顧客対応の改善について話し合いたいと思います。まあ、ぶっちゃけ最近クレームが増えてるんですよね。河野さん、データ見せてもらえます？」
      河野「はい、えっと、10月のクレーム件数は47件で、9月の32件からかなり増えてます。で、内訳なんですけど、一番多いのが「対応が遅い」で18件、次が「説明がわかりにくい」で13件、あと「たらい回しにされた」が9件です。残りはその他です。」
      古川「うーん、対応が遅いっていうのは、どのくらい待たせてるの？」
      河野「平均の初回応答時間が、9月は4.2時間だったのが、10月は6.8時間に悪化してます。原因は、まあ、人手不足ですね。10月に2名退職して、補充が間に合ってないんです。」
      石井「あの、私の方から提案なんですけど、FAQのチャットボットを導入したらどうかなと。簡単な問い合わせの約4割はチャットボットで自動対応できると思うんですよね。そうすれば、有人対応の負荷が結構減るんじゃないかと。」
      福島「それ、いいと思います。あと、私が気になってるのは、たらい回しの件なんですけど、これって部門間の情報共有がうまくいってないからだと思うんですよ。CRMに顧客の問い合わせ履歴をちゃんと記録するルールを作った方がいいんじゃないですかね。」
      古川「なるほどね。じゃあ、チャットボットの導入は石井さんがベンダー3社から見積もりを取って、来月の会議で比較表を出してください。CRMのルール整備は福島さん、まずはドラフトを2週間以内にお願いします。河野さんは、週次でクレーム件数のモニタリングレポートを始めてください。」
    expected_behaviors:
      - "話し言葉を適切な書き言葉・ビジネス文体に変換する"
      - "「ぶっちゃけ」「うーん」等の口語表現を排除する"
      - "敬語レベルを議事録として適切な水準に統一する"
      - "数値データを正確に反映する"
      - "決定事項とアクションアイテムを簡潔にまとめる"
    failure_indicators:
      - "口語表現がそのまま残っている"
      - "話者の「えーと」「まあ」等のフィラーが除去されていない"
      - "書き言葉への変換が不自然"
      - "数値の記載に誤りがある"

  - id: "minutes-japanese-technical-terms"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。技術用語を正確に記録してください。

      【会議情報】
      会議名: システムアーキテクチャレビュー
      日時: 2025年11月22日(金) 14:00〜15:30
      参加者: 宮本CTO、浜田（インフラ）、杉山（バックエンド）、大野（フロントエンド）

      【録音内容の書き起こし】
      宮本CTO「アーキテクチャレビューを始めます。まず浜田さん、インフラの現状と課題を。」
      浜田「現在のインフラですが、AWSのap-northeast-1リージョンで、ECSのFargateクラスターを使っています。DBはRDS for PostgreSQL 15.4で、リードレプリカが2台です。直近の課題は、ピーク時のAPIレイテンシが500msを超えることがあり、SLA99.9%を維持するためにはオートスケーリングの閾値を見直す必要があります。」
      杉山「バックエンドはKotlinのSpring Boot 3.2で、マイクロサービスアーキテクチャです。現在12個のサービスが稼働しています。gRPCでサービス間通信していますが、認証サービスへの依存がボトルネックになっています。サーキットブレーカーパターンの導入を提案します。」
      大野「フロントエンドはNext.js 14のApp Routerで、TypeScript 5.3です。SSRとISRを使い分けていますが、ISRの再検証間隔がキャッシュヒット率に影響していて、現在のrevalidate=3600を1800に変更したいです。Lighthouseスコアは現在、パフォーマンスが82、アクセシビリティが91です。」
      宮本CTO「各自の提案をまとめると、浜田さんがオートスケーリング閾値の見直し、杉山さんがサーキットブレーカーの導入、大野さんがISR間隔の調整ですね。全て来スプリントのバックログに入れましょう。優先度は、SLAに直結するオートスケーリングを最優先で。」
    expected_behaviors:
      - "技術用語（ECS Fargate、gRPC、サーキットブレーカー等）を正確に記載する"
      - "バージョン番号（PostgreSQL 15.4、Spring Boot 3.2等）を正確に記録する"
      - "略語（SSR、ISR、SLA等）を適切に使用する"
      - "具体的な設定値（revalidate=3600→1800、Lighthouseスコア等）を正確に記載する"
      - "日本語と英語の技術用語を適切に混在させる"
    failure_indicators:
      - "技術用語のスペルや表記が誤っている"
      - "バージョン番号が不正確"
      - "技術用語を不適切に日本語訳している"
      - "設定値が異なっている"

  - id: "minutes-japanese-formal-honorifics"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。社外関係者を含む会議のため、敬語の使い分けに注意してください。

      【会議情報】
      会議名: パートナー企業との業務提携検討会
      日時: 2025年12月1日(月) 10:00〜11:30
      場所: 本社10階 大会議室
      参加者:
        [自社] 横山常務、川崎事業部長
        [パートナー C社] 松岡執行役員、竹内営業部長

      【録音内容の書き起こし】
      横山常務「本日はお忙しい中お越しいただき、ありがとうございます。業務提携の具体的な条件について協議させていただければと存じます。」
      松岡執行役員「こちらこそ、お時間をいただきありがとうございます。弊社としましても、御社との提携を前向きに検討しております。」
      川崎「まず、提携の範囲について確認させてください。弊社のクラウドプラットフォームと御社の顧客基盤を組み合わせた共同ソリューションの開発・販売を想定しています。対象市場は国内の中堅企業、従業員100名から1,000名規模です。」
      竹内「弊社の既存顧客約2,000社のうち、対象セグメントは約800社です。初年度は100社への導入を目標にしたいと考えています。」
      横山常務「100社という数字は、御社の営業リソースで対応可能でしょうか。」
      松岡執行役員「専任チーム10名を配置する予定です。加えて、代理店3社にも取り扱いを開始していただく方向で調整中です。」
      川崎「収益配分についてですが、ソフトウェアライセンス部分は弊社70%・御社30%、導入コンサルティングは弊社40%・御社60%で提案させていただきます。」
      竹内「導入コンサルティングの比率は、弊社の工数負担を考えると55%をお願いしたいところですが。」
      横山常務「この点は持ち帰らせていただき、次回までに正式な提案をさせていただきます。基本合意として、提携開始は来年4月、初期のパイロットフェーズ3ヶ月の後、本格展開という流れでよろしいでしょうか。」
      松岡執行役員「異存ございません。次回は1月中旬に、契約条件の詳細を詰めさせていただければ幸いです。」
    expected_behaviors:
      - "自社と他社の敬語を適切に使い分ける（自社は謙譲語、他社は尊敬語）"
      - "収益配分の具体的な比率を正確に記載する"
      - "基本合意事項（提携開始4月、パイロット3ヶ月）を記録する"
      - "継続協議事項（導入コンサルの配分比率）を明記する"
      - "次回会議の予定（1月中旬）を記載する"
      - "自社・他社の参加者を適切な敬称で記載する"
    failure_indicators:
      - "敬語の使い分けが不適切（自社に尊敬語、他社に謙譲語等）"
      - "収益配分の数値が不正確"
      - "合意事項と継続協議事項が混同されている"
      - "パートナー企業に対する敬称が不適切"

generation:
  mode: cartesian
  max_variants: 3
