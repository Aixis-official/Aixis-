category: minutes_japanese
display_name_jp: "議事録 日本語品質テスト"
display_name_en: "Meeting Minutes Japanese Quality Test"
description_jp: "話し言葉→書き言葉変換、フィラー除去、口語的表現の正規化を検証する"

templates:
  - id: "minutes-japanese-spoken-to-written"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。話し言葉を適切な書き言葉に変換し、ビジネス文書として適切な体裁に整えてください。

      【会議情報】
      会議名: カスタマーサポート改善ミーティング
      日時: 2025年11月18日(火) 11:00〜11:10
      参加者: 古川マネージャー、河野

      【録音内容の書き起こし】
      古川「えーと、今日はサポートの改善について話したいんですけど。ぶっちゃけ最近クレーム増えてるんですよね。河野さん、データある？」
      河野「はい、えっと、10月のクレーム件数なんですけど47件で、9月の32件からかなり増えてます。一番多いのが『対応が遅い』で18件、次が『説明がわかりにくい』13件、あと『たらい回し』が9件、残り7件がその他です。」
      古川「うーん、対応が遅いってのは、どんくらい待たせてるの？」
      河野「まあ、平均の初回応答が9月の4.2時間から10月は6.8時間に悪化してて。原因は10月に2名辞めて補充が間に合ってないんですよね。」
      古川「なるほどね。なんか対策ある？」
      河野「FAQチャットボットの導入がいいかなと。ざっくり初期費用200万から350万、月額15万から30万ぐらいで、問い合わせの4割ぐらいは自動化できると思います。半年でペイする計算です。」
      古川「へー、意外といけるじゃん。じゃあベンダー3社から見積もり取って、12月15日の会議で比較表出してもらえる？あと週次でクレームの数のレポートもよろしく。」
      河野「了解です、やっときます。」
    expected_behaviors:
      - "口語表現(ぶっちゃけ、どんくらい、いけるじゃん、やっときます等)を書き言葉に変換する"
      - "フィラー(えーと、えっと、まあ、うーん等)を除去する"
      - "くだけた語尾(〜んですよね、〜てて、〜ある？等)をビジネス文体に統一する"
      - "数値(47件、32件、4.2→6.8時間、200〜350万等)を正確に反映する"
      - "クレーム内訳(対応遅延18件、説明不明瞭13件、たらい回し9件、その他7件)を記録する"
      - "アクションアイテム(ベンダー見積もり3社12/15まで、週次レポート)を記録する"
    failure_indicators:
      - "口語表現(ぶっちゃけ、どんくらい等)がそのまま残っている"
      - "フィラーが除去されていない"
      - "書き言葉への変換が不自然"
      - "数値に誤りがある"

generation:
  mode: cartesian
  max_variants: 1
