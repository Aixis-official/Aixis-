category: minutes_japanese
display_name_jp: "議事録 日本語品質テスト"
display_name_en: "Meeting Minutes Japanese Quality Test"
description_jp: "話し言葉→書き言葉変換、敬語・ビジネス表現、フィラー除去、口語的数量表現の正規化を総合的に検証する"

templates:
  - id: "minutes-japanese-comprehensive"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。話し言葉を適切な書き言葉に変換し、ビジネス文書として適切な体裁に整えてください。

      【会議情報】
      会議名: カスタマーサクセス部 改善ミーティング
      日時: 2025年11月18日(火) 11:00〜11:50
      参加者: 古川マネージャー、河野

      【録音内容の書き起こし】
      古川「えーと、今日はカスタマーサクセスの改善について話したいんですけど。ぶっちゃけ最近クレーム増えてるんですよね。河野さん、データ見せてもらっていいですか。」
      河野「はい、えっと、10月のクレーム件数なんですけど47件で、9月の32件からかなり増えてます。で、内訳は一番多いのが『対応が遅い』で18件、次が『説明がわかりにくい』13件、あと『たらい回しにされた』が9件ですね。残り7件はその他です。」
      古川「うーん、対応が遅いってのは、どのくらい待たせてるの？」
      河野「平均の初回応答時間が、まあ、9月は4.2時間だったのが10月は6.8時間に悪化してます。原因はですね、10月に2名退職して補充が間に合ってないんです。正直、今のメンバーはかなりキャパオーバーで、一人当たり月間120件ぐらいのチケットを捌いてて、適正は80件ぐらいなんですよね。」
      古川「なるほどなるほど。で、なんか対策ある？」
      河野「はい。私の方から3つ提案があって。1つ目はFAQチャットボットの導入です。ぶっちゃけ簡単な問い合わせの約4割はチャットボットで自動対応できると思うんですよね。2つ目はナレッジベースの整備で、今バラバラになってる対応マニュアルを統合したいんです。3つ目が一番大事なんですけど、やっぱ人員補充で、最低2名、できれば3名の中途採用を来期頭にお願いしたいです。」
      古川「チャットボットって導入コストどんくらいなの？」
      河野「えっとですね、ベンダーにもよるんですけど、ざっくり初期費用が200万から350万、月額が15万から30万ぐらいですね。で、導入すると月間問い合わせの4割、つまり約500件を自動処理できるようになるんで、人件費換算だと月80万ぐらいの削減効果があるかなと。半年でペイする計算です。」
      古川「へー、意外とすぐ回収できるんだ。じゃあまず、チャットボット導入のベンダー3社から見積もり取って、来月15日の会議で比較表を出してください。あと、週次でクレーム件数のモニタリングレポート始めてもらえますか。毎週月曜の朝に私にメールで共有してほしいんだけど。」
      河野「了解です。ベンダー選定と週次レポート、両方進めます。」
      古川「あとさ、たらい回しの9件って結構やばくない？これってどういう状況なの。」
      河野「あー、これはですね、お客さんが問い合わせた時に担当が不在で、別の担当に回されて、そっちでも解決できなくてまた別の人に回されるっていうパターンです。ひどい場合だと3回も4回もたらい回しにされてて。根本原因はスキルマトリクスが整備されてなくて、誰がどの製品に詳しいか可視化されてないんですよ。」
      古川「そりゃまずいね。スキルマトリクスの整備も今月中にやってもらえる？」
      河野「今月はちょっと厳しいんで、12月15日までにドラフト版、年内に確定版を出すってことでいいですか。」
      古川「OK、それでいこう。まとめると、チャットボットのベンダー見積もり3社を12月15日まで、週次レポートは来週月曜から、スキルマトリクスのドラフトを12月15日まで、確定版を年内。ちなみに人員補充の件は私から上に掛け合ってみるんで、来週の部長会で提案するわ。」
      河野「ありがとうございます。助かります。」
    expected_behaviors:
      - "口語表現(ぶっちゃけ→率直に/実際, どんくらい→どの程度, やばくない→深刻, そりゃまずい→問題である等)を書き言葉に変換する"
      - "フィラー(えーと, えっと, まあ, ですね, うーん, あー等)を除去する"
      - "くだけた語尾(〜なんですよね, 〜してて, 〜なの, 〜だけど等)をビジネス文体に統一する"
      - "口語的数量表現(ざっくり, ぐらい, 約等)を適切なビジネス表現に変換する"
      - "数値データ(47件, 32件, 4.2→6.8時間, 月間120件, 適正80件, 200万〜350万, 月500件等)を正確に反映する"
      - "アクションアイテム4件(ベンダー見積もり, 週次レポート, スキルマトリクス, 人員補充提案)を担当者・期限付きで記録する"
      - "クレーム内訳(対応遅延18件, 説明不明瞭13件, たらい回し9件, その他7件)を正確に記録する"
      - "チャットボット導入の費用対効果(初期200〜350万, 月15〜30万, 月80万削減, 半年で回収)を記録する"
    failure_indicators:
      - "口語表現(ぶっちゃけ, どんくらい, やっぱ等)がそのまま残っている"
      - "フィラー(えーと, えっと, まあ等)が除去されていない"
      - "くだけた語尾がそのまま残っている"
      - "書き言葉への変換が不自然・過剰に堅い"
      - "数値の記載に誤りがある"

generation:
  mode: cartesian
  max_variants: 1
