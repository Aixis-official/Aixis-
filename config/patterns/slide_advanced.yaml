category: slide_advanced
display_name_jp: "デザイン・エクスポート・コラボレーションテスト"
display_name_en: "Design, Export & Collaboration Test"
description_jp: "マルチフォーマット出力、デザインテーマ指定、コラボレーションワークフローなど高度なスライド生成機能を検証する"

templates:
  - id: "slide-advanced-multi-format"
    prompt: "以下の内容で会社説明スライドを5枚作成してください。作成後、以下の3つの形式での出力方法も提案してください。\n\n会社概要：\n- 社名：テクノフューチャー株式会社\n- 設立：2015年4月\n- 資本金：5億円\n- 従業員数：350名（2025年12月現在）\n- 事業内容：クラウドインフラ構築、AIソリューション開発、セキュリティコンサルティング\n- 拠点：東京本社、大阪支社、福岡支社、シンガポール現地法人\n- 売上高推移：2023年40億円→2024年55億円→2025年72億円\n\n出力形式の提案：\n1. PowerPoint形式（.pptx）：社内プレゼン用、アニメーション付き\n2. PDF形式：取引先への送付用、印刷最適化\n3. HTML形式：Webサイト掲載用、レスポンシブ対応\n\n各形式での注意点や最適化のポイントも説明してください。"
    expected_behaviors:
      - "5枚の会社説明スライドを作成する"
      - "3つの出力形式それぞれの特徴と最適化ポイントを説明する"
      - "PowerPointではアニメーションの提案を含める"
      - "PDFでは印刷時の配慮を含める"
      - "HTMLではレスポンシブ対応の考慮を含める"
    failure_indicators:
      - "出力形式の提案が欠落している"
      - "各形式の違いや注意点が説明されていない"
      - "会社概要の情報が不正確"
      - "スライド内容と出力形式の提案が分離していない"

  - id: "slide-advanced-design-theme"
    prompt: "以下のブランドガイドラインに厳密に従って、企業理念紹介スライドを6枚作成してください。\n\nブランドガイドライン：\n- メインカラー：#1B4F72（ダークブルー）\n- アクセントカラー：#F39C12（オレンジ）\n- 背景色：#FDFEFE（オフホワイト）\n- フォント：見出しはNoto Sans JP Bold、本文はNoto Sans JP Regular\n- 見出しサイズ：36pt、本文サイズ：18pt\n- ロゴ配置：全スライド右下、サイズ横幅120px\n- 余白：上下左右30mm以上\n- 写真使用時：角丸8px、影付き\n\n企業理念：「技術で人を幸せにする」\nビジョン：2030年までにアジアNo.1のテクノロジーカンパニーになる\nバリュー：挑戦、共創、誠実\n\nスライド1:表紙、2:企業理念、3:ビジョン、4:バリュー（3つ）、5:行動指針、6:締めくくり\n\n各スライドでブランドガイドラインの適用箇所を明示してください。"
    expected_behaviors:
      - "ブランドガイドラインの各項目を具体的に適用する"
      - "カラーコードを正確に指定する"
      - "フォント、サイズ、余白の指定を反映する"
      - "ロゴ配置ルールに従う"
      - "6枚の指定構成に従う"
      - "各スライドでガイドライン適用箇所を明示する"
    failure_indicators:
      - "ブランドガイドラインの指定を無視する"
      - "カラーコードが異なる"
      - "フォントやサイズの指定が反映されていない"
      - "ガイドライン適用の明示がない"

  - id: "slide-advanced-collaboration"
    prompt: "以下のコラボレーションシナリオに対応したスライド作成ワークフローを提案し、各ステップのスライドサンプルも作成してください。\n\nシナリオ：\n来月の取締役会で発表する中期経営計画のプレゼン資料（20枚）を、以下の4部門が分担して作成します。\n\n担当割り当て：\n- 経営企画部（全体統括・表紙・サマリー）：スライド1-3\n- 営業部（市場分析・営業戦略）：スライド4-8\n- 技術部（技術ロードマップ・R&D計画）：スライド9-14\n- 管理部（財務計画・組織体制）：スライド15-20\n\n要件：\n- 統一テンプレートの使用\n- 各部門の作成期限は異なる（経営企画:12/1、営業:12/5、技術:12/8、管理:12/10）\n- レビューサイクル：部門内レビュー→経営企画レビュー→役員プレレビュー\n- 最終締切：12/15\n\n統一テンプレートの仕様と、各部門の担当スライドの骨子（タイトルと箇条書き3項目程度）を作成してください。"
    expected_behaviors:
      - "統一テンプレートの仕様を具体的に定義する"
      - "4部門の担当範囲を明確にする"
      - "各部門のスライド骨子を作成する"
      - "レビューサイクルのスケジュールを示す"
      - "コラボレーション時の注意点を提案する"
    failure_indicators:
      - "統一テンプレートの定義がない"
      - "部門間の担当が重複または欠落する"
      - "スケジュールの整合性が取れていない"
      - "レビュープロセスが考慮されていない"

generation:
  mode: cartesian
  max_variants: 3
