category: minutes_advanced
display_name_jp: "議事録高難度テスト"
display_name_en: "Advanced Meeting Minutes Test"
description_jp: "意見の対立・曖昧な結論・条件付き決定など高難度な議事録生成能力を検証する"

templates:
  - id: "minutes-advanced-debate"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。意見が対立していますが、客観的かつ正確に記録してください。

      【会議情報】
      会議名: 次期アップデート方針討議
      日時: 2025年11月27日(木) 15:00〜15:40
      参加者: 柴田VP、奥村PM

      【録音内容の書き起こし】
      柴田VP「次期アップデートの方針について議論しましょう。奥村さんの提案は。」
      奥村PM「エンタープライズ向け機能を優先すべきです。大口顧客5社からSSO連携とアクセス権限管理の要望が来ています。1社あたり年間契約額が平均3,000万円で、失注リスクは最大1.5億円です。」
      柴田VP「一方で個人ユーザーの状況は。」
      奥村PM「個人ユーザー向けのUX改善を後回しにすると半年遅れます。DAUの30%を占める個人ユーザーの離脱率が先月12%で、3ヶ月前の8%から悪化しています。ただし、個人ユーザーの口コミがエンタープライズ導入のきっかけになっているケースが35%あり、長期的には影響があります。」
      柴田VP「技術的な工数は。」
      奥村PM「SSO連携は認証基盤の改修で3ヶ月。UX改善はフロントエンド変更のみで1ヶ月です。Auth0の拡張機能を使えば2ヶ月に短縮可能ですが、カスタマイズ性は犠牲になります。」
      柴田VP「折衷案で行きましょう。フェーズ1でAuth0を使ったSSO連携を2ヶ月で開発。並行して、離脱率に直結するオンボーディングフローの改修だけは先行で進める。フェーズ2でUX改善の残りに取り組みます。奥村さん、大口顧客5社に3月までにSSO提供開始と伝えてください。ただし、オンボーディング改修の効果が見られなければフェーズ2の優先度を再検討します。」
      奥村PM「承知しました。顧客へのロードマップ共有と、オンボーディング改修の設計を今週中に始めます。」
    expected_behaviors:
      - "対立する意見を客観的に両論併記する"
      - "折衷案の決定内容（フェーズ1: SSO 2ヶ月、並行でオンボーディング改修）を正確に記録する"
      - "条件付き決定（オンボーディング効果次第でフェーズ2再検討）を明記する"
      - "数値（1.5億円、離脱率12%/8%、35%、3ヶ月→2ヶ月等）を正確に記載する"
      - "アクションアイテム（顧客共有、オンボーディング設計）を記録する"
    failure_indicators:
      - "一方の意見に偏った記録になっている"
      - "折衷案の詳細が不正確"
      - "条件付き決定の条件が欠落している"
      - "数値が不正確"

generation:
  mode: cartesian
  max_variants: 1
