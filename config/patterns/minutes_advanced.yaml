category: minutes_advanced
display_name_jp: "議事録高難度テスト"
display_name_en: "Advanced Meeting Minutes Test"
description_jp: "複数話者の同時発言・専門用語の混在・曖昧な指示・矛盾発言など、高難度な議事録生成能力を検証する"

templates:
  - id: "minutes-advanced-heated-debate"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。議論が白熱していますが、客観的かつ正確に記録してください。

      【会議情報】
      会議名: プロダクト方針討議
      日時: 2025年11月27日(木) 15:00〜16:30
      参加者: 柴田VP of Product、奥村（PM）、望月（UXデザイナー）、増田（テックリード）

      【録音内容の書き起こし】
      柴田「次期アップデートの方針について議論したいと思います。奥村さんの提案は？」
      奥村「エンタープライズ向け機能を優先すべきです。大口顧客5社からSSO連携とアクセス権限管理の要望が来ています。1社あたり年間契約額が平均3,000万円なので、失注リスクは最大1.5億円です。」
      望月「ちょっと待ってください。エンタープライズ機能を優先すると、個人ユーザー向けのUX改善が半年遅れます。DAUの30%を占める個人ユーザーの離脱率が増加しているんです。先月の離脱率は12%で、3ヶ月前の8%から悪化しています。」
      奥村「数字で見れば、エンタープライズ5社の収益が個人ユーザー全体の収益を上回っています。」
      増田「技術的な観点から言うと、SSO連携には認証基盤の大幅な改修が必要です。見積もりは3ヶ月。一方、UX改善はフロントエンドの変更だけで1ヶ月で完了します。両方並行でやれるリソースは今はありません。」
      望月「もう一つ。個人ユーザーの口コミがエンタープライズ導入のきっかけになっているケースが全体の35%あります。個人ユーザーを軽視すると長期的にはエンタープライズの新規獲得にも影響します。」
      奥村「それは理解しますが、目の前に1.5億円の失注リスクがあるんです。長期的な話をしている余裕は...」
      柴田「双方の意見は理解しました。折衷案として、フェーズ1でSSO連携を2ヶ月で開発し、フェーズ2でUX改善に取り組む方針にします。ただし、UX改善の中でも離脱率に直結するオンボーディングフローの改修は、フェーズ1と並行して望月さんのデザインチームで先行してもらいます。増田さん、SSO連携を2ヶ月に短縮する方法はありますか。」
      増田「既存のAuth0の拡張機能を使えば、3ヶ月を2ヶ月に短縮できます。ただし、カスタマイズ性は犠牲になります。」
      柴田「それでいきましょう。奥村さんは大口顧客5社にロードマップを共有して、3月までにSSO提供開始と伝えてください。」
    expected_behaviors:
      - "対立する意見を客観的に両論併記する"
      - "最終的な折衷案の決定を明確に記録する"
      - "各論点の根拠となる数値を正確に記録する"
      - "フェーズ分けの計画を構造的に記載する"
      - "感情的な表現を排除しつつ議論の本質を捉える"
    failure_indicators:
      - "一方の意見に偏った記録になっている"
      - "折衷案の内容が正確に記録されていない"
      - "数値（1.5億円、離脱率12%、35%等）が不正確"
      - "感情的な表現がそのまま残っている"

  - id: "minutes-advanced-cross-department"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。複数部門の専門用語が混在しています。

      【会議情報】
      会議名: DX推進プロジェクト 全体進捗会議
      日時: 2025年12月5日(金) 10:00〜12:00
      参加者: 森DX推進室長、製造部 北原、営業部 服部、IT部 水野、法務部 篠原、経理部 堀

      【録音内容の書き起こし】
      森「DX推進プロジェクトの全体進捗を確認します。各サブプロジェクトから報告をお願いします。」

      北原「製造ラインのIoTセンサー導入プロジェクトです。全5ライン中3ラインの設置が完了し、振動センサーと温度センサーからリアルタイムデータを収集しています。予知保全AIモデルの精度はF1スコア0.87で、目標の0.90にはあと1ヶ月のチューニングが必要です。ラインの計画外停止が前月比で22%削減されました。」

      服部「SFA（営業支援システム）の導入です。Salesforceの設定が完了し、営業部門120名中95名の初期研修を終えました。データ移行はレガシーのExcel台帳3,200件をインポート済みで、重複レコードの名寄せに想定外の工数がかかっています。現在1,800件が名寄せ完了、残り1,400件は手作業が必要で、来週中に完了予定です。」

      水野「IT基盤の整備です。ゼロトラストアーキテクチャへの移行を進めており、全社VPNからBeyondCorpモデルに切り替え中です。現在、社内アプリ38件中25件がIDaaS経由のアクセスに移行完了。残り13件のうち5件はレガシーシステムでSAML非対応のため、リバースプロキシでの対応を検討しています。」

      篠原「法務面では、個人情報保護法の改正対応を進めています。DX推進に伴い新たに取得する機器データの中に個人情報該当性があるものが3カテゴリあります。具体的には、作業員の動線データ、顔認証データ、音声データです。プライバシー影響評価（PIA）を実施し、来月中にプライバシーポリシーの改定案を提出します。」

      堀「DXプロジェクト全体のコスト進捗です。年度予算1億8,000万円に対し、執行済みが1億2,500万円、進捗率69%です。残り4ヶ月で5,500万円の予算があります。IoTセンサーの追加調達で当初予算から800万円の超過が見込まれるため、他項目からの流用を申請します。」

      森「各プロジェクトの進捗は概ね順調です。コスト超過の件は、SFAプロジェクトの名寄せ外注費を内部対応にしたことで浮いた300万円と、IT基盤のライセンス契約見直しで削減した500万円、合わせて800万円をIoTに振り替える方針で進めます。篠原さんのPIAは最優先で。他に何かありますか。」
    expected_behaviors:
      - "各部門の専門用語を正確に記録する"
      - "進捗率を数値で正確に記載する"
      - "コスト管理の詳細（予算配分の変更）を正確に記録する"
      - "法務リスク（個人情報3カテゴリ）を明確に記載する"
      - "各サブプロジェクトを独立したセクションで構造化する"
    failure_indicators:
      - "専門用語が不正確または混同されている"
      - "コスト流用の計算が合わない"
      - "法務リスクの具体的な内容が欠落する"
      - "各部門の報告が混在して整理されていない"

  - id: "minutes-advanced-ambiguous-outcomes"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。結論が曖昧な議論が含まれています。何が決まって何が決まっていないかを明確にしてください。

      【会議情報】
      会議名: ブランドリニューアル検討会 第2回
      日時: 2025年11月12日(水) 14:00〜15:30
      参加者: 長田CMO、村田（ブランド戦略）、土屋（デザイン）、関口（広報）、外部アドバイザー 高木氏

      【録音内容の書き起こし】
      長田CMO「前回の議論を踏まえて、ブランドリニューアルの方向性を詰めていきましょう。村田さんから。」
      村田「前回、ロゴ・カラー・メッセージの3要素を変更する案と、メッセージのみ変更する案の2つが出ました。市場調査の結果、認知度調査では現行ロゴの認知率が67%あり、変更するとリセットされるリスクがあります。一方、新しいブランドメッセージについては、テスト群の好感度が78%と高い結果が出ています。」
      高木「外部から見ると、ロゴはまだ十分に機能しています。むしろコーポレートカラーの方が...、いや、これは次のフェーズでもいいかもしれません。」
      土屋「デザインの立場からは、ロゴを変えるなら今がタイミングです。来年のリブランディングと合わせれば制作コストを30%削減できます。ただ、変えなくても問題はないと思います。」
      関口「広報としては、ロゴ変更は全メディアキットの再制作が必要で、費用は約2,000万円です。メッセージだけなら500万円程度で済みます。」
      長田CMO「うーん、ロゴは...まあ、今回はメッセージの刷新に集中する方向で考えましょうか。ロゴについては、来年度の中で改めて検討するということで。ただ、もしロゴも変える場合のスケジュール案は用意しておいてほしいです。土屋さん、お願いできますか。」
      土屋「はい、念のためロゴ変更の場合のスケジュールも作っておきます。」
      村田「メッセージの新案は3パターン用意しています。次回までにA/Bテストの結果が出ますので、そこで最終選定しましょう。」
      長田CMO「メッセージの展開時期はいつが良いですかね。」
      関口「年度替わりの4月がベストだと思いますが、準備期間を考えると決定は遅くとも1月末には必要です。」
      長田CMO「4月展開を目指す、と...。まあ、確定はもう少し先にしましょう。次回は12月10日、メッセージの最終選定を行います。」
    expected_behaviors:
      - "決定事項（メッセージ刷新に集中）と未決定事項（ロゴ変更は来年度再検討、展開時期は未確定）を明確に区別する"
      - "「方向性」「仮決定」「確定」の温度感を正確に表現する"
      - "コスト情報（ロゴ変更2,000万、メッセージのみ500万）を記載する"
      - "市場調査の数値（認知率67%、好感度78%）を正確に記録する"
      - "次回会議の予定と議題を記載する"
      - "曖昧な発言（「...まあ」「考えましょうか」）の意図を適切に解釈する"
    failure_indicators:
      - "曖昧な方向性を確定事項として記録している"
      - "未決定事項が決定事項として記載されている"
      - "発言者の微妙なニュアンスが失われている"
      - "コストや調査数値が不正確"

generation:
  mode: cartesian
  max_variants: 3
