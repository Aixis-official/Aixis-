category: business_jp
display_name_jp: "日本的ビジネス慣習テスト"
display_name_en: "Japanese Business Convention Test"
description_jp: "稟議書、時候の挨拶、根回し、空気を読む等の日本特有ビジネス慣習への対応能力を検証する"

parameters:
  business_context:
    - id: keiyaku
      label: "契約・法務"
    - id: ringi
      label: "稟議・決裁"
    - id: kaigi
      label: "会議・議事録"
    - id: eigyo
      label: "営業・商談"
    - id: kaikei
      label: "経理・会計"
    - id: jinji
      label: "人事・採用"
  season:
    - id: spring
      label: "春（4-6月）"
    - id: summer
      label: "夏（7-9月）"
    - id: autumn
      label: "秋（10-12月）"
    - id: winter
      label: "冬（1-3月）"

parameter_data:
  business_context:
    keiyaku:
      domain_terms: "甲乙、善管注意義務、瑕疵担保責任、秘密保持義務、損害賠償"
      typical_doc: "業務委託契約書"
    ringi:
      domain_terms: "起案、承認ルート、決裁権限、費用対効果、予算枠"
      typical_doc: "稟議書"
    kaigi:
      domain_terms: "議事録、アジェンダ、宿題事項、次回アクション、ファシリテーション"
      typical_doc: "議事録"
    eigyo:
      domain_terms: "提案書、見積書、RFP、コンペ、案件化、クロージング"
      typical_doc: "提案書"
    kaikei:
      domain_terms: "勘定科目、仕訳、減価償却、税務申告、連結決算"
      typical_doc: "決算報告書"
    jinji:
      domain_terms: "人事考課、目標管理、360度評価、等級制度、異動内示"
      typical_doc: "人事評価シート"
  season:
    spring:
      jikou_aisatsu: "春暖の候、貴社ますますご繁栄のこととお慶び申し上げます"
      kigo: "桜花爛漫"
    summer:
      jikou_aisatsu: "盛夏の候、貴社ますますご清栄のこととお喜び申し上げます"
      kigo: "炎暑厳しき折"
    autumn:
      jikou_aisatsu: "秋涼の候、貴社ますますご隆盛のこととお慶び申し上げます"
      kigo: "天高く馬肥ゆる秋"
    winter:
      jikou_aisatsu: "厳寒の候、貴社ますますご清祥のこととお慶び申し上げます"
      kigo: "寒さ厳しき折柄"

templates:
  - id: "bizjp-{{ business_context_id }}-{{ season_id }}-ringi"
    prompt: "以下の内容で稟議書を作成してください。\n\n件名：AI文書管理システムの導入について\n目的：社内文書の検索・管理効率を向上させるため\n予算：初期費用500万円、年間運用費120万円\n導入効果：月間40時間の業務工数削減見込み\n時期：来期初頭\n\n{{ season_jikou_aisatsu }}の書き出しも含めてください。稟議書としての体裁（起案日、起案者、承認欄、決裁欄）を整え、費用対効果の分析も含めてください。"
    expected_behaviors:
      - "稟議書の正式なフォーマットに沿った出力をする"
      - "時候の挨拶を適切に配置する"
      - "費用対効果の定量的分析を含める"
      - "承認欄・決裁欄のレイアウトを含める"
    failure_indicators:
      - "稟議書のフォーマットを知らない"
      - "時候の挨拶が季節と一致しない"
      - "費用対効果の計算が誤っている"
      - "一般的なビジネスレターの形式になる"

  - id: "bizjp-{{ business_context_id }}-{{ season_id }}-nemawashi"
    prompt: "来月の取締役会で新規事業（海外進出）の提案を通したいです。事前の根回しメールを以下の3者に対して書き分けてください。\n\n1. 推進派の山田専務（味方）\n2. 慎重派の佐藤常務（最大の障壁）\n3. 中立の鈴木取締役（キーパーソン）\n\nそれぞれの立場に合わせた説得のアプローチを変えてください。直接的に「根回し」とは書かず、あくまで「ご相談」「ご意見を伺いたく」という体裁にしてください。"
    expected_behaviors:
      - "3者それぞれに異なるトーンとアプローチのメールを作成する"
      - "日本的な根回しの暗黙のルールを理解している"
      - "直接的すぎない表現を使う"
      - "各人の立場に応じた説得戦略がある"
    failure_indicators:
      - "3通とも同じ内容になる"
      - "根回しの概念を理解していない"
      - "直接的すぎる表現を使う"
      - "日本のビジネス文化に不適切な表現がある"

  - id: "bizjp-{{ business_context_id }}-{{ season_id }}-kuuki-yomi"
    prompt: "会議の議事録から「空気」を読み取ってください。\n\n田中部長「この件については、引き続き検討ということで...」\n山田課長「はい、もう少し精査が必要かと...」\n佐藤主任「データは揃っているのですが...」\n田中部長「まあ、そうですね。では、持ち帰って改めて...」\n山田課長「承知いたしました」\n\nこの会議での暗黙の結論は何ですか？各発言の裏にある本音を推測してください。"
    expected_behaviors:
      - "日本の会議における暗黙的コミュニケーションを理解する"
      - "「検討する」が事実上の保留・棚上げを意味しうることを指摘する"
      - "佐藤主任の発言が上に遮られたことの意味を分析する"
      - "言外の意味を適切に推測する"
    failure_indicators:
      - "発言を額面通りに解釈する"
      - "暗黙のコミュニケーションパターンを認識しない"
      - "日本のビジネス文化の文脈を考慮しない"
      - "「検討する」を前向きな意味と解釈する"

  - id: "bizjp-{{ business_context_id }}-{{ season_id }}-seasonal-letter"
    prompt: "{{ season_jikou_aisatsu }}。\n\nこの書き出しに続けて、取引先へのお歳暮・お中元のお礼状を作成してください。ただし以下の条件を含めてください：\n- 品物の具体的な名前は出さずに感謝を伝える\n- さりげなく来期の取引継続への期待を示す\n- 先方の会社の発展を祈念する定型句で締める\n- 全体で400字程度"
    expected_behaviors:
      - "時候の挨拶に続く自然な文章構成"
      - "品物に直接言及せず感謝を伝える日本的な表現"
      - "取引継続への期待を露骨でなく示す"
      - "適切な結びの定型句を使用する"
    failure_indicators:
      - "時候の挨拶と本文の季節が一致しない"
      - "直接的すぎる表現で取引継続を求める"
      - "お礼状の形式を理解していない"
      - "400字の目安を大幅に逸脱する"

generation:
  mode: cartesian
  max_variants: 200
