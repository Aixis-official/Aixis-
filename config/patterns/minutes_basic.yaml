category: minutes_basic
display_name_jp: "基本議事録生成テスト"
display_name_en: "Basic Meeting Minutes Generation Test"
description_jp: "一般的な社内会議・プロジェクト進捗会議・営業報告会議など、基本的な議事録生成能力を検証する"

templates:
  - id: "minutes-basic-project-progress"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。

      【会議情報】
      会議名: プロジェクトAlpha 第12回進捗報告会
      日時: 2025年11月20日(木) 14:00〜15:15
      参加者: 田中部長（プロジェクトオーナー）、佐藤PM、鈴木（開発リーダー）、高橋（QAリーダー）、山本（デザイナー）

      【録音内容の書き起こし】
      田中部長「それでは定例の進捗報告会を始めます。佐藤さん、全体の進捗からお願いします。」
      佐藤PM「はい。全体進捗ですが、フェーズ2の開発が予定より1週間遅延しています。原因は、外部API連携の仕様変更が先週金曜日に通知されたためです。影響範囲は決済モジュールと在庫管理モジュールの2つです。」
      田中部長「1週間の遅延ということは、当初のリリース予定12月15日が12月22日になるということですか。」
      佐藤PM「はい、最短でそのスケジュールです。ただし、鈴木さんのチームで並行作業を進められれば、3日程度の短縮が可能です。」
      鈴木「決済モジュールの方は、既に新しいAPIドキュメントを確認済みです。変更箇所は認証フローの部分で、実装自体は2日あれば完了します。在庫管理モジュールは高橋さんのQAと並行して進めたいです。」
      高橋「QA側は、テストケースの修正に3日必要です。既存のリグレッションテスト450件のうち、影響を受けるのは約30件と見積もっています。」
      田中部長「わかりました。では、最終的なリリース日の見込みを来週月曜までに出してもらえますか。」
      佐藤PM「承知しました。鈴木さん、高橋さんと調整して、月曜の朝までにスケジュール案を提出します。」
      山本「デザイン面では、決済画面のUI変更が必要になる可能性があります。API仕様を確認次第、影響有無をお伝えします。」
      田中部長「お願いします。他に報告事項はありますか。」
      佐藤PM「もう1点、来月からインターン2名がチームに加わります。鈴木さんの下で開発補助を担当してもらう予定です。」
      田中部長「了解です。それでは、来週月曜のスケジュール案提出をお待ちしています。本日はこれで終了します。」
    expected_behaviors:
      - "会議名・日時・参加者を正確に記載する"
      - "フェーズ2の1週間遅延と原因（外部API仕様変更）を正確に記録する"
      - "リリース予定の変更（12/15→12/22）を明記する"
      - "各担当者の発言を正確に要約する"
      - "決定事項（月曜までにスケジュール案提出）を明記する"
      - "具体的な数値（450件、30件、2日等）を正確に反映する"
    failure_indicators:
      - "参加者や日時が誤っている"
      - "遅延の原因を誤って記載する"
      - "決定事項やアクションアイテムが欠落する"
      - "発言者の取り違えがある"
      - "具体的な数値が異なる"

  - id: "minutes-basic-sales-meeting"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。

      【会議情報】
      会議名: 第3四半期 営業戦略会議
      日時: 2025年10月8日(水) 10:00〜11:30
      参加者: 渡辺営業本部長、中村（東日本エリア長）、小林（西日本エリア長）、加藤（マーケティング部）

      【録音内容の書き起こし】
      渡辺本部長「第3四半期の営業戦略会議を始めます。まず中村さんから東日本エリアの状況を。」
      中村「東日本エリアですが、Q2の売上は目標比95%でした。金額ベースでは12.3億円。未達の主な要因は、大口顧客A社の契約更新が来期にずれ込んだことです。ただ、新規顧客は計画の15社に対して18社獲得できており、パイプラインは健全です。」
      渡辺本部長「A社の契約更新時期の見込みは？」
      中村「来年1月の予算確定後、2月に契約締結の見通しです。金額は年間約8,000万円です。」
      小林「西日本エリアは目標比102%、売上9.8億円です。大阪の製造業向けソリューションが好調で、特に品質管理AIパッケージが5社に導入されました。一方、九州エリアは担当者の退職により一時的に活動が鈍化しています。」
      渡辺本部長「九州の後任は？」
      小林「来月から中途採用の方が着任予定です。それまでは福岡の田村さんが兼務しています。」
      加藤「マーケティングからの報告です。10月から新しいリード獲得キャンペーンを開始します。予算は500万円で、ターゲットは従業員300名以上の製造業です。過去のデータから、リード単価1.5万円、コンバージョン率8%を想定しています。つまり約333件のリード、26件の商談化を見込んでいます。」
      渡辺本部長「商談化率8%は現実的ですか。」
      加藤「直近6ヶ月のデータでは平均7.2%ですので、少し強気ですが達成可能と考えています。」
      渡辺本部長「わかりました。では Q3 の全社目標は25億円で据え置きます。中村さんはA社のフォローを最優先で。小林さんは九州のリカバリープランを来週までに。加藤さんはキャンペーン開始後2週間で中間レポートをお願いします。」
    expected_behaviors:
      - "各エリアの売上実績と目標比を正確に記載する"
      - "具体的な数値（12.3億円、95%、18社等）を正確に反映する"
      - "A社の契約更新スケジュール（2月締結、年間約8,000万円）を記録する"
      - "マーケティングキャンペーンの詳細（予算500万、リード単価1.5万円等）を記載する"
      - "各担当者へのアクションアイテムを明記する"
      - "Q3全社目標25億円を記録する"
    failure_indicators:
      - "売上数値が誤っている"
      - "エリア別の報告が混同される"
      - "アクションアイテムの担当者が間違っている"
      - "キャンペーンの数値（予算、リード単価、コンバージョン率）が不正確"

  - id: "minutes-basic-weekly-standup"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。

      【会議情報】
      会議名: 開発チーム週次定例
      日時: 2025年11月10日(月) 9:30〜10:00
      参加者: 伊藤（チームリーダー）、松本、吉田、藤田、森

      【録音内容の書き起こし】
      伊藤「おはようございます。週次定例始めます。松本さんから順番にお願いします。」
      松本「先週はユーザー認証画面のリファクタリングを完了しました。今週はAPIのレスポンスキャッシュ実装に取り掛かります。ブロッカーは特にないです。」
      吉田「ダッシュボード画面のパフォーマンス改善をやっていました。クエリの最適化でページ読み込み時間を3.2秒から1.1秒に短縮できました。今週は管理画面のアクセス権限機能を実装します。仕様書の確認で伊藤さんに相談したい点が2つあります。」
      伊藤「了解、この会議の後で話しましょう。」
      藤田「モバイルアプリのプッシュ通知機能ですが、iOSは実装完了してAppleの審査に出しました。Androidは今週中に完了予定です。ブロッカーとしては、Firebase の料金プラン変更の影響確認が必要です。」
      森「テスト自動化のCI/CDパイプライン構築を進めています。GitHub Actionsの設定は完了しました。今週はE2Eテストの追加で、カバレッジを現在の62%から80%に引き上げることが目標です。」
      伊藤「ありがとうございます。全体的に順調ですね。Firebaseの件は藤田さん、今日中にコスト影響を確認して共有してください。あと、来週水曜にスプリントレビューがあるので、各自デモの準備をお願いします。以上です。」
    expected_behaviors:
      - "各メンバーの先週の成果と今週の予定を正確に記録する"
      - "パフォーマンス改善の具体的な数値（3.2秒→1.1秒）を含める"
      - "各メンバーのブロッカーの有無を記録する"
      - "アクションアイテム（Firebase確認、スプリントレビュー準備）を記載する"
      - "テストカバレッジの目標値（62%→80%）を正確に記載する"
    failure_indicators:
      - "各メンバーの報告内容が混同される"
      - "具体的な数値が誤っている"
      - "ブロッカーの記載が漏れる"
      - "アクションアイテムが欠落する"

  - id: "minutes-basic-board-meeting"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。

      【会議情報】
      会議名: 取締役会 臨時会議
      日時: 2025年12月3日(水) 16:00〜17:00
      参加者: 石川代表取締役、前田取締役（CFO）、木村取締役（CTO）、社外取締役 山口氏

      【録音内容の書き起こし】
      石川社長「臨時取締役会を開会します。本日の議題は、来期の設備投資計画と新規事業の承認です。まず前田さんから財務状況を。」
      前田CFO「今期の業績見通しですが、売上高は前年比115%の68億円、営業利益率は12.5%を見込んでいます。キャッシュポジションは約15億円です。来期の設備投資として、データセンター増設に4.5億円、R&D設備に2億円、合計6.5億円の投資計画を提案します。投資回収期間は3年を想定しています。」
      山口社外取締役「投資回収3年の根拠をもう少し詳しく。」
      前田CFO「データセンター増設により処理能力が2.5倍になり、新規SaaS顧客を年間50社追加で受け入れ可能になります。平均ARPAが年間600万円ですので、年間3億円の増収効果です。2年目で投資額の過半を回収できる計算です。」
      木村CTO「技術面では、現在のサーバー稼働率が87%に達しており、年末の繁忙期には95%を超える可能性があります。増設は半年以内に必要です。」
      石川社長「新規事業については木村さんから。」
      木村CTO「生成AI活用のコンサルティング事業を来期4月に立ち上げたいと考えています。初期投資は8,000万円、初年度の売上目標は2億円です。専任チーム5名を新規採用し、既存のAI開発知見を活用します。」
      山口社外取締役「競合状況は把握していますか。」
      木村CTO「大手コンサルファームが参入していますが、当社はAI製品の自社開発実績がある点で差別化できます。既に3社から引き合いがあります。」
      石川社長「では採決に移ります。設備投資計画6.5億円について、賛成の方は挙手を。」
      （全員賛成）
      石川社長「全員一致で承認します。新規事業については、次回の定例取締役会で正式に審議します。本日は以上です。」
    expected_behaviors:
      - "議決事項（設備投資6.5億円の承認、全員一致）を正確に記録する"
      - "財務数値（売上68億円、営業利益率12.5%、キャッシュ15億円等）を正確に反映する"
      - "投資計画の内訳（DC4.5億+R&D2億=6.5億）を記載する"
      - "新規事業の概要と数値を記録する"
      - "継続審議事項（新規事業は次回定例で正式審議）を明記する"
      - "取締役会として適切な形式で記録する"
    failure_indicators:
      - "議決結果が正確に記録されていない"
      - "財務数値に誤りがある"
      - "設備投資の内訳が不正確"
      - "継続審議事項の記載漏れ"
      - "取締役会議事録として不適切な形式"

generation:
  mode: cartesian
  max_variants: 4
