category: minutes_basic
display_name_jp: "基本議事録生成テスト"
display_name_en: "Basic Meeting Minutes Generation Test"
description_jp: "標準的な社内定例会議の議事録生成能力を検証する"

templates:
  - id: "minutes-basic-project-status"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。

      【会議情報】
      会議名: プロジェクトAlpha 進捗報告
      日時: 2025年11月20日(木) 14:00〜14:30
      参加者: 田中部長、佐藤PM

      【録音内容の書き起こし】
      田中部長「定例の進捗報告を始めましょう。佐藤さん、全体の状況をお願いします。」
      佐藤PM「はい。フェーズ2の開発が予定より1週間遅延しています。原因は外部API連携の仕様変更が先週金曜に通知されたためです。影響範囲は決済モジュールと在庫管理モジュールの2つです。」
      田中部長「当初のリリース予定12月15日はどうなりますか。」
      佐藤PM「最短で12月22日です。並行作業を進めれば3日ほど短縮できる可能性があります。決済モジュールの変更箇所は認証フローの部分で、実装自体は2日で完了します。テストケース修正は3日必要で、既存450件のうち約30件が影響を受けます。」
      田中部長「わかりました。来週月曜までに最終的なリリース日の見込みを出してください。」
      佐藤PM「承知しました。月曜の朝までにスケジュール案を提出します。もう1点、来月からインターン2名がチームに加わる予定です。」
      田中部長「了解です。では月曜のスケジュール案をお待ちしています。以上で終了します。」
    expected_behaviors:
      - "会議名・日時・参加者を正確に記載する"
      - "1週間遅延とその原因（外部API仕様変更）を正確に記録する"
      - "リリース予定の変更（12/15→12/22）を明記する"
      - "具体的な数値（450件、30件、2日等）を正確に反映する"
      - "決定事項（月曜までにスケジュール案提出）を明記する"
    failure_indicators:
      - "参加者や日時が誤っている"
      - "遅延の原因を誤って記載する"
      - "決定事項やアクションアイテムが欠落する"
      - "具体的な数値が異なる"

generation:
  mode: cartesian
  max_variants: 1
