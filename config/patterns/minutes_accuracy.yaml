category: minutes_accuracy
display_name_jp: "議事録正確性テスト"
display_name_en: "Meeting Minutes Accuracy Test"
description_jp: "具体的な数値・固有名詞・発言の帰属・決定事項など、事実の正確な記録能力を集中的に検証する"

templates:
  - id: "minutes-accuracy-numbers"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。数値の正確な記録を重視してください。

      【会議情報】
      会議名: 予算策定会議
      日時: 2025年11月25日(月) 13:00〜14:30
      参加者: 大塚部長、西村課長、中島、岡田

      【録音内容の書き起こし】
      大塚部長「来期の予算案を詰めていきましょう。西村さん、人件費から。」
      西村「人件費ですが、現在の正社員42名に加えて、来期は新卒8名、中途5名の採用を計画しています。人件費総額は前年比112%の7億3,400万円です。内訳は、基本給が5億8,200万円、社会保険料が1億1,500万円、残業手当が3,700万円です。」
      中島「システム開発費は2億1,800万円を要求します。内訳は、サーバーインフラが8,500万円、ソフトウェアライセンスが4,200万円、外注開発が9,100万円です。前年比では108%です。」
      岡田「マーケティング費は1億5,600万円です。オンライン広告が6,800万円、展示会出展が3,200万円、コンテンツ制作が2,800万円、調査費が2,800万円です。」
      大塚部長「全部門合計はいくらになりますか。」
      西村「現時点で11億800万円です。前期実績が10億2,000万円でしたので、約8.6%の増加です。」
      大塚部長「経営会議での上限は10億5,000万円です。5,800万円の削減が必要です。各部門で削減案を木曜までに出してください。」
    expected_behaviors:
      - "人件費の総額7億3,400万円と内訳を正確に記載する"
      - "採用計画（新卒8名、中途5名）を正確に記録する"
      - "システム開発費2億1,800万円と内訳を正確に記載する"
      - "マーケティング費1億5,600万円と内訳を正確に記載する"
      - "合計11億800万円、前期比8.6%増を記録する"
      - "削減目標5,800万円と期限（木曜）を明記する"
    failure_indicators:
      - "金額に1桁でも誤りがある"
      - "内訳の合計が総額と一致しない"
      - "前年比の%が誤っている"
      - "採用人数が異なる"

  - id: "minutes-accuracy-speaker-attribution"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。誰が何を発言したかを正確に記録してください。

      【会議情報】
      会議名: クレーム対応緊急会議
      日時: 2025年10月15日(火) 9:00〜9:45
      参加者: 村上GM、斎藤（カスタマーサポート部長）、長谷川（品質管理）、清水（法務）

      【録音内容の書き起こし】
      村上GM「緊急の案件です。昨日、主要顧客のB社から重大クレームが入りました。斎藤さん、経緯を。」
      斎藤「B社の調達部 佐々木様から昨日16時にお電話がありました。10月10日に納品した制御ユニット500台のうち、抜き取り検査で50台中3台に不良が見つかったとのことです。不良率6%は納品基準の1%を大きく超えています。」
      長谷川「品質管理部で出荷記録を確認しました。当該ロットの出荷前検査では不良率0.2%でした。検査基準のN=200、AQL=1.0で全数合格しています。出荷後に品質劣化が起きた可能性があります。」
      清水「法務の観点からは、納品基準超過ですので、契約書第12条の品質保証条項に基づく対応が必要です。具体的には、48時間以内に原因報告書の提出、良品への交換、再検査費用の負担が求められます。」
      村上GM「対応方針を決めます。斎藤さん、本日中にB社に一報を入れて、木曜までに原因報告書を提出すると伝えてください。長谷川さん、当該ロットの全数再検査と原因究明を今日から開始。清水さん、損害賠償の想定額を明日までに試算してください。」
      斎藤「承知しました。B社の佐々木様には本日午前中に連絡します。」
      長谷川「再検査には2日かかります。チーム全員をこの案件に振り向けます。」
      清水「損害賠償は、交換費用と再検査費用を合わせて最大1,200万円と概算しています。正式な試算は明日お出しします。」
      村上GM「1,200万円は想定範囲内です。では、各自進めてください。進捗は明日15時に再度集まって確認しましょう。」
    expected_behaviors:
      - "各発言者の発言内容を正確に帰属させる"
      - "B社の担当者名（佐々木様）を記録する"
      - "不良の具体的数値（50台中3台、不良率6%、基準1%）を正確に記載する"
      - "出荷前検査の数値（不良率0.2%、N=200、AQL=1.0）を正確に記載する"
      - "法務の参照条項（契約書第12条）を記載する"
      - "損害賠償の概算額（最大1,200万円）を記載する"
      - "各担当者のアクションアイテムと期限を正確に記録する"
    failure_indicators:
      - "発言者の取り違えがある"
      - "不良率や検査基準の数値が異なる"
      - "アクションアイテムの担当者と期限が不正確"
      - "契約条項の番号が間違っている"

  - id: "minutes-accuracy-decisions"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。決定事項と継続検討事項を明確に区別してください。

      【会議情報】
      会議名: 新オフィス移転計画委員会 第3回
      日時: 2025年11月28日(金) 15:00〜16:30
      参加者: 原田総務部長、新井（施設管理）、小野（人事）、三浦（IT推進）、社外コンサルタント 佐久間氏

      【録音内容の書き起こし】
      原田「第3回の移転計画委員会です。前回の宿題から確認しましょう。新井さん、物件の最終候補は。」
      新井「3物件に絞りました。A物件：丸の内、月額850万円、230坪。B物件：品川、月額620万円、260坪。C物件：渋谷、月額720万円、240坪。すべて2026年4月入居可能です。」
      原田「予算上限は月額700万円でしたね。」
      新井「はい。A物件は予算超過です。B物件とC物件が候補になります。ただ、C物件は賃料交渉の余地があるとのことで、月額680万円まで下げられる可能性があります。」
      佐久間「アクセスの観点では、B物件の品川は新幹線通勤の方には便利ですが、渋谷のC物件の方が採用面では有利です。25〜35歳の求職者の希望勤務地調査では、渋谷が品川の1.8倍の支持率です。」
      小野「人事としてもC物件を推奨します。現在の退職理由アンケートで「通勤利便性」が第2位です。渋谷移転で若手の定着率向上が期待できます。」
      三浦「ITインフラの観点では、両物件とも光回線10Gbps対応ですが、B物件はサーバールームスペースがあり、C物件はクラウド前提の設計です。現在のオンプレ移行計画を考えると、B物件の方がコスト効率が良いです。約1,500万円の移行コスト削減になります。」
      原田「意見が分かれていますね。では、以下の通り決定します。第一候補はC物件とします。ただし条件として、賃料を月額680万円以下に交渉すること。新井さん、来週中に賃料交渉を進めてください。交渉不成立の場合はB物件に切り替えます。ITインフラのクラウド移行の追加コストは三浦さんが来週金曜までに試算。小野さんは移転に伴う従業員説明会の準備を開始してください。最終決定は12月12日の第4回委員会で行います。」
    expected_behaviors:
      - "3物件の詳細（場所、賃料、面積）を正確に記載する"
      - "決定事項（第一候補C物件、条件付き）を明確に記録する"
      - "継続検討事項（最終決定は12/12）を明記する"
      - "条件（賃料680万円以下）と代替案（B物件）を記録する"
      - "各担当者のアクションアイテムと期限を正確に記載する"
      - "佐久間氏の求職者調査数値（1.8倍）を記録する"
      - "三浦のコスト試算（1,500万円削減）を記録する"
    failure_indicators:
      - "決定事項と継続検討事項が混同される"
      - "物件の賃料や面積が入れ替わっている"
      - "条件付き決定の条件部分が欠落する"
      - "アクションアイテムの期限が不正確"

generation:
  mode: cartesian
  max_variants: 3
