category: minutes_accuracy
display_name_jp: "議事録正確性テスト"
display_name_en: "Meeting Minutes Accuracy Test"
description_jp: "数値・固有名詞・発言帰属・決定事項の正確な記録能力を検証する"

templates:
  - id: "minutes-accuracy-budget"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。数値の正確な記録を重視してください。

      【会議情報】
      会議名: 来期予算策定会議
      日時: 2025年11月25日(月) 13:00〜13:40
      参加者: 大塚部長、西村課長

      【録音内容の書き起こし】
      大塚部長「来期の予算案を詰めましょう。西村さん、各費目の見積もりをお願いします。」
      西村「はい。まず人件費ですが、現在の正社員42名に加え、来期は新卒8名・中途5名の採用を計画しています。人件費総額は前年比112%の7億3,400万円です。内訳は基本給5億8,200万円、社会保険料1億1,500万円、残業手当3,700万円です。」
      大塚部長「システム関連は。」
      西村「システム開発費は2億1,800万円を要求します。サーバーインフラ8,500万円、ソフトウェアライセンス4,200万円、外注開発9,100万円です。前年比108%です。マーケティング費は1億5,600万円で、オンライン広告6,800万円、展示会出展3,200万円、コンテンツ制作2,800万円、調査費2,800万円です。」
      大塚部長「合計はいくらですか。」
      西村「現時点で11億800万円です。前期実績10億2,000万円に対し約8.6%の増加です。」
      大塚部長「経営会議での上限は10億5,000万円です。5,800万円の削減が必要です。各費目の削減案を木曜までに出してください。」
      西村「承知しました。木曜の朝までに削減案をまとめます。」
    expected_behaviors:
      - "人件費7億3,400万円と内訳3項目を正確に記載する"
      - "採用計画（新卒8名、中途5名、現在42名）を正確に記録する"
      - "システム開発費2億1,800万円と内訳3項目を正確に記載する"
      - "マーケティング費1億5,600万円と内訳4項目を正確に記載する"
      - "合計11億800万円と削減目標5,800万円を正確に記録する"
      - "期限（木曜）を明記する"
    failure_indicators:
      - "金額に誤りがある"
      - "内訳の項目が欠落している"
      - "前年比の%が誤っている"
      - "採用人数が異なる"

generation:
  mode: cartesian
  max_variants: 1
