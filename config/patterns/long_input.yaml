category: long_input
display_name_jp: "長文入力テスト"
display_name_en: "Long Input Stress Test"
description_jp: "段階的に長くなるプロンプトに対する処理能力・精度の劣化を検証する"

parameters:
  scale:
    - id: s500
      label: "500文字"
      char_count: 500
    - id: s1000
      label: "1000文字"
      char_count: 1000
    - id: s5000
      label: "5000文字"
      char_count: 5000
    - id: s10000
      label: "10000文字"
      char_count: 10000
    - id: s50000
      label: "50000文字"
      char_count: 50000
  task:
    - id: summarize
      label: "要約"
    - id: analyze
      label: "分析"
    - id: extract
      label: "データ抽出"
    - id: qa
      label: "質問応答"

parameter_data:
  scale:
    s500:
      filler_text: "弊社は2015年の設立以来、クラウドベースの業務効率化ソリューションを提供してまいりました。主力製品である統合管理プラットフォームは、国内300社以上の導入実績を誇り、特に製造業・流通業のお客様から高い評価をいただいております。昨年度の売上高は前年比23%増の48億円を達成し、営業利益率も15.2%と堅調に推移しております。今後の成長戦略として、AI技術を活用した予測分析機能の強化、東南アジア市場への進出、およびM&Aによるプロダクトラインの拡充を計画しております。中期経営計画では、2028年度に売上高100億円、営業利益率20%の達成を目指しています。"
    s1000:
      filler_text: "弊社は2015年の設立以来、クラウドベースの業務効率化ソリューションを提供してまいりました。主力製品である統合管理プラットフォームは、国内300社以上の導入実績を誇り、特に製造業・流通業のお客様から高い評価をいただいております。昨年度の売上高は前年比23%増の48億円を達成し、営業利益率も15.2%と堅調に推移しております。今後の成長戦略として、AI技術を活用した予測分析機能の強化、東南アジア市場への進出、およびM&Aによるプロダクトラインの拡充を計画しております。中期経営計画では、2028年度に売上高100億円、営業利益率20%の達成を目指しています。さらに、直近の四半期決算では、新規顧客獲得数が過去最高の87社を記録しました。解約率は1.2%と業界平均の3.5%を大幅に下回っており、プロダクトの定着度の高さを示しています。技術部門では、自然言語処理エンジンの精度向上プロジェクトが最終段階に入り、来月のリリースに向けてQAチームが24時間体制でテストを実施中です。人事面では、エンジニア採用を積極的に進めており、今期中に開発チームを現在の150名から200名に拡大する予定です。リモートワーク制度の拡充により、地方在住の優秀な人材の獲得にも成功しております。"
    s5000:
      filler_text: "弊社は2015年の設立以来、クラウドベースの業務効率化ソリューションを提供してまいりました。主力製品である統合管理プラットフォームは、国内300社以上の導入実績を誇ります。昨年度の売上高は前年比23%増の48億円を達成しました。以下に各事業部の詳細な業績報告、市場分析、競合状況、技術開発ロードマップ、人材戦略、財務計画、リスク要因分析、ESG対応状況、コンプライアンス報告、顧客満足度調査結果を含む包括的な報告書を記載いたします。"
    s10000:
      filler_text: "以下は、弊社の年次統合報告書です。経営戦略、財務諸表、事業セグメント別業績、研究開発活動、サステナビリティ報告、コーポレートガバナンス報告、リスクマネジメント、内部統制報告、株主への報告事項を網羅しています。"
    s50000:
      filler_text: "以下は、弊社グループの統合報告書・有価証券報告書・CSR報告書を統合した包括的年次レポートです。連結財務諸表、セグメント情報、関連当事者取引、企業集団の状況、設備の状況、提出会社の状況、経理の状況、監査報告書等を含みます。"

templates:
  - id: "long-{{ scale_id }}-{{ task_id }}-summarize-request"
    prompt: "以下の文章を200文字以内で要約してください。要約には必ず数値データを含めること。\n\n{{ scale_filler_text }}"
    expected_behaviors:
      - "指定文字数以内で要約を返す"
      - "元文中の重要な数値データを保持する"
      - "入力が長くても処理が完了する"
    failure_indicators:
      - "処理がタイムアウトする"
      - "途中で回答が切れる"
      - "入力を無視して一般的な回答を返す"
      - "数値データが要約から欠落する"

  - id: "long-{{ scale_id }}-{{ task_id }}-key-extraction"
    prompt: "以下のビジネス文書から、(1)会社名 (2)売上高 (3)利益率 (4)従業員数 (5)今後の計画 をJSON形式で抽出してください。該当データがない場合はnullとしてください。\n\n{{ scale_filler_text }}"
    expected_behaviors:
      - "正しいJSON形式で出力する"
      - "文書中の該当データを正確に抽出する"
      - "存在しないデータにはnullを設定する"
    failure_indicators:
      - "JSON形式が壊れている"
      - "存在するデータを見落とす"
      - "存在しないデータを捏造する"

  - id: "long-{{ scale_id }}-{{ task_id }}-tail-instruction"
    prompt: "{{ scale_filler_text }}\n\n上記の文章の最後の段落だけを英訳してください。それ以外の部分には触れないでください。"
    expected_behaviors:
      - "最後の段落のみを正確に特定する"
      - "指定部分だけを英訳する"
      - "長文の末尾にある指示を見落とさない"
    failure_indicators:
      - "文章全体を翻訳してしまう"
      - "末尾の指示を無視する"
      - "最後の段落を誤認識する"

  - id: "long-{{ scale_id }}-{{ task_id }}-embedded-question"
    prompt: "以下の文章を読んで、文中に隠された質問「今後の課題は何か」に対する回答を、文章の内容のみに基づいて述べてください。外部知識は使わないでください。\n\n{{ scale_filler_text }}"
    expected_behaviors:
      - "文中の情報のみに基づいて回答する"
      - "外部知識の混入がない"
      - "長文でも指示を正確に守る"
    failure_indicators:
      - "文中にない情報を捏造する"
      - "質問への回答ではなく要約を返す"
      - "長文の途中で処理精度が低下する"

generation:
  mode: scaling
  scale_param: scale
  scale_values: [500, 1000, 5000, 10000, 50000]
  max_variants: 200
