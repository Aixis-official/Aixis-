category: minutes_structure
display_name_jp: "議事録構造化テスト"
display_name_en: "Meeting Minutes Structure Test"
description_jp: "複数議題の分割・アクションアイテム抽出・決定事項の分離など構造化能力を検証する"

templates:
  - id: "minutes-structure-multi-topic"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。議題ごとに整理し、決定事項・アクションアイテムを分離してまとめてください。

      【会議情報】
      会議名: 月次部門レビュー
      日時: 2025年11月14日(金) 10:00〜10:45
      参加者: 永井部長、田口課長

      【録音内容の書き起こし】
      永井「月次レビューを始めます。議題は3つです。営業実績、新製品の進捗、経費精算システム刷新です。田口さん、営業から。」
      田口「11月の受注額は3億2,000万円で、月間目標3億円を達成しました。大きかったのはD社との3年契約で年間1億2,000万円です。一方、E社が競合に乗り換える可能性があり、年間4,000万円の売上リスクがあります。12月に特別条件のプロポーザルを提出する予定です。」
      永井「E社の件は最優先で。次に新製品。」
      田口「Version 3.0ですが、全25モジュール中20が開発完了、残り5は12月中旬完了予定です。ベータテストは1月15日開始、正式リリースは3月1日を予定しています。課題として大規模データ処理時のメモリ使用量が想定の1.5倍で、最適化が必要です。最悪2週間の遅延リスクがあります。」
      永井「メモリの件は早急に。最後に経費精算システム。」
      田口「現行システムのサポートが来年6月で終了するため、新システムへの移行が必要です。3社から提案を受けていますが、推奨はF社のクラウド型で初期費用500万円、月額15万円、導入期間3ヶ月です。」
      永井「F社で進めましょう。ただしセキュリティ監査を実施してから最終決定とします。田口さん、F社へのセキュリティ監査を来月中に完了させてください。まとめると、E社のリテンション最優先、メモリ最適化を早急に、F社のセキュリティ監査を来月中に。次回は12月12日です。」
    expected_behaviors:
      - "3つの議題を明確に分離して記載する"
      - "各議題の要点を簡潔に要約する"
      - "決定事項（F社で進める、条件付き）を明示する"
      - "アクションアイテム3件を担当者・期限とともに一覧化する"
      - "リスク事項（E社、メモリ問題）を識別して記録する"
      - "次回会議予定（12/12）を記載する"
    failure_indicators:
      - "議題が混在して整理されていない"
      - "決定事項と検討事項が混同されている"
      - "アクションアイテムが本文に埋もれている"
      - "数値が不正確"

generation:
  mode: cartesian
  max_variants: 1
