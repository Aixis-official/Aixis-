category: minutes_structure
display_name_jp: "議事録構造化テスト"
display_name_en: "Meeting Minutes Structure Test"
description_jp: "議題の分割・要約の構造・アクションアイテムの抽出・決定事項の分離など、議事録の構造化能力を検証する"

templates:
  - id: "minutes-structure-multi-topic"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。議題ごとに整理し、決定事項・アクションアイテムを分離してまとめてください。

      【会議情報】
      会議名: 部門横断定例会議
      日時: 2025年11月14日(金) 10:00〜11:30
      参加者: 永井執行役員（議長）、田口（営業）、久保（開発）、上田（人事）、丸山（経理）

      【録音内容の書き起こし】
      永井「定例会議を始めます。議題は4つです。まず営業報告、次に新製品開発の進捗、3番目が来期の採用計画、最後に経費精算システムの刷新です。田口さんから。」

      田口「営業報告です。11月の受注額は3億2,000万円で、月間目標3億円を達成しました。特に大きかったのはD社との3年契約で、年間契約額1億2,000万円です。一方、E社が競合に乗り換える可能性があり、年間4,000万円の売上リスクがあります。E社へのリテンション施策として、12月に特別条件のプロポーザルを提出する予定です。」

      永井「E社の件は重要ですね。では、開発の進捗を。」

      久保「新製品 Version 3.0 の開発状況です。全25モジュールのうち20モジュールが開発完了、残り5モジュールは12月中旬完了予定です。ベータテストは1月15日から開始し、正式リリースは3月1日を予定しています。技術的な課題として、大規模データ処理時のメモリ使用量が想定の1.5倍になっており、最適化が必要です。」

      永井「メモリの件はリリースに影響しますか。」

      久保「現時点では2週間の追加作業で対応可能と見ていますが、最悪の場合、リリースが2週間遅延する可能性があります。」

      上田「採用計画です。来期は全社で30名の新規採用を計画しています。内訳は、エンジニア15名、営業8名、管理部門7名です。エンジニア採用は特に競争が激しく、年俸水準を5%引き上げる案を検討中です。引き上げにより、年間人件費が約2,400万円増加します。」

      永井「年俸引き上げは経営会議マターですね。稟議書を準備してください。」

      丸山「経費精算システムの刷新です。現行システムのサポートが来年6月で終了するため、新システムへの移行が必要です。3社のベンダーから提案を受けており、コスト比較は資料をご覧ください。推奨はF社のクラウド型で、初期費用500万円、月額15万円です。導入期間は3ヶ月です。」

      永井「F社で進めましょう。ただし、セキュリティ監査を経理と情シスで実施してから最終決定とします。他に何かありますか。特になければ、まとめに移ります。」
    expected_behaviors:
      - "4つの議題を明確に分離して記載する"
      - "各議題の要点を簡潔に要約する"
      - "決定事項をリストで明示する"
      - "アクションアイテムを担当者・期限とともに一覧化する"
      - "リスク事項（E社、メモリ問題）を識別して記録する"
      - "継続検討事項（年俸引き上げ、セキュリティ監査）を明記する"
    failure_indicators:
      - "議題が混在して整理されていない"
      - "決定事項とアクションアイテムが本文に埋もれている"
      - "リスク事項が識別されていない"
      - "議題の順序が会議と異なる"

  - id: "minutes-structure-action-items"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。特にアクションアイテムの抽出と整理を重視してください。

      【会議情報】
      会議名: 新入社員研修プログラム策定会議
      日時: 2025年11月19日(水) 13:30〜15:00
      参加者: 片山人事部長、安藤（教育研修課長）、野村（開発部代表）、平田（営業部代表）、吉村（総務）

      【録音内容の書き起こし】
      片山「来年度の新入社員研修プログラムを決めていきます。入社日は4月1日、新卒12名の予定です。安藤さん、昨年の振り返りから。」
      安藤「昨年の研修は3週間で、参加者アンケートでは満足度3.6/5.0でした。改善要望が多かったのは、実務演習の時間が短い、配属先の業務体験がない、メンターとの接点が少ない、の3点です。」
      野村「開発部からは、プログラミング基礎研修を従来の3日から5日に拡充したいです。去年は3日では足りず、配属後に1ヶ月間の追加研修をやる羽目になりました。」
      平田「営業部は、ロールプレイング形式の商談研修を新設したいです。2日間の集中プログラムで、先輩社員がクライアント役をやります。」
      吉村「総務からは、ビジネスマナーとコンプライアンス研修を1日ずつ。特にSNS利用のガイドラインは必須です。」
      片山「研修期間を4週間に延長しましょう。1週目はビジネスマナー・コンプライアンス、2週目はプログラミング基礎、3週目は部門別専門研修、4週目は配属先でのOJTとメンターとの1on1。安藤さん、このフレームワークで詳細スケジュールを12月15日までに作成してください。」
      安藤「承知しました。各部門から研修コンテンツの提出が必要です。」
      片山「野村さんはプログラミング研修のカリキュラムを12月10日まで、平田さんはロールプレイングのシナリオを12月10日まで、吉村さんはコンプライアンス教材の更新を12月5日までにお願いします。メンター制度については安藤さんと私で設計して、12月20日の次回会議で確定しましょう。予算は前年比120%の360万円を確保してあります。」
    expected_behaviors:
      - "研修プログラムの全体構成（4週間、各週のテーマ）を構造化して記載する"
      - "アクションアイテムを担当者・期限の表形式で一覧化する"
      - "昨年の課題3点とそれぞれへの対応策を対応づけて記録する"
      - "予算情報（360万円、前年比120%）を記載する"
      - "次回会議の予定（12/20）と議題（メンター制度確定）を記載する"
    failure_indicators:
      - "アクションアイテムの担当者と期限が曖昧"
      - "4週間の構成が正しく整理されていない"
      - "複数のアクションアイテムの期限が混同されている"
      - "昨年の課題と改善策の対応関係が不明確"

  - id: "minutes-structure-long-meeting"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。長い会議ですが、要点を簡潔にまとめてください。

      【会議情報】
      会議名: 年末商戦対策本部 キックオフ
      日時: 2025年10月20日(月) 9:00〜11:00
      参加者: 藤原営業統括（本部長）、黒田（EC事業部）、今井（店舗事業部）、菅原（物流）、内田（マーケ）、佐野（カスタマーサポート）

      【録音内容の書き起こし】
      藤原「年末商戦対策本部のキックオフです。今年の目標は売上前年比115%の42億円。期間は11月15日から12月31日の47日間です。各部門の計画を確認していきましょう。」

      黒田「EC事業部の目標は22億円で、全体の52%を担います。ブラックフライデー（11/29）とサイバーマンデー（12/2）で5億円を見込んでいます。施策は、1つ目がポイント5倍キャンペーン、2つ目がタイムセール（毎日12時・20時の2回）、3つ目がインフルエンサーコラボ企画10本です。サーバー増強は完了済みで、ピーク時同時接続3万を処理可能です。」

      今井「店舗事業部は20億円が目標です。全国85店舗のうち、旗艦店15店舗では12月の毎週末にイベントを実施します。新規施策として、店舗受け取りで10%オフのO2Oキャンペーンを行います。人員は各店舗でアルバイトを平均3名増員し、合計255名の臨時採用を完了しています。」

      菅原「物流は、ピーク時の1日最大出荷数を15万件と想定しています。現在の処理能力は12万件なので、臨時倉庫を千葉に1拠点追加し、16万件まで対応可能にします。臨時倉庫の稼働開始は11月10日です。配送パートナーはヤマト運輸と佐川急便に加え、今年からAmazon配送サービスも利用します。当日配送エリアを首都圏に拡大し、注文の20%を当日配送でカバーする計画です。」

      内田「マーケティング予算は1億2,000万円です。配分は、デジタル広告7,000万円（うちGoogle 3,000万、Meta 2,500万、TikTok 1,500万）、テレビCM 3,000万円（12月上旬、関東圏15秒スポット30本）、その他2,000万円（チラシ、POP等）です。ROASは400%を目標にしています。」

      佐野「カスタマーサポートは、問い合わせ増加に備えてチャットボットの応答パターンを500件追加しました。有人対応は通常10名体制を18名に増員します。対応時間も8時〜22時に延長します。返品・交換の期限は1月15日まで延長する方針です。」

      藤原「ありがとうございます。全部門の計画を承認します。リスク管理として、売上進捗は毎日17時にダッシュボードで共有、問題発生時は即座に対策本部に報告してください。次回の全体会議は11月11日、各部門の最終準備状況を確認します。それでは各自準備を進めてください。」
    expected_behaviors:
      - "6部門の報告を構造的に整理する"
      - "全体目標（42億円、前年比115%）と各部門の目標・内訳を記載する"
      - "各部門の主要施策を簡潔にまとめる"
      - "具体的な数値を正確に記載する"
      - "運用ルール（毎日17時ダッシュボード共有）を記録する"
      - "エグゼクティブサマリーを冒頭に付加する"
    failure_indicators:
      - "6部門の報告が整理されていない"
      - "全体目標と各部門目標の整合性が取れていない"
      - "数値の桁や単位が誤っている"
      - "要約が冗長で会議のそのままの再現になっている"

