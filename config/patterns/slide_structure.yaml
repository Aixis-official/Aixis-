category: slide_structure
display_name_jp: "スライド構成・論理フローテスト"
display_name_en: "Slide Structure & Logical Flow Test"
description_jp: "問題解決型フロー、エグゼクティブサマリー構成、セクション間の論理的つながりなどスライドの構成力を検証する"

templates:
  - id: "slide-structure-problem-solution"
    prompt: "以下のビジネス課題について、「課題提起→原因分析→解決策→期待効果→実行計画」の流れでプレゼンテーションスライドを作成してください。\n\n課題：当社のカスタマーサポート部門の顧客満足度が業界平均を下回っている\n現状データ：\n- NPS（顧客推奨度）：-15（業界平均：+20）\n- 平均応答時間：8分（業界平均：3分）\n- 一次解決率：62%（業界平均：78%）\n- 離職率：年間35%（全社平均：12%）\n\n各スライドの冒頭にキーメッセージを配置し、データに基づいた論理展開をしてください。スライド間のつながりが明確になるようトランジションメッセージも含めてください。"
    expected_behaviors:
      - "課題→原因→解決策→効果→計画の論理フローに従う"
      - "各スライド冒頭にキーメッセージを配置する"
      - "数値データを根拠として適切に引用する"
      - "スライド間のトランジションメッセージを含める"
      - "原因分析と解決策が論理的に対応している"
    failure_indicators:
      - "論理フローが指定された順序と異なる"
      - "キーメッセージが欠落している"
      - "データを使わず抽象的な議論に終始する"
      - "原因と解決策の対応関係が不明確"
      - "スライド間のつながりが唐突"

  - id: "slide-structure-executive-appendix"
    prompt: "以下の内容で、エグゼクティブサマリー3枚＋詳細資料（Appendix）5枚の構成でスライドを作成してください。役員会議で使用し、本編3枚で意思決定を行い、質疑応答時にAppendixを参照します。\n\n報告内容：DX推進プロジェクトの中間報告\n- 進捗：全体の60%完了（計画比5%遅延）\n- 予算消化：1.2億円/2.0億円（60%消化）\n- 成果：営業部門のペーパーレス化完了、経理部門の月次決算3日短縮\n- 課題：製造部門のシステム移行でデータ整合性の問題が発生\n- 今後の計画：製造部門は外部コンサルを投入し3ヶ月で解決予定\n\nエグゼクティブサマリーは結論ファーストで、Appendixには詳細データ、スケジュール表、リスク一覧、予算内訳、体制図を含めてください。"
    expected_behaviors:
      - "本編3枚とAppendix5枚を明確に分離する"
      - "エグゼクティブサマリーは結論ファーストで構成する"
      - "本編だけで意思決定に必要な情報が揃っている"
      - "Appendixに詳細データ5種類を含める"
      - "本編からAppendixへの参照番号を付与する"
    failure_indicators:
      - "本編とAppendixの区別が曖昧"
      - "エグゼクティブサマリーが詳細すぎる"
      - "本編に情報が不足し意思決定できない"
      - "Appendixに指定された5項目が揃っていない"

  - id: "slide-structure-multi-section"
    prompt: "以下の3部構成のプレゼンテーションスライドを作成してください。各セクション間にセクション区切りスライドを挿入し、全体の流れが分かるように進捗バーまたはアジェンダの再表示を含めてください。\n\n第1部：市場環境分析（5分）\n- 国内SaaS市場の成長率と予測\n- 競合3社の動向（A社：価格攻勢、B社：機能拡充、C社：海外展開）\n- 当社のポジショニング\n\n第2部：当社の戦略（10分）\n- 3年間の中期経営計画の概要\n- 重点施策3つ（プロダクト強化、パートナー拡大、カスタマーサクセス体制構築）\n- KPI設定\n\n第3部：投資計画と株主還元（5分）\n- 設備投資・研究開発投資の計画\n- 配当方針\n- 株主優待制度の変更点\n\nプレゼン全体で20分、12～15枚のスライドで構成してください。"
    expected_behaviors:
      - "3部構成を明確にセクション分けする"
      - "セクション区切りスライドを挿入する"
      - "各セクションの時間配分に応じたスライド枚数にする"
      - "アジェンダまたは進捗バーで現在位置を示す"
      - "12～15枚の範囲で構成する"
    failure_indicators:
      - "セクション区切りがない"
      - "全体の位置を示すナビゲーション要素がない"
      - "時間配分とスライド枚数が大きく乖離する"
      - "スライド枚数が指定範囲外"
      - "セクション間の論理的なつながりが不自然"

generation:
  mode: cartesian
  max_variants: 3
