category: slide_basic
display_name_jp: "基本スライド生成テスト"
display_name_en: "Basic Slide Generation Test"
description_jp: "企業プレゼン、会議要約、研修資料、製品発表など基本的なスライド生成能力を検証する"

templates:
  - id: "slide-basic-corporate-presentation"
    prompt: "以下の内容で社内向け四半期業績報告のプレゼンテーションスライドを作成してください。\n\n対象期間：2025年度第3四半期（10月～12月）\n売上高：前年同期比108%の45億円\n営業利益：6.2億円（利益率13.8%）\n主要トピック：新規顧客獲得数32社、既存顧客解約率1.2%に改善\n課題：海外事業の立ち上げ遅延、人材採用の競争激化\n\nスライド構成は、表紙、エグゼクティブサマリー、売上推移グラフ、部門別実績、課題と対策、来期の目標の順でお願いします。各スライドにはスピーカーノートも付けてください。"
    expected_behaviors:
      - "指定された6枚構成のスライドを作成する"
      - "数値データを正確に反映する"
      - "表紙に期間と報告タイトルを含める"
      - "各スライドにスピーカーノートを付与する"
      - "グラフや図表の提案を含める"
    failure_indicators:
      - "指定された構成を無視する"
      - "数値が入力と異なる"
      - "スピーカーノートが欠落している"
      - "スライドではなく文書形式で出力する"

  - id: "slide-basic-meeting-summary"
    prompt: "以下の会議内容をスライド3枚にまとめてください。経営会議で報告するための簡潔な資料です。\n\n会議名：プロジェクトX進捗報告会\n日時：2025年11月15日 14:00-15:30\n参加者：開発部 田中部長、営業部 山田課長、品質管理 佐藤主任\n\n議題1：開発進捗 - フェーズ2完了、フェーズ3は2週間遅延。原因はAPI仕様変更への対応。\n議題2：顧客フィードバック - ベータ版の満足度スコア4.2/5.0。UI改善要望が最多。\n議題3：リリース計画 - 当初3月末を4月中旬に変更提案。品質確保を優先。\n決定事項：リリース延期を承認、追加テスト工数として150万円の予算追加申請を行う。\n\n各スライドは要点を箇条書きにし、視認性を重視してください。"
    expected_behaviors:
      - "3枚のスライドに情報を適切に分割する"
      - "箇条書きで要点を簡潔にまとめる"
      - "決定事項を明確に表示する"
      - "経営会議向けの簡潔なトーンで記述する"
    failure_indicators:
      - "3枚を超えるスライド数になる"
      - "文章が冗長で箇条書きになっていない"
      - "決定事項が埋もれて目立たない"
      - "会議の全発言を逐語的に記載する"

  - id: "slide-basic-training-material"
    prompt: "新入社員向けの情報セキュリティ研修スライドを作成してください。所要時間30分の研修で使用します。\n\n必須トピック：\n1. パスワード管理の基本（8文字以上、多要素認証の推奨）\n2. フィッシングメールの見分け方（実例3パターン）\n3. 社外での業務時の注意点（公衆Wi-Fi、画面覗き見防止）\n4. インシデント発生時の報告フロー（発見→上長報告→IT部門連絡→記録）\n\nスライドは10枚程度で、各トピックに理解度確認のクイズスライドを1枚ずつ入れてください。図やアイコンの使用を積極的に提案してください。"
    expected_behaviors:
      - "10枚前後のスライド構成を提案する"
      - "4つの必須トピックをすべてカバーする"
      - "各トピックにクイズスライドを含める"
      - "図やアイコンの具体的な配置を提案する"
      - "新入社員向けの平易な表現を使用する"
    failure_indicators:
      - "必須トピックの一部が欠落する"
      - "クイズスライドが含まれない"
      - "専門用語を多用して初心者に分かりにくい"
      - "30分の研修に対してスライド数が極端に多いまたは少ない"

  - id: "slide-basic-product-launch"
    prompt: "新製品発表会用のプレゼンテーションスライドを作成してください。対象はメディア関係者と取引先企業です。\n\n製品名：SmartDesk Pro\n製品カテゴリ：AIアシスタント搭載スマートデスク\n主な特長：\n- 姿勢検知AIによる自動昇降機能\n- 音声操作対応（日本語・英語）\n- デスク上の書類を自動スキャン・デジタル化\n- 消費電力：従来品比40%削減\n\n価格：オープン価格（想定実売198,000円）\n発売日：2026年4月1日\nターゲット：中堅～大企業のオフィス向け\n\nスライド構成：ティーザー→製品紹介→技術詳細→競合比較→価格・販売計画→Q&A\nプレゼンは20分を想定しています。"
    expected_behaviors:
      - "指定された6セクション構成のスライドを作成する"
      - "製品の特長を視覚的に訴求する構成にする"
      - "ティーザースライドで期待感を演出する"
      - "競合比較を客観的に提示する"
      - "メディア・取引先向けの適切なトーンを使用する"
    failure_indicators:
      - "製品スペックを羅列するだけの退屈な構成になる"
      - "ティーザー要素がない"
      - "価格や発売日などの重要情報が欠落する"
      - "社内向けのような砕けたトーンになる"

generation:
  mode: cartesian
  max_variants: 4
