category: slide_japanese
display_name_jp: "日本語ビジネス品質テスト"
display_name_en: "Japanese Business Quality Test"
description_jp: "稟議書スライド、時候の挨拶、日本語数値表記、敬語レベルの書き分けなど日本語ビジネス文書としての品質を検証する"

templates:
  - id: "slide-japanese-ringi-keigo"
    prompt: "以下の内容で稟議書形式のプレゼンテーションスライドを作成してください。取締役会での説明に使用するため、最高レベルの敬語表現を使用してください。\n\n件名：本社オフィス移転に関する件\n起案部署：総務部\n起案者：総務部長 中村太郎\n起案日：2025年12月1日\n\n概要：現本社ビルの賃貸借契約が2026年9月末で満了するため、移転先の選定および移転費用の承認をお願いしたく存じます。\n\n移転先候補：品川シーズンタワー 15階（延床面積2,000平米）\n移転費用：総額8,500万円（内訳：原状回復2,000万円、新オフィス内装3,500万円、引越費用1,500万円、IT環境構築1,500万円）\n年間賃料：現行比15%増の1億2,000万円（ただし通勤費は年間800万円削減見込み）\n\n決裁区分：取締役会決議事項\n\nスライドには承認フロー図も含め、費用対効果の分析スライドも作成してください。"
    expected_behaviors:
      - "稟議書の正式なフォーマットをスライドに適用する"
      - "取締役会向けの最上級敬語を一貫して使用する"
      - "費用内訳を明確に表示する"
      - "承認フロー図を含める"
      - "費用対効果の定量分析を含める"
    failure_indicators:
      - "敬語レベルが取締役会向けとして不適切"
      - "稟議書の必須項目（起案日、起案者、決裁区分等）が欠落"
      - "費用の合計が計算間違い"
      - "です・ます調とである調が混在する"

  - id: "slide-japanese-seasonal-greeting"
    prompt: "取引先向けの年末挨拶プレゼンテーションスライドを作成してください。12月の取引先訪問時にタブレットで見せながら説明する資料です。\n\n内容：\n1. 年末のご挨拶（師走の候の時候の挨拶から始める）\n2. 今年度の取引実績の振り返り（取引額：前年比120%の3億円達成）\n3. 来年度の新サービスのご案内（AI搭載在庫管理システム「ZaicoAI」）\n4. 来年度のお取引継続のお願い\n5. 年末年始の営業日のご案内（12/28～1/5休業）\n\nスライドは5枚で、和風デザインのテーマを提案してください。全体を通じて取引先への感謝と敬意を込めた表現にしてください。"
    expected_behaviors:
      - "師走の候の適切な時候の挨拶で始める"
      - "取引先への感謝を丁寧に表現する"
      - "新サービス紹介が押し売りにならないバランス"
      - "和風デザインテーマの具体的な提案を含める"
      - "年末年始の営業日を見やすく表示する"
    failure_indicators:
      - "時候の挨拶が12月の季節感と合わない"
      - "取引先への敬意が不足した表現がある"
      - "新サービスの紹介が営業色が強すぎる"
      - "カジュアルすぎるトーンになる"

  - id: "slide-japanese-financial-numbers"
    prompt: "以下の財務データを株主総会報告用のスライドにまとめてください。数値は日本の慣例に従い、億円・万円単位で表記し、千円単位の端数も正確に記載してください。\n\n連結業績：\n- 売上高：28,456,789千円（前期比 +12.3%）\n- 営業利益：3,891,234千円（営業利益率 13.7%）\n- 経常利益：4,012,567千円\n- 当期純利益：2,734,891千円\n- 1株当たり当期純利益：342.56円\n- 1株当たり年間配当金：120円（中間60円、期末60円）\n- 配当性向：35.0%\n- 自己資本比率：58.2%\n- ROE：14.8%\n\nスライドは3枚構成で、1枚目はハイライト、2枚目は損益計算書サマリー、3枚目は株主還元方針としてください。前期比の増減には矢印記号を使用してください。"
    expected_behaviors:
      - "千円単位を億円・万円に正確に変換して表示する"
      - "前期比増減に矢印記号を使用する"
      - "株主総会にふさわしい格式ある表現を使用する"
      - "3枚構成の指示に従う"
      - "配当性向やROEなど指標を正確に記載する"
    failure_indicators:
      - "千円から億円への換算が間違っている"
      - "数値の桁区切りが日本の慣例と異なる"
      - "前期比の増減方向が逆になっている"
      - "カジュアルな表現が混在する"

  - id: "slide-japanese-mixed-formality"
    prompt: "同じプロジェクト報告内容を、以下の3種類の異なる敬語レベルで、それぞれ1枚のスライドにまとめてください。\n\n報告内容：新基幹システム導入プロジェクトの進捗。現在フェーズ2のテスト工程で、進捗率75%。予算は計画内。来月からフェーズ3（本番移行）に移行予定。リスクとして旧システムとのデータ連携に課題あり。\n\nスライドA：社長・役員向け報告（最上級の尊敬語・謙譲語を使用）\nスライドB：部長会議での報告（丁寧語ベースのビジネス敬語）\nスライドC：チーム内共有用（です・ます調だが堅すぎない表現）\n\n3枚のスライドで、情報の粒度と表現レベルの違いが明確に分かるようにしてください。"
    expected_behaviors:
      - "3種類の異なる敬語レベルを正確に書き分ける"
      - "役員向けは最上級敬語で簡潔にまとめる"
      - "部長会議向けは丁寧語ベースで適度な詳細を含める"
      - "チーム内用はフランクだが丁寧さを保つ"
      - "同じ内容を伝えつつ情報粒度を変える"
    failure_indicators:
      - "3枚とも同じ敬語レベルになる"
      - "敬語の使い分けが不自然または間違っている"
      - "役員向けスライドに技術的詳細が多すぎる"
      - "チーム内用スライドがタメ口になる"

generation:
  mode: cartesian
  max_variants: 4
