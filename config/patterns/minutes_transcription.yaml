category: minutes_transcription
display_name_jp: "議事録 書き起こし正確性テスト"
display_name_en: "Meeting Minutes Transcription Accuracy Test"
description_jp: "一人による報告録音の書き起こし・数値正確性・決定事項・アクションアイテム抽出を検証する"

templates:
  - id: "minutes-transcription-solo-report"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。数値・固有名詞の正確な記録を重視してください。

      【会議情報】
      会議名: プロジェクトAlpha 週次報告（録音メモ）
      日時: 2025年11月20日(木) 14:00〜14:10
      参加者: 佐藤PM

      【録音内容の書き起こし】
      佐藤PM「プロジェクトAlphaの週次報告を録音します。11月20日木曜日、14時です。」
      佐藤PM「まず全体進捗の報告です。計画50タスク中38タスクが完了しました。進捗率は76%です。先週末の68%から8ポイント改善しています。残り12タスクの内訳ですが、高優先が5件、中優先が4件、低優先が3件です。」
      佐藤PM「高優先5件の詳細です。1件目が決済モジュールのAPI v3対応、2件目がユーザー認証フローの改修、3件目が管理画面のアクセス権限実装、4件目が本番環境のデプロイスクリプト更新、5件目がE2Eテストの自動化設定です。」
      佐藤PM「フェーズ2の開発状況について報告します。予定より4日遅延しています。原因は11月15日に通知された外部決済API v3の仕様変更です。ベンダーはStripe社で、認証フローがOAuth 2.0からOIDCへ移行されます。」
      佐藤PM「影響範囲です。決済モジュールの認証フロー部分の修正工数は2人日。テストケースへの影響は既存280件のうち18件で、内訳はユニットテスト11件、結合テスト5件、E2Eテスト2件です。テスト修正に1.5人日、合計で3.5人日の追加工数が発生します。」
      佐藤PM「リリース予定の変更についてです。当初12月10日をリリース日としていましたが、12月17日への変更を提案します。変更理由は先ほどのAPI対応に加え、QA期間を十分に確保するためです。」
      佐藤PM「予算の状況です。追加工数3.5人日の人件費は約28万円です。全体予算2,400万円に対し、現在の消化額は1,780万円、消化率74.2%です。残予算は620万円で、追加費用を含めても予算内に収まります。年度末までの見込みは2,250万円で、150万円の余裕があります。」
      佐藤PM「品質指標の報告です。今週のコードレビュー指摘件数は平均2.3件で、先週の3.1件から改善しています。バグチケットの未解決件数は7件で、クリティカルが1件、メジャーが3件、マイナーが3件です。クリティカルの1件は決済処理のタイムアウト問題で、山本さんが対応中です。」
      佐藤PM「チーム体制についてです。現在の構成はバックエンド3名、フロントエンド2名、QA1名の計6名です。来月12月1日から新メンバーの鈴木さんがフロントエンドに配属予定です。なお、QAの木村さんが12月8日から12日まで有給取得予定のため、この期間のテスト実行は山本さんが代行します。」
      佐藤PM「各メンバーの稼働状況です。山本さんがバックエンドリードとしてAPI改修を担当中で、来週の見込み稼働は40時間。木村さんがQAとしてテストケース修正を進めており、来週は32時間。田村さんと中村さんがフロントエンドの管理画面実装を担当しており、それぞれ来週40時間と36時間です。」
      佐藤PM「リスク管理です。現在3件のリスクを管理しています。リスク1、12月5日に予定されているサーバー増強作業がインフラチームの都合で遅延する可能性があります。対策として12月3日にステージング環境で事前検証を実施します。」
      佐藤PM「リスク2、Stripe社のAPI v3のドキュメントが一部未公開で、認証フローの詳細仕様が12月1日に公開予定です。公開が遅れた場合、さらに2日の遅延リスクがあります。対策として、仕様公開前にモック実装を進めておきます。」
      佐藤PM「リスク3、年末の休暇シーズンで12月23日から1月3日までチームの稼働が50%に低下します。リリース後のバグ対応体制として、山本さんと私でオンコール体制を敷く予定です。」
      佐藤PM「来週の主要マイルストーンです。11月25日にAPI v3対応の実装完了、11月27日にテストケース修正完了、11月28日に結合テスト開始です。」
      佐藤PM「最後にアクションアイテムの確認です。5つあります。1つ目、API v3の認証フロー修正を11月28日までに完了、担当は山本。2つ目、テストケース18件の修正を11月29日までに完了、担当は木村。3つ目、田中部長へのスケジュール変更報告を明日11月21日に実施、担当は私です。4つ目、ステージング環境の事前検証を12月3日に実施、担当は山本と私。5つ目、年末オンコール体制のシフト表を12月10日までに作成、担当は私です。」
      佐藤PM「次回の報告は来週11月27日木曜日の同時刻です。以上で録音を終了します。」
    expected_behaviors:
      - "会議名・日時・参加者(佐藤PM一名)を正確に記載する"
      - "進捗数値(50タスク中38完了、76%、先週68%、残タスク優先度内訳5+4+3件)を正確に記録する"
      - "高優先5件の内容をリスト化する"
      - "遅延原因(外部決済API v3仕様変更、Stripe社、11/15通知、OAuth2.0→OIDC)を正確に記載する"
      - "工数(修正2人日、テスト1.5人日、合計3.5人日)を正確に記載する"
      - "テスト影響(280件中18件、内訳11+5+2件)を正確に記載する"
      - "予算(全体2,400万、消化1,780万/74.2%、残620万、追加28万、年度末見込み2,250万)を記録する"
      - "品質指標(レビュー指摘2.3件、バグ未解決7件の内訳)を記録する"
      - "チーム体制(6名構成、鈴木さん12/1配属、木村さん有給12/8-12)を記録する"
      - "リスク3件(サーバー増強遅延、API仕様未公開、年末稼働低下)を対策付きで記録する"
      - "アクションアイテム5件を担当者・期限付きで一覧化する"
      - "来週のマイルストーン(11/25、11/27、11/28)を記載する"
      - "次回報告日(11/27)を記載する"
    failure_indicators:
      - "数値に誤りがある(進捗率、テスト件数、予算額等)"
      - "アクションアイテムが欠落している"
      - "リスク事項が記録されていない"
      - "予算や品質指標の詳細が欠落している"

generation:
  mode: cartesian
  max_variants: 1
