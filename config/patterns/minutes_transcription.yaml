category: minutes_transcription
display_name_jp: "議事録 書き起こし正確性テスト"
display_name_en: "Meeting Minutes Transcription Accuracy Test"
description_jp: "一人による報告録音の書き起こし・数値正確性・決定事項・アクションアイテム抽出を検証する"

templates:
  - id: "minutes-transcription-solo-report"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。数値・固有名詞の正確な記録を重視してください。

      【会議情報】
      会議名: プロジェクトAlpha 週次報告（録音メモ）
      日時: 2025年11月20日(木) 14:00〜14:10
      参加者: 佐藤PM

      【録音内容の書き起こし】
      佐藤PM「プロジェクトAlphaの週次報告を録音します。全体進捗ですが、計画50タスク中38タスクが完了、進捗率76%です。先週末時点の68%から8ポイント改善しました。」
      佐藤PM「フェーズ2の開発は予定より4日遅延しています。原因は11月15日に通知された外部決済API v3の仕様変更で、影響範囲は決済モジュールの認証フロー部分です。修正工数は2人日、テストケース修正が1.5人日で、合計3.5人日の追加工数になります。」
      佐藤PM「既存テストケース280件のうち、影響を受けるのは18件です。内訳はユニットテスト11件、結合テスト5件、E2Eテスト2件。テスト修正に2日間必要です。」
      佐藤PM「リリース予定の変更について。当初12月10日でしたが、12月17日に変更を提案します。予算への影響は追加工数3.5人日の人件費約28万円で、残予算620万円の範囲内です。」
      佐藤PM「リスクとして1件。12月5日のサーバー増強作業が遅延する可能性があり、12月3日にステージング環境で事前検証を実施予定です。」
      佐藤PM「アクションアイテムは3つ。1つ目、API修正を11月25日までに完了、担当は山本。2つ目、テストケース修正を11月27日までに完了、担当は木村。3つ目、田中部長へのスケジュール変更報告を明日11月21日に実施、担当は私です。以上です。」
    expected_behaviors:
      - "会議名・日時・参加者(佐藤PM一名)を正確に記載する"
      - "進捗数値(50タスク中38完了、76%、先週68%)を正確に記録する"
      - "遅延原因(外部決済API v3仕様変更、11/15通知)を正確に記載する"
      - "工数(修正2人日、テスト1.5人日、合計3.5人日)を正確に記載する"
      - "テスト影響(280件中18件、内訳11+5+2件)を正確に記載する"
      - "リリース日変更(12/10→12/17)と追加費用(28万円、残予算620万円)を記録する"
      - "リスク事項(サーバー増強遅延、12/3事前検証)を記録する"
      - "アクションアイテム3件を担当者・期限付きで一覧化する"
    failure_indicators:
      - "数値に誤りがある"
      - "アクションアイテムが欠落している"
      - "リリース日変更の情報が不正確"
      - "リスク事項が記録されていない"

generation:
  mode: cartesian
  max_variants: 1
