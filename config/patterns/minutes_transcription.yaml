category: minutes_transcription
display_name_jp: "議事録 書き起こし正確性テスト"
display_name_en: "Meeting Minutes Transcription Accuracy Test"
description_jp: "長時間会議の書き起こし・数値正確性・発言帰属・決定事項・アクションアイテム抽出を総合的に検証する"

templates:
  - id: "minutes-transcription-comprehensive"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。数値・固有名詞・発言者の正確な記録を重視してください。

      【会議情報】
      会議名: プロジェクトPhoenix 月次進捗レビュー
      日時: 2025年11月20日(木) 14:00〜15:10
      参加者: 田中部長、佐藤PM

      【録音内容の書き起こし】
      田中部長「それでは月次進捗レビューを始めます。佐藤さん、まず全体のステータスからお願いします。」
      佐藤PM「はい。プロジェクトPhoenixの全体進捗ですが、計画された87タスクのうち62タスクが完了、現在の進捗率は71.3%です。先月末時点では58%でしたので、13.3ポイント改善しています。フェーズ2の開発は予定より1週間遅延しています。原因は10月31日に通知された外部決済API v3への仕様変更です。」
      田中部長「影響範囲を具体的に教えてください。」
      佐藤PM「影響を受けるのは決済モジュールと在庫管理モジュールの2つです。決済モジュールでは認証フローの変更が必要で、実装工数は2人日です。在庫管理モジュールではWebhookのペイロード形式変更への対応が必要で、こちらは1.5人日です。合計3.5人日の追加工数が発生します。」
      田中部長「テストへの影響は。」
      佐藤PM「既存テストケース450件のうち、32件が影響を受けます。内訳はユニットテスト18件、結合テスト9件、E2Eテスト5件です。テストケースの修正と再実行に3日間必要です。加えて、外部API連携のリグレッションテストとして新規15件を追加する計画です。」
      田中部長「当初のリリース予定12月15日はどうなりますか。」
      佐藤PM「現実的なシナリオとして、12月22日を新リリース日として提案します。内訳は、実装修正に2日間、テスト修正・追加に3日間、結合テスト実行に2日間です。並行作業で最大2日間短縮可能ですが、リスクバッファを考慮し12月22日が安全です。」
      田中部長「予算への影響は。」
      佐藤PM「追加工数3.5人日の人件費が約28万円です。現在の予算消化率は78.2%で、残予算は1,420万円です。外注の追加は不要ですが、12月の残業代として別途50万円程度を見込んでいます。全体予算6,500万円に対して、最終着地見込みは6,280万円、予算内に収まります。」
      田中部長「チーム体制はどうですか。」
      佐藤PM「現在のチーム構成は正社員6名、業務委託3名の計9名です。12月1日から新卒の鈴木さんが配属されて10名になります。また、来年1月からインターン2名が加わる予定です。ただし、バックエンドリードの山本さんが12月10日〜17日の間、研修で不在になります。この期間はフロントエンドの木村さんにコードレビューを代行してもらいます。」
      田中部長「リスク管理について報告してください。」
      佐藤PM「リスクは3件管理しています。リスク1: 決済API変更による品質リスク、対策は先ほどのテスト追加で低減済み。リスク2: 本番環境のサーバー増強が12月10日に予定されていますが、インフラチームの作業遅延の可能性があります。念のため12月5日にステージング環境で事前検証を実施します。リスク3: 年末の負荷増大で、12月25日〜1月5日のピーク期間中にオートスケールが正しく動作するか、負荷テストを12月18日に実施予定です。」
      田中部長「わかりました。では決定事項をまとめます。第一にリリース日を12月22日に変更。第二にテストケース32件修正と新規15件追加を佐藤さんが来週金曜までに完了。第三にサーバー増強の事前検証を12月5日に実施、担当は佐藤さんとインフラの高橋さん。第四に負荷テストを12月18日に実施。最後に、来週月曜の朝9時までに修正後の詳細スケジュールを私に提出してください。次回レビューは12月18日です。」
      佐藤PM「承知しました。全て対応いたします。」
    expected_behaviors:
      - "会議名(プロジェクトPhoenix)・日時・参加者を正確に記載する"
      - "進捗数値(87タスク中62完了、71.3%、先月58%)を正確に記録する"
      - "外部API仕様変更(10/31通知、決済API v3)を正確に記載する"
      - "テスト影響(450件中32件、内訳18+9+5件、新規15件追加)を正確に記載する"
      - "予算関連数値(28万円、消化率78.2%、残1,420万円、全体6,500万円、着地6,280万円)を正確に記載する"
      - "チーム体制(正社員6名、業務委託3名、新卒鈴木さん配属、インターン2名)を記録する"
      - "リスク3件を識別し具体的な対策・日程を記録する"
      - "決定事項5件とアクションアイテムを担当者・期限付きで一覧化する"
      - "次回会議予定(12/18)を記載する"
      - "発言の帰属(田中部長/佐藤PM)が正しい"
    failure_indicators:
      - "数値に誤りがある(進捗率、テスト件数、予算額等)"
      - "決定事項やアクションアイテムが欠落している"
      - "リスク管理の内容が不正確または欠落"
      - "発言者の帰属が誤っている"
      - "会議のメタ情報(日時、参加者)が間違っている"

