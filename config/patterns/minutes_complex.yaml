category: minutes_complex
display_name_jp: "議事録 複合評価テスト"
display_name_en: "Complex Meeting Minutes Test"
description_jp: "複数議題・意見対立・条件付き決定を含む会議の構造化・客観記録能力を検証する"

templates:
  - id: "minutes-complex-strategy-discussion"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。複数の議題を整理し、決定事項・アクションアイテムを分離してまとめてください。意見が対立していますが、客観的に記録してください。

      【会議情報】
      会議名: 次期アップデート方針会議
      日時: 2025年11月27日(木) 15:00〜15:10
      参加者: 永井部長、田口課長

      【録音内容の書き起こし】
      永井「では始めましょう。今日は3つ議題があります。11月の営業実績、次期アップデートの開発方針、経費精算システムの刷新です。田口さん、営業から報告をお願いします。」
      田口「はい。11月の受注額は3億2,000万円で、月間目標3億円を107%で達成しました。年初来の累計は28億5,000万円で、年間目標32億円に対して89%の進捗です。残り1ヶ月で3億5,000万円の積み上げが必要です。」
      永井「大きな案件はありましたか。」
      田口「D社との包括契約を締結しました。3年契約で年間1億2,000万円です。一方でリスクもあります。E社が競合のStellarProに乗り換えを検討しています。年間4,000万円の売上減少リスクがあります。E社の担当者からは価格とカスタマイズ性で劣るとフィードバックをもらっています。」
      永井「E社は最優先で対応してください。12月10日までに特別条件のプロポーザルを出せますか。」
      田口「はい、対応します。」

      永井「次に、次期アップデートの方針について。」
      田口「2つのアプローチで方針判断が必要です。A案はエンタープライズ向けSSO連携とアクセス権限管理の優先開発です。大口顧客5社から要望が来ており、対応しないと1社あたり年間平均3,000万円、最大1.5億円の失注リスクがあります。開発期間は認証基盤改修込みで3ヶ月です。」
      永井「B案は。」
      田口「B案は個人ユーザー向けUX改善の優先です。DAUの30%を占める個人ユーザーの月間離脱率が3ヶ月前の8%から12%に悪化しています。重要なのは、個人ユーザーの口コミ経由でのエンタープライズ導入が全体の35%を占めている点です。UX改善自体はフロントエンド変更のみで1ヶ月ですが、A案を先にやるとUX改善は6ヶ月後になります。」
      永井「私はA案が正しいと考えます。短期の売上インパクトが1.5億円と明確です。」
      田口「懸念があります。離脱率を放置すると、エンタープライズの新規獲得パイプラインも6ヶ月後には枯渇します。目先の1.5億円を守って成長チャネルを失うリスクがあります。」
      永井「では折衷案を提案します。フェーズ1として、フルカスタムの認証基盤改修は行わず、Auth0の拡張機能を使ったSSO連携を2ヶ月で開発します。これと並行して、離脱率に直結するオンボーディングフローの改修を先行します。フェーズ2でUX改善の残りに取り組みます。」
      田口「2ヶ月短縮は合理的です。ただし条件をつけたいです。オンボーディング改修後1ヶ月の時点で離脱率が10%以下に改善しなければ、フェーズ2のUX改善を最優先に繰り上げるべきです。」
      永井「その条件を採用します。大口顧客5社には3月までにSSO提供開始とロードマップを共有してください。」

      永井「最後に経費精算システムです。」
      田口「現行システムのベンダーサポートが来年6月30日で終了します。3社から提案を受けています。F社はクラウド型で初期費用500万円、月額15万円、導入期間3ヶ月です。G社はオンプレミスで初期1,200万円、月額なし、導入5ヶ月。H社はSaaSで初期100万円、月額35万円、導入1ヶ月です。3年TCOで比較するとF社1,040万円、G社1,200万円、H社1,360万円で、F社が最も経済的です。」
      永井「セキュリティ面は問題ないですか。」
      田口「F社はISO 27001認証取得済みで、データセンターは国内です。ただし、当社の情報セキュリティ基準での監査はまだ実施していません。」
      永井「F社で進めましょう。ただしセキュリティ監査を来月中に完了させて、通過してから最終契約とします。4月1日から運用開始、3月は並行稼働期間とします。」

      永井「では全体のまとめです。決定事項は3つ。第一にE社リテンション対応を最優先、12月10日までにプロポーザル提出。第二にVersion 3.0はフェーズ1でAuth0ベースSSO連携を2ヶ月で開発し、オンボーディング改修を並行実施、離脱率改善が条件付き。第三にF社経費精算システムを採用、セキュリティ監査通過が前提で4月1日運用開始。アクションアイテムは、田口さんがE社プロポーザル12月10日まで、顧客5社へのロードマップ共有を12月中、セキュリティ監査依頼を来週中にお願いします。次回は12月25日です。」
    expected_behaviors:
      - "3つの議題(営業実績、アップデート方針、経費精算)を明確に分離する"
      - "営業数値(受注3.2億/107%、累計28.5億、目標32億/89%、D社年間1.2億、E社リスク4,000万)を正確に記録する"
      - "A案(SSO、1.5億円失注リスク、3ヶ月)とB案(UX改善、離脱率8→12%、35%経由)を客観的に両論併記する"
      - "折衷案(Auth0でSSO2ヶ月+オンボーディング並行)と条件(離脱率10%以下で再検討)を正確に記録する"
      - "3社比較(F社/G社/H社の初期費用・月額・導入期間・3年TCO)を正確に記録する"
      - "F社採用の条件(セキュリティ監査通過、4月1日運用開始、3月並行稼働)を記録する"
      - "決定事項3件とアクションアイテムを担当者・期限付きで一覧化する"
      - "次回会議(12/25)を記載する"
      - "意見対立(永井:A案支持 vs 田口:懸念)を客観的に記録し一方に偏らない"
    failure_indicators:
      - "議題が混在して整理されていない"
      - "A案/B案が客観的に記録されていない"
      - "折衷案の条件(離脱率10%以下)が欠落している"
      - "3社比較の数値が不正確"
      - "決定事項とアクションアイテムが本文に埋もれている"
      - "数値に誤りがある"

generation:
  mode: cartesian
  max_variants: 1
