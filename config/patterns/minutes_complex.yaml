category: minutes_complex
display_name_jp: "議事録 複合評価テスト"
display_name_en: "Complex Meeting Minutes Test"
description_jp: "複数議題・意見対立・条件付き決定・リスク評価など高難度な会議の構造化・記録能力を総合的に検証する"

templates:
  - id: "minutes-complex-executive-review"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。複数の議題を整理し、決定事項・アクションアイテム・リスク事項を分離してまとめてください。意見が対立する場面がありますが、客観的に記録してください。

      【会議情報】
      会議名: 事業戦略レビュー 兼 来期計画承認会議
      日時: 2025年11月27日(木) 15:00〜16:00
      参加者: 永井部長、田口課長

      【録音内容の書き起こし】
      永井「事業戦略レビューを始めます。今日の議題は4つです。営業実績と来期見通し、次期プロダクトVersion 3.0の開発方針、経費精算システム刷新、来期の人員計画です。田口さん、営業から。」

      田口「11月の受注額は3億2,000万円で、月間目標3億円を107%で達成しました。年初来の累計は28億5,000万円で、年間目標32億円に対し89%の進捗です。残り3ヶ月で3億5,000万円の積み上げが必要です。注目案件として、D社との3年間の包括契約を締結し、年間契約額は1億2,000万円です。」
      永井「年間目標への到達見込みは。」
      田口「パイプライン上は十分ですが、リスクがあります。E社が競合のStellarProに乗り換えを検討しており、年間4,000万円の売上が失われる可能性があります。E社の担当者から、価格とカスタマイズ性で劣るとフィードバックをもらっています。12月10日までに特別条件のプロポーザルを提出する予定です。」
      永井「E社の件は最優先で対応してください。次にVersion 3.0の開発方針。」

      田口「Version 3.0について方針の判断が必要です。2つのアプローチで意見が分かれています。A案はエンタープライズ向けSSO連携とアクセス権限管理の優先開発です。大口顧客5社からの要望があり、1社あたり年間契約額が平均3,000万円、対応しないと失注リスクが最大1.5億円です。開発期間は認証基盤の改修込みで3ヶ月です。」
      永井「もう一方は。」
      田口「B案は個人ユーザー向けUX改善の優先です。DAUの30%を占める個人ユーザーの月間離脱率が先月12%に達し、3ヶ月前の8%から4ポイント悪化しています。重要なのは、個人ユーザーの口コミ経由でのエンタープライズ導入が全体の35%を占めている点です。UX改善は前面改修のみで1ヶ月ですが、A案を先にやるとUX改善は6ヶ月後になります。」
      永井「私はA案のエンタープライズ優先が正しいと考えます。短期的な売上インパクトが明確です。」
      田口「私はそこに懸念があります。個人ユーザーの離脱を放置すると、エンタープライズの新規獲得パイプラインも6ヶ月後には枯渇します。目先の1.5億円を守って、将来の成長チャネルを失うリスクがあります。」
      永井「では折衷案を提案します。フェーズ1としてAuth0の拡張機能を使ったSSO連携を2ヶ月で開発します。フルカスタムの認証基盤改修は行わず、カスタマイズ性は一部犠牲にします。これと並行して、離脱率に直結するオンボーディングフローの改修だけは先行して進めます。フェーズ2でUX改善の残りに取り組む。この案でどうですか。」
      田口「Auth0で2ヶ月短縮は合理的です。ただし条件として、オンボーディング改修後1ヶ月の時点で離脱率が10%以下に改善しなければ、フェーズ2のUX改善を最優先に繰り上げることを決めておきたいです。」
      永井「了解です。その条件を付けます。大口顧客5社には3月までにSSO提供開始とロードマップを共有してください。」

      永井「次に経費精算システム。」
      田口「現行システムのベンダーサポートが来年6月30日で終了します。3社から提案を受けていて、F社のクラウド型を推奨します。初期費用500万円、月額15万円、導入期間3ヶ月です。G社はオンプレミスで初期費用1,200万円、月額なし、導入5ヶ月。H社はSaaSで初期費用100万円、月額35万円、導入1ヶ月です。3年TCOで比較すると、F社1,040万円、G社1,200万円、H社1,360万円でF社が最安です。」
      永井「F社で進めましょう。ただし情報セキュリティ監査を通してから最終契約とします。監査は来月中に完了させてください。4月1日から運用開始、3月は並行稼働期間とします。」

      永井「最後に来期の人員計画。」
      田口「来期の採用計画ですが、開発チームに中途3名、営業に中途2名、カスタマーサクセスに中途1名の計6名を要求します。人件費増は年間4,800万円です。現在の離職率が年間15%で、自然減を考慮すると実質増員は3〜4名になる見込みです。採用開始は1月、入社目標は4月です。」
      永井「人件費は来期予算の範囲内ですか。」
      田口「来期予算要求額は12億3,000万円で、うち人件費は8億2,000万円です。今期実績対比106%で、採用6名分を含めても経営会議の上限12億5,000万円の範囲内です。」
      永井「了解です。採用計画は承認します。人事部との調整を年内に完了してください。」

      永井「では全体のまとめです。決定事項は4つ。第一にE社リテンション対応を最優先、12月10日までにプロポーザル提出。第二にVersion 3.0はフェーズ1でAuth0ベースSSO連携2ヶ月開発+オンボーディング並行改修、離脱率改善条件付き。第三にF社経費精算システムを採用、セキュリティ監査通過が前提、4月1日運用開始。第四に来期採用6名を承認、年内に人事調整完了。次回会議は12月25日です。以上。」
    expected_behaviors:
      - "4つの議題(営業実績, Version3.0方針, 経費精算, 人員計画)を明確に分離する"
      - "営業数値(受注3.2億, 累計28.5億, 目標32億, D社年間1.2億, E社リスク4,000万)を正確に記録する"
      - "Version3.0のA案・B案を客観的に両論併記する"
      - "折衷案(Auth0でSSO2ヶ月+オンボーディング並行)と条件(離脱率10%以下)を正確に記録する"
      - "3社比較(F社/G社/H社の初期費用・月額・導入期間・3年TCO)を正確に記録する"
      - "人員計画(中途6名, 人件費4,800万, 離職率15%, 予算12.3億)を正確に記録する"
      - "決定事項4件をそれぞれの条件・期限付きで一覧化する"
      - "アクションアイテムを担当者・期限とともに記録する"
      - "次回会議予定(12/25)を記載する"
      - "意見対立(永井:A案支持 vs 田口:B案懸念)を客観的に記録し一方に偏らない"
    failure_indicators:
      - "議題が混在して整理されていない"
      - "A案/B案の対立が客観的に記録されていない"
      - "折衷案の条件(離脱率10%以下で再検討)が欠落している"
      - "3社比較の数値が不正確または欠落"
      - "決定事項とアクションアイテムが本文に埋もれている"
      - "数値に誤りがある"

