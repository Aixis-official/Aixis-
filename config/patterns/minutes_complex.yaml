category: minutes_complex
display_name_jp: "議事録 複合評価テスト"
display_name_en: "Complex Meeting Minutes Test"
description_jp: "複数議題・意見対立・条件付き決定を含む会議の構造化・客観記録能力を検証する"

templates:
  - id: "minutes-complex-strategy-discussion"
    prompt: |
      以下の会議録音の内容から議事録を作成してください。複数の議題を整理し、決定事項・アクションアイテムを分離してまとめてください。意見が対立していますが、客観的に記録してください。

      【会議情報】
      会議名: 次期アップデート方針会議
      日時: 2025年11月27日(木) 15:00〜15:10
      参加者: 永井部長、田口課長

      【録音内容の書き起こし】
      永井「今日は2つ議題があります。次期アップデートの方針と、経費精算システムの刷新です。まず次期アップデートから。」
      田口「方針で意見が分かれています。A案はエンタープライズ向けSSO連携の優先開発で、大口顧客5社からの要望です。対応しないと年間最大1.5億円の失注リスクがあります。開発期間は3ヶ月です。」
      永井「もう一方は。」
      田口「B案は個人ユーザー向けUX改善の優先です。月間離脱率が8%から12%に悪化しており、個人ユーザーの口コミ経由でのエンタープライズ導入が全体の35%を占めるので、放置すると長期的に影響があります。UX改善自体は1ヶ月ですが、A案を先にやると6ヶ月後になります。」
      永井「私はA案が正しいと思います。売上インパクトが明確です。」
      田口「懸念があります。目先の1.5億円を守って、将来の成長チャネルを失うリスクがあります。」
      永井「折衷案でいきましょう。フェーズ1でAuth0を使ってSSO連携を2ヶ月で開発し、並行してオンボーディング改修を進めます。ただし、オンボーディング改修後1ヶ月で離脱率が10%以下に改善しなければ、フェーズ2のUX改善を最優先に繰り上げます。顧客5社には3月までにSSO提供と伝えてください。」

      永井「次に経費精算システム。」
      田口「現行システムのサポートが来年6月末で終了します。F社クラウド型を推奨します。初期500万円、月額15万円、導入3ヶ月。3年TCOは1,040万円で3社中最安です。」
      永井「F社で進めましょう。ただしセキュリティ監査を来月中に通してから最終契約とします。4月1日運用開始を目指してください。次回は12月25日です。」
    expected_behaviors:
      - "2つの議題(アップデート方針、経費精算)を明確に分離する"
      - "A案(SSO、1.5億円リスク、3ヶ月)とB案(UX改善、離脱率12%、35%経由)を客観的に両論併記する"
      - "折衷案(Auth0でSSO2ヶ月+オンボーディング並行、離脱率10%条件)を正確に記録する"
      - "経費精算の決定(F社、初期500万、月額15万、セキュリティ監査条件)を記録する"
      - "決定事項とアクションアイテムを期限付きで一覧化する"
      - "次回会議(12/25)を記載する"
      - "意見対立を一方に偏らず記録する"
    failure_indicators:
      - "議題が混在して整理されていない"
      - "A案/B案が客観的に記録されていない"
      - "折衷案の条件(離脱率10%以下)が欠落している"
      - "数値に誤りがある"

generation:
  mode: cartesian
  max_variants: 1
