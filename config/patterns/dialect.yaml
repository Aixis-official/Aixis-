category: dialect
display_name_jp: "方言対応テスト"
display_name_en: "Dialect Handling Test"
description_jp: "各地方の方言による指示への対応能力を検証する"

parameters:
  dialect:
    - id: kansai
      label: "関西弁"
      region: "関西"
    - id: tohoku
      label: "東北弁"
      region: "東北"
    - id: kyushu
      label: "九州弁"
      region: "九州"
    - id: hokkaido
      label: "北海道弁"
      region: "北海道"
    - id: okinawa
      label: "沖縄方言"
      region: "沖縄"
  task_type:
    - id: summarize
      label: "要約タスク"
    - id: translate
      label: "翻訳タスク"
    - id: qa
      label: "質問応答"
    - id: draft
      label: "文書作成"

parameter_data:
  dialect:
    kansai:
      greeting: "なんやねん"
      request: "してくれへん？"
      thanks: "おおきに"
      question: "なんでやねん"
    tohoku:
      greeting: "なんだべ"
      request: "してけろ"
      thanks: "ありがどさん"
      question: "なしてだべ"
    kyushu:
      greeting: "なんばしよっと"
      request: "してくれんね"
      thanks: "だんだん"
      question: "なんでね"
    hokkaido:
      greeting: "なまら"
      request: "してくれるかい"
      thanks: "したっけね"
      question: "なしたの"
    okinawa:
      greeting: "はいさい"
      request: "してくれーさい"
      thanks: "にふぇーでーびる"
      question: "ぬーやが"

templates:
  - id: "dialect-{{ dialect_id }}-{{ task_type_id }}-basic"
    prompt: "{{ dialect_greeting }}、ちょっと{{ task_type_label }}{{ dialect_request }} 日本の四季について簡単に教えて。"
    expected_behaviors:
      - "方言を理解して内容に沿った回答を返す"
      - "タスクの内容（{{ task_type_label }}）を正しく実行する"
    failure_indicators:
      - "方言を無視して意味不明な回答を返す"
      - "エラーメッセージを返す"
      - "言語を誤認識する"

  - id: "dialect-{{ dialect_id }}-{{ task_type_id }}-business"
    prompt: "{{ dialect_greeting }}。うちの会社の来月の売上予測について{{ task_type_label }}{{ dialect_request }} 前年同月比で15%増を見込んどるんやけど、リスク要因も含めて分析してほしいんや。"
    expected_behaviors:
      - "ビジネス文脈を理解した回答を返す"
      - "方言にかかわらず専門的な分析を提供する"
    failure_indicators:
      - "方言部分で混乱してビジネス内容を無視する"
      - "非日本語として処理する"

  - id: "dialect-{{ dialect_id }}-{{ task_type_id }}-mixed"
    prompt: "お世話になっております。{{ dialect_greeting }}、実は{{ task_type_label }}をお願いしたいんですけど{{ dialect_request }} 弊社の新商品のキャッチコピーを5案ほど考えていただけますか。{{ dialect_thanks }}"
    expected_behaviors:
      - "敬語と方言が混在しても理解して回答する"
      - "キャッチコピーを複数案提示する"
    failure_indicators:
      - "敬語と方言の混在で解析に失敗する"
      - "1案しか提示しない"

generation:
  mode: cartesian
  max_variants: 200
