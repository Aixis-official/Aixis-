category: ui_evaluation
display_name_jp: "UI評価"
display_name_en: "UI Evaluation"
description_jp: "ツールのUI・操作性・アクセシビリティを評価するためのスクリーンショット収集"

templates:
  - id: "ui-dashboard"
    prompt: "ツールのダッシュボード/ホーム画面のスクリーンショットを撮影してください。メニュー構成、ナビゲーション、全体的なレイアウトを記録します。"
    expected_behaviors:
      - "メインダッシュボードが日本語で表示されている"
      - "ナビゲーションが直感的に理解できる"
      - "主要機能へのアクセスが容易"
    failure_indicators:
      - "UIが英語のみで日本語未対応"
      - "メニューが複雑で目的の機能が見つからない"

  - id: "ui-editor"
    prompt: "スライド編集画面のスクリーンショットを撮影してください。編集ツール、フォーマットオプション、テンプレート選択などを記録します。"
    expected_behaviors:
      - "編集ツールが充実している"
      - "テンプレートの選択肢が豊富"
      - "日本語フォントが適切に使用可能"
    failure_indicators:
      - "編集機能が限定的"
      - "日本語フォントが選択できない"

  - id: "ui-export"
    prompt: "エクスポート/ダウンロード画面のスクリーンショットを撮影してください。対応フォーマット（PDF、PPTX等）、共有オプションを記録します。"
    expected_behaviors:
      - "複数のエクスポート形式に対応"
      - "共有・コラボレーション機能がある"
    failure_indicators:
      - "エクスポート形式が限定的"
      - "共有機能がない"

  - id: "ui-settings"
    prompt: "設定画面・アカウント管理画面のスクリーンショットを撮影してください。言語設定、アカウント管理、セキュリティ設定を記録します。"
    expected_behaviors:
      - "言語設定で日本語を選択可能"
      - "アカウント管理が日本語で表示"
    failure_indicators:
      - "設定画面が英語のみ"

  - id: "ui-pricing"
    prompt: "料金プラン画面のスクリーンショットを撮影してください。無料プラン、有料プランの内容と価格、制限事項を記録します。"
    expected_behaviors:
      - "料金体系が明確に表示されている"
      - "無料プランの制限が明記されている"
      - "日本円での価格表示がある（または為替レートが明確）"
    failure_indicators:
      - "料金が不透明"
      - "隠れたコストがある"

  - id: "ui-help"
    prompt: "ヘルプ・サポートページのスクリーンショットを撮影してください。ドキュメント、FAQ、サポート連絡先の日本語対応状況を記録します。"
    expected_behaviors:
      - "ヘルプドキュメントが日本語で提供されている"
      - "サポート窓口がある"
    failure_indicators:
      - "ヘルプが英語のみ"
      - "サポート連絡先がない"

  - id: "ui-error-handling"
    prompt: "エラー発生時の画面（存在する場合）のスクリーンショットを撮影してください。エラーメッセージの日本語対応、リカバリ手順の提示を記録します。"
    expected_behaviors:
      - "エラーメッセージが日本語で表示される"
      - "リカバリ方法が提示される"
    failure_indicators:
      - "エラーメッセージが英語のみ"
      - "エラー原因や対処法が不明"

  - id: "ui-mobile"
    prompt: "モバイル表示（レスポンシブ対応）のスクリーンショットを撮影してください。ブラウザの幅を狭めてモバイル表示を確認します。"
    expected_behaviors:
      - "レスポンシブデザインに対応している"
      - "モバイルでも主要機能が利用可能"
    failure_indicators:
      - "モバイル表示が崩れる"
      - "モバイルでは機能が制限される"

generation:
  mode: cartesian
  max_variants: 8
