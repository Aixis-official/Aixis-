category: ui_evaluation
display_name_jp: UI評価
display_name_en: UI Evaluation
description_jp: ツール全体のUI・操作性・日本語対応を一括評価

templates:
  - id: ui-comprehensive
    prompt: |
      以下のUI要素のスクリーンショットをできるだけ多く撮影してください。
      各画面で「全画面」または「部分」スクリーンショットを使用します。

      ■ 撮影対象:
      1. ダッシュボード/ホーム画面（メニュー構成、ナビゲーション）
      2. スライド編集画面（編集ツール、フォーマットオプション）
      3. テンプレート選択画面（テンプレートの種類と品質）
      4. エクスポート/ダウンロード画面（対応フォーマット）
      5. 共有・コラボレーション機能
      6. 設定画面（言語設定、アカウント管理）
      7. 料金プラン画面（価格体系、無料/有料の違い）
      8. ヘルプ/サポートページ（日本語ドキュメント）
      9. エラー表示（発生した場合）
      10. モバイル表示（ブラウザ幅を狭めて確認）

      ※ 該当しない項目はスキップして構いません
      ※ 撮影が完了したら「次へ」を押してください
    expected_behaviors:
      - "ダッシュボードが日本語で表示されている"
      - "編集ツールが充実しており直感的に操作できる"
      - "日本語フォントが適切に使用可能"
      - "複数のエクスポート形式に対応している"
      - "料金体系が明確に表示されている"
      - "ヘルプドキュメントが日本語で提供されている"
      - "レスポンシブデザインに対応している"
      - "エラーメッセージが日本語で表示される"
    failure_indicators:
      - "UIが英語のみで日本語未対応"
      - "編集機能が限定的"
      - "エクスポート形式が限定的"
      - "料金が不透明"
      - "ヘルプが英語のみ"

generation:
  mode: cartesian
  max_variants: 1
