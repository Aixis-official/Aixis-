category: slide_accuracy
display_name_jp: "正確性・ハルシネーション検出テスト"
display_name_en: "Accuracy & Hallucination Detection Test"
description_jp: "事実制約の遵守、データ捏造の回避、矛盾するデータの取り扱いなどスライド生成時の正確性を検証する"

templates:
  - id: "slide-accuracy-factual-constraints"
    prompt: "以下の厳密な制約条件に基づいてプロジェクト報告スライドを5枚作成してください。制約条件に記載されていない情報は絶対に追加しないでください。\n\n制約条件：\n- プロジェクト名：Project Alpha\n- 期間：2025年4月1日～2025年12月31日（9ヶ月間）\n- メンバー数：正確に12名（PM1名、SE4名、PG5名、テスター2名）\n- 総予算：8,000万円（人件費6,000万円、外注費1,500万円、その他500万円）\n- 現在の進捗率：67%\n- 完了したタスク：要件定義、基本設計、詳細設計、製造（80%完了）\n- 未完了タスク：製造（残20%）、単体テスト、結合テスト、総合テスト、リリース\n\nこれらの数値と事実のみを使用してスライドを作成してください。推測や補足情報の追加は不要です。"
    expected_behaviors:
      - "制約条件の数値をすべて正確に反映する"
      - "記載されていない情報を追加しない"
      - "メンバー構成の合計が12名になる"
      - "予算内訳の合計が8,000万円になる"
      - "完了・未完了タスクを正確にリストする"
    failure_indicators:
      - "制約にない情報を捏造する（例：具体的な課題、KPI等）"
      - "数値を勝手に変更または丸める"
      - "メンバー数や予算の合計が合わない"
      - "完了していないタスクを完了と表示する"

  - id: "slide-accuracy-no-fabrication"
    prompt: "以下の情報のみを使用して、新規事業提案のスライドを4枚作成してください。\n\n提案内容：ペット向けサブスクリプションサービス\n市場規模：記載なし（調査中のため不明と明記すること）\n競合情報：記載なし（調査中のため不明と明記すること）\n初期投資額：3,000万円\n月額料金：2,980円（税込）\nサービス内容：月1回のペットフード配送＋オンライン獣医相談\n想定顧客数：未定\n\n市場規模や競合情報など、提供されていないデータについては「調査中」「未定」と正直に記載してください。もっともらしい数値を作り上げないでください。"
    expected_behaviors:
      - "不明な情報を「調査中」「未定」と正直に表示する"
      - "市場規模の数値を捏造しない"
      - "競合企業名を勝手に挙げない"
      - "提供された情報のみでスライドを構成する"
      - "不明点があることを課題として提示する"
    failure_indicators:
      - "市場規模をもっともらしく捏造する"
      - "存在しない競合企業を挙げる"
      - "想定顧客数を勝手に設定する"
      - "不明な情報を隠して完成度の高い資料に見せかける"

  - id: "slide-accuracy-conflicting-data"
    prompt: "以下のデータを使って営業部門の実績報告スライドを作成してください。ただし、データに矛盾が含まれています。矛盾を発見した場合は、スライド内で明確に指摘してください。\n\nデータ：\n- 営業部門全体の売上：10億円\n- 東日本エリアの売上：6億円\n- 西日本エリアの売上：5億円\n- 営業担当者数：50名\n- 1人あたり平均売上：2,500万円（注：50名×2,500万円=12.5億円で全体売上と不一致）\n- 新規顧客獲得数：120社\n- 新規顧客からの売上比率：30%（注：3億円相当だが、新規120社の平均単価を計算すると250万円）\n- 受注率：45%\n- 提案件数：200件（注：200件×45%=90件で、新規120社と矛盾の可能性）\n\n矛盾点をそのまま見過ごさず、データの整合性について注記を入れてスライドを作成してください。"
    expected_behaviors:
      - "東日本＋西日本の合計が全体売上を超える矛盾を指摘する"
      - "1人あたり平均売上×人数が全体売上と不一致であることを指摘する"
      - "提案件数と新規顧客数の関係の矛盾可能性を指摘する"
      - "矛盾を注記付きでスライドに記載する"
      - "データ確認が必要な項目を明確にリストする"
    failure_indicators:
      - "矛盾するデータをそのまま記載する"
      - "矛盾を検出できない"
      - "勝手にデータを修正して辻褄を合わせる"
      - "矛盾点の指摘が不完全"

generation:
  mode: cartesian
  max_variants: 3
