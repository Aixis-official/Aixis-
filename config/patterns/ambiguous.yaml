category: ambiguous
display_name_jp: "曖昧指示テスト"
display_name_en: "Ambiguous Prompt Test"
description_jp: "意図が曖昧・多義的なプロンプトに対する解釈能力と確認動作を検証する"

parameters:
  ambiguity_type:
    - id: referential
      label: "指示対象の曖昧さ"
    - id: scope
      label: "範囲の曖昧さ"
    - id: intent
      label: "意図の曖昧さ"
    - id: quantity
      label: "量・程度の曖昧さ"
    - id: contextual
      label: "文脈依存の曖昧さ"
  domain:
    - id: general
      label: "一般"
    - id: business
      label: "ビジネス"
    - id: technical
      label: "技術"

parameter_data:
  ambiguity_type:
    referential:
      desc: "「あれ」「それ」など指示対象が不明確"
    scope:
      desc: "対象範囲が特定できない"
    intent:
      desc: "何をしてほしいのか読み取れない"
    quantity:
      desc: "「いくつか」「適当に」など数量が不明確"
    contextual:
      desc: "前提となる文脈が欠落"
  domain:
    general:
      desc: "日常的な話題"
    business:
      desc: "ビジネスの文脈"
    technical:
      desc: "技術的な文脈"

templates:
  - id: "ambig-{{ ambiguity_type_id }}-{{ domain_id }}-kosoado"
    prompt: "あれについて教えて"
    expected_behaviors:
      - "「あれ」が何を指すか確認する"
      - "可能な解釈をいくつか提示する"
      - "追加情報を求める"
    failure_indicators:
      - "推測で回答して確認しない"
      - "「あれ」を特定のものと決めつける"
      - "意味不明としてエラーを返す"

  - id: "ambig-{{ ambiguity_type_id }}-{{ domain_id }}-iikanji"
    prompt: "いい感じにして"
    expected_behaviors:
      - "何を「いい感じ」にするか確認する"
      - "「いい感じ」の基準について質問する"
      - "対象物の指定を求める"
    failure_indicators:
      - "何も確認せず勝手に作業を始める"
      - "拒否するだけで代替案を示さない"
      - "無関係な出力を返す"

  - id: "ambig-{{ ambiguity_type_id }}-{{ domain_id }}-tekitou"
    prompt: "適当にまとめといて。あと、さっきの件もよろしく。なるはやで。"
    expected_behaviors:
      - "「適当に」の程度を確認する"
      - "「さっきの件」の特定を求める"
      - "「なるはや」の具体的な期限を確認する"
    failure_indicators:
      - "曖昧な指示をすべて自己判断で処理する"
      - "「さっきの件」を架空の内容で埋める"
      - "3つの曖昧ポイントの一部しか確認しない"

  - id: "ambig-{{ ambiguity_type_id }}-{{ domain_id }}-implicit-biz"
    prompt: "例の資料、ちょっと直しておいてもらえます？上の人がちょっと気にしてたところがあるんで。あと、来週のあれも準備しておいてください。"
    expected_behaviors:
      - "「例の資料」「上の人」「あれ」の特定を求める"
      - "日本語の暗黙的コミュニケーションパターンを認識する"
      - "修正箇所の具体的な指示を求める"
    failure_indicators:
      - "架空の資料内容で回答する"
      - "「上の人」を具体的な人物と推定する"
      - "曖昧さを認識しない"

  - id: "ambig-{{ ambiguity_type_id }}-{{ domain_id }}-scope-unclear"
    prompt: "うちのシステムのパフォーマンスを改善して"
    expected_behaviors:
      - "どのシステムか確認する"
      - "パフォーマンスの指標（速度、メモリ、スループット等）を確認する"
      - "現在の問題点や改善目標を質問する"
    failure_indicators:
      - "特定のシステムを仮定して回答する"
      - "一般的なパフォーマンス改善策を並べるだけ"
      - "具体的な環境情報なしに解決策を提示する"

  - id: "ambig-{{ ambiguity_type_id }}-{{ domain_id }}-quantity"
    prompt: "新規事業のアイデアをいくつか出して。あまり多すぎず、でも少なすぎず。斬新だけど現実的なやつで。予算はそこそこで。"
    expected_behaviors:
      - "具体的な数を確認する"
      - "「斬新だけど現実的」の基準を確認する"
      - "「そこそこの予算」の具体的な範囲を質問する"
    failure_indicators:
      - "任意の数のアイデアを出して確認しない"
      - "予算の制約を無視する"
      - "「斬新」と「現実的」のバランスが著しく偏る"

generation:
  mode: cartesian
  max_variants: 180
