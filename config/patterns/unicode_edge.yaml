category: unicode_edge
display_name_jp: "Unicode/特殊文字テスト"
display_name_en: "Unicode Edge Case Test"
description_jp: "特殊文字、絵文字、異体字、結合文字等の処理能力を検証する"

parameters:
  char_type:
    - id: emoji_basic
      label: "基本絵文字"
    - id: emoji_combo
      label: "結合絵文字"
    - id: kanji_rare
      label: "難読漢字"
    - id: fullwidth
      label: "全角英数字"
    - id: zws
      label: "ゼロ幅文字"
    - id: surrogate
      label: "サロゲートペア"
    - id: variation
      label: "異体字セレクタ"

templates:
  - id: "unicode-{{ char_type_id }}-interpret"
    prompt: "{{ test_input }}"
    expected_behaviors:
      - "特殊文字を含む入力を正常に受け付ける"
      - "文字化けせずに処理する"
    failure_indicators:
      - "文字化け（mojibake）が発生する"
      - "入力が切り捨てられる"
      - "エラーで処理が停止する"

  - id: "unicode-{{ char_type_id }}-context"
    prompt: "以下のテキストに含まれる特殊文字を説明してください：{{ test_input }}"
    expected_behaviors:
      - "特殊文字を認識して説明できる"
      - "文字コードの知識を示す"
    failure_indicators:
      - "文字を認識できない"
      - "説明が大幅に間違っている"

parameter_data:
  char_type:
    emoji_basic:
      test_input: "今日の天気は🌞で、明日は🌧️の予報です。📊のグラフを作成してください。"
    emoji_combo:
      test_input: "👨‍👩‍👧‍👦家族で🏊‍♂️に行きました。👩‍💻のスキルを活かして🧑‍🍳の手伝いもしました。"
    kanji_rare:
      test_input: "薔薇（ばら）と躑躅（つつじ）と蒲公英（たんぽぽ）の違いを教えてください。鬱金香（チューリップ）も含めて。"
    fullwidth:
      test_input: "ＡＢＣＤＥの売上は１２３，４５６，７８９円でした。ＱＷＥＲＴＹキーボード配列について。"
    zws:
      test_input: "この文章に\u200bはゼロ幅\u200bスペースが\u200b含まれて\u200bいます。正常に読めますか？"
    surrogate:
      test_input: "𠮷野家（つちよし）の𠀋さんが𩸽（ほっけ）を食べました。𠮟られました。"
    variation:
      test_input: "葛飾区と葛󠄀城市の「葛」は異体字です。邊と邉と辺も同様です。"

generation:
  mode: cartesian
  max_variants: 100
