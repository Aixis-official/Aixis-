id: "document_creation"
name_jp: "文書作成AI"
name_en: "Document Creation AI"
category_jp: "用途特化"
description_jp: "ビジネス文書やレポート、提案書などを自動生成・補助するAIツール。文章のトーン調整、構成提案、推敲支援を行う。"
examples:
  - "Notion AI"
  - "Jasper"
  - "Microsoft Copilot (Word)"
  - "Google Docs AI"
  - "文賢"
aliases:
  - "文書AI"
  - "ドキュメントAI"
  - "文章作成AI"
  - "レポート作成AI"
  - "ライティングAI"
traits:
  - "text_input"
  - "text_output"
  - "tone_adjustment"
  - "structured_document"
  - "proofreading"
  - "template_based"

primary_categories:
  - business_jp
  - keigo_mixing
  - long_input
secondary_categories:
  - ambiguous
  - multi_step
excluded_categories:
  - dialect
  - broken_grammar

scoring_weights:
  japanese_ability: 2.0
  reliability: 1.0
  practical: 1.5

evaluation_focus:
  - "ビジネス文書における敬語の正確な使い分け"
  - "長文の論理構成と段落構造の適切さ"
  - "社内文書・社外文書のトーン切り替え能力"
  - "日本特有のビジネス慣習に基づく文書フォーマット対応"
  - "推敲・校正における日本語文法の正確性"
