id: "search_rag"
name_jp: "検索/RAG AI"
name_en: "Search / RAG AI"
category_jp: "用途特化"
description_jp: "社内文書やナレッジベースから情報を検索・取得し、質問に回答するRAG（検索拡張生成）型AIツール。"
examples:
  - "NotebookLM"
  - "Glean"
  - "Guru"
  - "Helpfeel"
  - "Qast"
aliases:
  - "社内検索AI"
  - "RAG"
  - "ナレッジ検索AI"
  - "社内FAQ AI"
  - "情報検索AI"
traits:
  - "text_input"
  - "text_output"
  - "retrieval_augmented"
  - "knowledge_base"
  - "citation_generation"
  - "context_aware"

primary_categories:
  - long_input
  - ambiguous
  - business_jp
secondary_categories:
  - keigo_mixing
  - contradictory
  - multi_step
excluded_categories:
  - dialect
  - broken_grammar

scoring_weights:
  japanese_ability: 1.5
  reliability: 2.0
  practical: 1.5

evaluation_focus:
  - "長文ドキュメントからの正確な情報抽出"
  - "曖昧な質問に対する適切な情報の特定"
  - "矛盾する情報源がある場合の適切な回答"
  - "日本語の同義語・表記揺れを考慮した検索精度"
  - "出典の正確な引用と根拠の提示"
