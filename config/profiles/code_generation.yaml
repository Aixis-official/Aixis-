id: "code_generation"
name_jp: "コード生成AI"
name_en: "Code Generation AI"
category_jp: "用途特化"
description_jp: "プログラミングコードの自動生成、補完、レビュー、デバッグを支援するAIツール。日本語コメントや仕様書からのコード生成にも対応する。"
examples:
  - "GitHub Copilot"
  - "Cursor"
  - "Cody (Sourcegraph)"
  - "Amazon CodeWhisperer"
  - "Tabnine"
aliases:
  - "コーディングAI"
  - "プログラミングAI"
  - "コード補完AI"
  - "コパイロット"
  - "コード自動生成"
traits:
  - "text_input"
  - "code_output"
  - "multi_language_code"
  - "context_aware"
  - "inline_completion"
  - "documentation_generation"

primary_categories:
  - unicode_edge
  - multi_step
  - ambiguous
secondary_categories:
  - long_input
  - business_jp
excluded_categories:
  - dialect
  - keigo_mixing
  - broken_grammar

scoring_weights:
  japanese_ability: 1.0
  reliability: 1.5
  practical: 2.0

evaluation_focus:
  - "日本語コメント・変数名を含むコードの正確な生成"
  - "日本語仕様書からの適切なコード変換"
  - "全角文字・Unicode文字列処理の正確性"
  - "複数ステップにわたるリファクタリング指示への対応"
  - "日本語エラーメッセージの適切な処理"
