examples:
  - "Julius AI"
  - "DataRobot"
  - "Exploratory"
  - "Microsoft Copilot (Excel)"
  - "Google Sheets AI"
aliases:
  - "分析AI"
  - "データAI"
  - "統計AI"
  - "BIツールAI"
  - "データ可視化AI"
traits:
  - "text_input"
  - "data_input"
  - "chart_output"
  - "statistical_analysis"
  - "natural_language_query"
  - "structured_data_output"

primary_categories:
  - ambiguous
  - multi_step
  - business_jp
secondary_categories:
  - long_input
  - unicode_edge
excluded_categories:
  - dialect
  - keigo_mixing
  - broken_grammar

scoring_weights:
  japanese_ability: 1.0
  reliability: 2.0
  practical: 2.0

evaluation_focus:
  - "日本語の曖昧な分析指示の正確な解釈"
