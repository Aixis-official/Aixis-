id: "chatbot"
name_jp: "チャットボットAI"
name_en: "Chatbot AI"
category_jp: "用途特化"
description_jp: "Webサイトやメッセージングアプリ上で顧客・ユーザーと対話するチャットボットAI。FAQ応答、予約受付、案内業務を自動化する。"
examples:
  - "LINE公式チャットボット"
  - "Zendesk AI Bot"
  - "ChatPlus"
  - "KUZEN"
  - "hitobo"
aliases:
  - "チャットボット"
  - "ボットAI"
  - "対話AI"
  - "LINEボット"
  - "Webチャット"
traits:
  - "text_input"
  - "text_output"
  - "dialog_management"
  - "intent_classification"
  - "slot_filling"
  - "multi_turn_conversation"

primary_categories:
  - broken_grammar
  - ambiguous
  - keigo_mixing
  - dialect
secondary_categories:
  - contradictory
  - business_jp
excluded_categories:
  - long_input
  - unicode_edge

scoring_weights:
  japanese_ability: 2.0
  reliability: 1.5
  practical: 1.0

evaluation_focus:
  - "崩れた日本語やスラングからの意図理解"
  - "方言を含む入力への適切な対応"
  - "敬語レベルに応じた応答トーンの調整"
  - "曖昧な要求に対する適切な確認・誘導"
  - "マルチターン対話での文脈維持"
