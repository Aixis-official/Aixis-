id: "customer_support"
name_jp: "カスタマーサポートAI"
name_en: "Customer Support AI"
category_jp: "用途特化"
description_jp: "顧客からの問い合わせに自動応答するAIツール。FAQ応答、問い合わせ分類、エスカレーション判断などを行う。"
examples:
  - "KARAKURI"
  - "BEDORE"
  - "PKSHA Chatbot"
  - "MOBI AGENT"
  - "Zendesk AI"
aliases:
  - "CS AI"
  - "サポートAI"
  - "問い合わせ対応AI"
  - "カスタマーサービスAI"
  - "お客様対応AI"
traits:
  - "text_input"
  - "text_output"
  - "dialog_management"
  - "intent_classification"
  - "escalation_detection"
  - "polite_response"

primary_categories:
  - keigo_mixing
  - broken_grammar
  - ambiguous
  - business_jp
secondary_categories:
  - dialect
  - contradictory
excluded_categories:
  - unicode_edge
  - long_input

scoring_weights:
  japanese_ability: 2.0
  reliability: 1.5
  practical: 1.5

evaluation_focus:
  - "顧客の崩れた日本語・誤入力からの意図理解"
  - "適切な敬語レベルでの応答生成"
  - "曖昧な問い合わせ内容の適切な確認・誘導"
  - "クレーム対応時の丁寧な言い回し"
  - "方言を含む問い合わせへの対応力"
