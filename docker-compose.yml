version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AIXIS_DATABASE_URL=postgresql+asyncpg://aixis:${POSTGRES_PASSWORD:-aixis_dev_only}@postgres:5432/aixis
      - AIXIS_REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - AIXIS_DEBUG=true
      - AIXIS_SECRET_KEY=${SECRET_KEY:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./config:/app/config
      - ./data:/data
    command: uvicorn aixis_web.app:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    environment:
      - AIXIS_DATABASE_URL=postgresql+asyncpg://aixis:${POSTGRES_PASSWORD:-aixis_dev_only}@postgres:5432/aixis
      - AIXIS_REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./config:/app/config
      - ./data:/data
    command: arq aixis_web.tasks.worker.WorkerSettings

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aixis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aixis_dev_only}
      POSTGRES_DB: aixis
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
